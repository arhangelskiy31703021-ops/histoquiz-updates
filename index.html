<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HistoQuiz Pro Vundervaflia</title>
  <style>
    :root{
      --bg:#120a1e;
      --bg2:#1a102a;
      --card:#221436cc;
      --card2:#2b1745;
      --line:#6d4da8;
      --line2:#8f67d8;
      --text:#f4ecff;
      --muted:#c7b4e7;
      --soft:#d7c9ef;
      --accent:#b17cff;
      --accent2:#8d5ef3;
      --danger:#ef5b7d;
      --success:#4ed6a8;
      --warning:#ffca73;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --radius: 24px;
      --radius-sm: 16px;
      --max: 1260px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(177,124,255,.18), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(142,96,243,.15), transparent 24%),
        linear-gradient(180deg, #0d0716 0%, #1a1028 100%);
      color:var(--text);
      overflow-x:hidden;
    }
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    .app{
      min-height:auto;
      display:flex;
      flex-direction:column;
    }
    .shell{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      padding:20px 0 96px;
      flex:1;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 18px;
      background:linear-gradient(180deg, rgba(45,23,71,.8), rgba(25,14,39,.8));
      border:1px solid rgba(173,134,255,.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom:16px;
      position:sticky;
      top:12px;
      z-index:20;
    }
    .brand{
      display:flex;align-items:center;gap:12px;min-width:0;
    }
    .brand-badge{
      width:46px;height:46px;border-radius:16px;
      background:linear-gradient(145deg, var(--accent), #6a36d5);
      display:grid;place-items:center;font-size:22px;box-shadow:0 10px 25px rgba(130,73,255,.35)
    }
    .brand h1{margin:0;font-size:18px;line-height:1.1}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .userchip{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      white-space:nowrap;
      max-width:45%;
      overflow:hidden;text-overflow:ellipsis;
    }
    .userchip strong{color:var(--text)}
    .hero{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:16px;
      margin-bottom:16px;
    }
    .panel{
      background:linear-gradient(180deg, rgba(44,26,69,.9), rgba(24,15,38,.86));
      border:1px solid rgba(177,124,255,.16);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel.pad{padding:18px}
    .stats{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
    }
    .stat{
      padding:16px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);
    }
    .stat .label{font-size:12px;color:var(--muted);margin-bottom:10px}
    .stat .value{font-size:26px;font-weight:800;letter-spacing:-.03em}
    .stat .hint{margin-top:8px;font-size:12px;color:var(--soft)}
    .status-card{
      padding:18px;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:14px;
      background:
        radial-gradient(circle at 20% 20%, rgba(177,124,255,.15), transparent 28%),
        linear-gradient(180deg, rgba(43,23,69,.92), rgba(19,12,31,.94));
    }
    .status-card h2{margin:0 0 8px;font-size:22px}
    .status-card p{margin:0;color:var(--muted);line-height:1.55}
    .pill-row{display:flex;flex-wrap:wrap;gap:8px}
    .pill{
      padding:8px 12px;border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      font-size:12px;
    }
    .section-tabs{
      display:flex;flex-wrap:wrap;gap:10px;
      margin:14px 0 16px;
    }
    .tab{
      border:0;
      color:var(--text);
      background:rgba(255,255,255,.06);
      padding:12px 16px;
      border-radius:999px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.08);
      transition:.2s ease;
    }
    .tab.active{
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 12px 25px rgba(125,76,255,.3);
      border-color:transparent;
    }
    .section-head{
      display:flex;justify-content:space-between;align-items:end;gap:12px;
      margin:10px 2px 14px;
    }
    .section-head h3{margin:0;font-size:20px}
    .section-head .sub{color:var(--muted);font-size:13px}
    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      overflow:hidden;
      position:relative;
    }
    .card.clickable{cursor:pointer;transition:.18s ease}
    .card.clickable:hover{transform:translateY(-2px);border-color:rgba(177,124,255,.35)}
    .card h4{margin:0 0 8px;font-size:17px;line-height:1.25}
    .card p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .card-top{
      display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;
    }
    .badge{
      padding:6px 10px;border-radius:999px;font-size:11px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      white-space:nowrap;
    }
    .badge.good{background:rgba(78,214,168,.14);color:#9bf1d2;border-color:rgba(78,214,168,.2)}
    .badge.warn{background:rgba(255,202,115,.14);color:#ffe0a7;border-color:rgba(255,202,115,.22)}
    .badge.dev{background:rgba(177,124,255,.12);color:#d8bcff;border-color:rgba(177,124,255,.18)}
    .progress{
      height:10px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;margin:14px 0 8px;
      border:1px solid rgba(255,255,255,.06);
    }
    .progress > span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg, var(--accent), var(--success))}
    .meta{
      display:flex;justify-content:space-between;gap:10px;
      color:var(--soft);font-size:12px;
    }
    .bottom-nav{
      padding:12px 0 2px;
      margin-top:18px;
    }
    .bottom-nav .wrap{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      display:grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap:10px;
    }
    .navbtn{
      border:0;
      color:var(--text);
      padding:14px 14px;
      border-radius:18px;
      cursor:pointer;
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.08);
      transition:.2s ease;
      min-height:52px;
      font-weight:700;
    }
    .navbtn:hover{transform:translateY(-1px)}
    .navbtn.red{background:linear-gradient(135deg, #ff5a7b, #d63b59)}
    .navbtn.purple{background:linear-gradient(135deg, #9f74ff, #7141df)}
    .navbtn.gray{background:linear-gradient(135deg, #4f4a5d, #353041)}
    .navbtn.full{grid-column: span 1}
    .login-wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }
    .login{
      width:min(920px, 100%);
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
    }
    .login .left{
      padding:28px;
      background:
        radial-gradient(circle at 30% 20%, rgba(177,124,255,.17), transparent 25%),
        linear-gradient(180deg, rgba(42,22,67,.95), rgba(18,11,31,.95));
      border-radius:30px;
      border:1px solid rgba(177,124,255,.18);
      box-shadow: var(--shadow);
    }
    .login .left h1{margin:6px 0 10px;font-size:34px;line-height:1.05}
    .login .left p{margin:0;color:var(--muted);line-height:1.6}
    .featurelist{
      margin-top:18px;display:grid;gap:10px
    }
    .feature{
      display:flex;gap:10px;align-items:flex-start;
      padding:12px 14px;border-radius:18px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)
    }
    .feature b{display:block;margin-bottom:2px}
    .login .right{
      padding:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border-radius:30px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      display:flex;flex-direction:column;justify-content:center;
    }
    .form{
      display:grid;gap:12px;
    }
    .field label{display:block;font-size:12px;color:var(--muted);margin:0 0 7px 2px}
    .field input, .field select, .field textarea{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(13,7,22,.55);
      color:var(--text);
      padding:14px 14px;
      outline:none;
      transition:.2s ease;
    }
    .field textarea{min-height:120px;resize:vertical}
    .field input:focus, .field select:focus, .field textarea:focus{
      border-color:rgba(177,124,255,.5);
      box-shadow:0 0 0 4px rgba(177,124,255,.12)
    }
    .primary, .ghost, .danger, .success-btn{
      border:0;
      border-radius:16px;
      padding:13px 15px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
      color:var(--text);
    }
    .primary{background:linear-gradient(135deg, var(--accent), var(--accent2));}
    .ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08)}
    .danger{background:linear-gradient(135deg, #ff6a86, #d83b5f)}
    .success-btn{background:linear-gradient(135deg, #52d5a8, #2fad7f)}
    .inline-actions{display:flex;flex-wrap:wrap;gap:10px}
    .muted{color:var(--muted)}
    .screen{display:none}
    .screen.active{display:block}
    .backline{
      display:flex;align-items:center;gap:10px;margin-bottom:14px
    }
    .backline button{padding:10px 14px;border-radius:14px}
    .training-layout{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:16px;
    }
    .media-box{
      padding:16px;
    }
    .media{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      background:#150d22;
      border:1px solid rgba(255,255,255,.08);
      min-height: 420px;
      display:grid;
      place-items:center;
    }
    .media img, .media svg{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      cursor:pointer;
      user-select:none;
    }
    .media-note{
      position:absolute;
      left:12px;top:12px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(13,7,22,.66);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
    }
    .qa{
      padding:18px;
      display:grid;
      gap:14px;
    }
    .prompt{
      padding:16px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .prompt h3{margin:0 0 8px;font-size:20px}
    .prompt p{margin:0;color:var(--muted);line-height:1.5}
    .feedback{
      padding:14px 16px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      display:none;
    }
    .feedback.show{display:block}
    .feedback.ok{border-color:rgba(78,214,168,.25);background:rgba(78,214,168,.08)}
    .feedback.bad{border-color:rgba(239,91,125,.25);background:rgba(239,91,125,.08)}
    .feedback .title{font-weight:800;margin-bottom:8px}
    .feedback .small{font-size:13px;color:var(--soft);line-height:1.45}
    .prep-description{
      display:none;
      padding:16px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(177,124,255,.12), rgba(255,255,255,.04));
      border:1px solid rgba(177,124,255,.20);
      box-shadow:0 12px 26px rgba(0,0,0,.18);
    }
    .prep-description.show{display:block}
    .prep-description h4{
      margin:0 0 10px;
      font-size:16px;
      line-height:1.25;
    }
    .prep-description .desc-text{
      color:var(--soft);
      font-size:13px;
      line-height:1.55;
      white-space:normal;
    }
    .prep-html-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      line-height:1.65;
      font-size:15px;
      color:var(--soft);
    }
    .prep-html-card{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:18px;
    }
    .prep-html-card.wide{grid-column:1 / -1}
    .prep-html-card h2{margin:0 0 12px;color:var(--text);font-size:24px;line-height:1.2}
    .prep-html-card h3{margin:18px 0 10px;color:var(--text);font-size:18px;line-height:1.25}
    .prep-html-card p{margin:0 0 12px}
    .prep-html-card b{color:var(--text)}
    .scheme-grid{
      display:grid; gap:12px; grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
    }
    .scheme-grid .field input{padding:12px}

    .prep-modal-body{
      flex:1;
      overflow:auto;
      padding:16px;
      background:radial-gradient(circle at 50% 20%, rgba(177,124,255,.08), transparent 35%);
    }
    .prep-detail-layout{
      display:grid;
      gap:16px;
      align-items:start;
    }
    .prep-detail-img{
      width:100%;
      max-height:64vh;
      object-fit:contain;
      display:block;
      border-radius:24px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.08);
    }
    .prep-detail-side{
      display:grid;
      gap:12px;
    }
    .prep-description.bank-show{
      display:block;
      margin-top:0;
      width:100%;
    }
    .prep-description.training-wide{
      display:block;
      margin-top:16px;
      width:100%;
    }
    .prep-variant-full{
      width:100%;
      padding:16px;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(177,124,255,.18);
      box-shadow:0 14px 34px rgba(0,0,0,.24);
    }
    .prep-variant-full h3{
      margin:0 0 12px;
      font-size:18px;
    }
    .prep-variant-full img{
      width:100%;
      height:min(78vh, 820px);
      object-fit:contain;
      display:block;
      border-radius:24px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.08);
    }

    .fullscreen-img-modal{
      position:fixed;
      inset:0;
      z-index:80;
      display:none;
      background:rgba(5,3,8,.92);
      backdrop-filter: blur(8px);
      padding:18px;
    }
    .fullscreen-img-modal.open{display:grid;place-items:center}
    .fullscreen-img-wrap{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      position:relative;
    }
    .fullscreen-img-wrap img{
      max-width:96vw;
      max-height:92vh;
      object-fit:contain;
      border-radius:22px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 18px 55px rgba(0,0,0,.55);
    }
    .fullscreen-close{
      position:fixed;
      right:22px;
      top:18px;
      z-index:82;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.12);
      color:var(--text);
      border-radius:16px;
      padding:12px 15px;
      cursor:pointer;
      font-weight:900;
      backdrop-filter: blur(10px);
    }
    .fullscreen-caption{
      position:fixed;
      left:22px;
      bottom:18px;
      z-index:82;
      max-width:min(760px, calc(100vw - 44px));
      padding:10px 12px;
      border-radius:999px;
      background:rgba(13,7,22,.66);
      border:1px solid rgba(255,255,255,.10);
      color:var(--soft);
      font-size:13px;
    }
    .fullscreen-trigger{cursor:zoom-in}

    .variant-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:10px;
    }
    .variant-card{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      transition:.18s ease;
    }
    .variant-card:hover{border-color:rgba(177,124,255,.35);transform:translateY(-1px)}
    .variant-card.active{border-color:rgba(177,124,255,.55);background:rgba(177,124,255,.12)}
    .variant-card img{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:#120c1b;
    }
    .variant-card .v-title{margin-top:8px;font-size:12px;color:var(--soft);font-weight:800}
    .all-preps-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap:10px;
      margin-top:12px;
      max-height:420px;
      overflow:auto;
      padding-right:4px;
    }
    .all-prep-card{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      transition:.18s ease;
    }
    .all-prep-card:hover{border-color:rgba(177,124,255,.35);transform:translateY(-1px)}
    .all-prep-card.active{border-color:rgba(78,214,168,.40);background:rgba(78,214,168,.08)}
    .all-prep-card img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:#120c1b;
    }
    .all-prep-card .prep-name{margin-top:8px;font-size:13px;font-weight:900;color:var(--text);line-height:1.25}
    .all-prep-card .prep-meta{margin-top:4px;font-size:11px;color:var(--muted);line-height:1.25}
    @media (max-width: 820px){
      .prep-detail-img{max-height:52vh}
      .all-preps-grid{max-height:360px}
    }

    .bank-toolbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      margin-bottom:14px;
    }
    .bank-toolbar .tab{padding:10px 14px}
    .bank-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .bank-card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
    }
    .bank-card .thumb{
      width:100%;
      aspect-ratio: 16/10;
      background:#120c1b;
      display:block;
      object-fit:cover;
      cursor:pointer;
    }
    .bank-card .content{padding:14px}
    .bank-card .content h4{margin:0 0 6px;font-size:16px}
    .bank-card .content p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .bank-card .content .row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
    .list{
      display:grid;gap:12px
    }
    .info-grid{display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr))}
    .mini{
      padding:16px;border-radius:22px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .mini h4{margin:0 0 8px}
    .mini p,.mini li{color:var(--muted);line-height:1.55}
    .mini ul{margin:0;padding-left:20px}
    .modal{
      position:fixed;inset:0;z-index:50;
      display:none;
      background:rgba(5,3,8,.76);
      backdrop-filter: blur(10px);
    }
    .modal.open{display:grid;place-items:center}
    .modal-panel{
      width:min(1200px, calc(100% - 18px));
      height:min(92vh, 940px);
      background:linear-gradient(180deg, rgba(32,18,50,.95), rgba(11,7,16,.97));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .modal-head{
      display:flex;justify-content:space-between;align-items:center;
      gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08)
    }
    .modal-head h3{margin:0;font-size:16px}
    .modal-body{
      flex:1;
      position:relative;
      overflow:hidden;

/* === FIX: вывод текста теоретического вопроса/задачи в тренировке и экзамене === */
.question-box{

}

/* === FIX: для теории и задач убрана левая карточка-заглушка с изображением === */
.training-layout.text-only-training{

}

/* === MCQ тестирование === */
.mcq-panel{max-width:1040px;margin:0 auto;}
.mcq-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:16px;}
.mcq-top h2{margin:6px 0 0;font-size:22px;line-height:1.35;}
.mcq-options{display:grid;gap:10px;margin:16px 0;}
.mcq-option{
  width:100%;
  display:grid;
  grid-template-columns:auto 1fr;
  gap:12px;
  align-items:center;
  text-align:left;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.045);
  color:var(--text);
  cursor:pointer;
  transition:.16s ease;
}
.mcq-option:hover{border-color:rgba(177,124,255,.35);background:rgba(177,124,255,.075);}
.mcq-option span{
  width:34px;height:34px;border-radius:12px;
  display:grid;place-items:center;
  background:rgba(177,124,255,.16);
  color:var(--text);
  font-weight:900;
}
.mcq-option b{font-weight:750;line-height:1.4;}
.mcq-option.selected{border-color:rgba(177,124,255,.65);background:rgba(177,124,255,.12);}
.mcq-option.correct{border-color:rgba(78,214,168,.65);background:rgba(78,214,168,.12);}
.mcq-option.wrong{border-color:rgba(239,91,125,.65);background:rgba(239,91,125,.12);}
@media (max-width:820px){.mcq-top{display:block}.mcq-top .badge{margin-top:10px;display:inline-block}}


/* === FIX: компактные варианты ответа + настроенная нарешка === */
.mcq-options{
  gap:8px;
}
.mcq-option.compact{
  grid-template-columns:34px 1fr;
  min-height:48px;
  padding:9px 12px;
  border-radius:14px;
}
.mcq-option.compact span{
  width:28px;
  height:28px;
  border-radius:10px;
  font-size:13px;
}
.mcq-option.compact b{
  font-size:15px;
  line-height:1.32;
}
.mcq-option.compact.selected{
  box-shadow:0 0 0 1px rgba(177,124,255,.35) inset;
}
.mcq-option.compact.correct{
  box-shadow:0 0 0 1px rgba(78,214,168,.35) inset;
}
.mcq-option.compact.wrong{
  box-shadow:0 0 0 1px rgba(239,91,125,.35) inset;
}


/* === Интерактивные типы тестов: definition_order / drag_to_groups === */
.order-list,.group-task{display:grid;gap:10px;margin:14px 0}
.order-item,.group-card{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:12px;
  align-items:center;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.045);
}
.order-item span{
  width:28px;height:28px;border-radius:10px;
  display:grid;place-items:center;
  background:rgba(177,124,255,.16);
  font-weight:900;
}
.order-item b,.group-card b{font-size:15px;line-height:1.35}
.order-actions{display:flex;gap:6px}
.small-btn{padding:6px 9px;border-radius:10px}
.group-card{grid-template-columns:1fr minmax(220px, 320px)}
.group-card select{
  width:100%;
  background:#120a1d;
  border:1px solid rgba(255,255,255,.12);
  color:var(--text);
  border-radius:12px;
  padding:10px 12px;
}
.order-item.correct,.group-card.correct{border-color:rgba(78,214,168,.65);background:rgba(78,214,168,.12)}
.order-item.wrong,.group-card.wrong{border-color:rgba(239,91,125,.65);background:rgba(239,91,125,.12)}
@media (max-width:760px){
  .group-card{grid-template-columns:1fr}
  .order-item{grid-template-columns:auto 1fr}
  .order-actions{grid-column:1 / -1}
}


/* === drag_to_groups: настоящие столбики с перетаскиванием === */
.group-board{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));
  gap:12px;
  margin:14px 0;
}
.group-column{
  min-height:180px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.035);
  overflow:hidden;
}
.group-column.source{
  background:rgba(177,124,255,.055);
  border-color:rgba(177,124,255,.20);
}
.group-column-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.035);
}
.group-column-head strong{
  font-size:14px;
  line-height:1.25;
}
.group-column-head span{
  min-width:26px;
  height:26px;
  display:grid;
  place-items:center;
  border-radius:10px;
  background:rgba(177,124,255,.16);
  font-weight:900;
  font-size:12px;
}
.group-dropzone{
  min-height:130px;
  padding:10px;
  display:grid;
  align-content:start;
  gap:8px;
}
.group-dropzone.empty{
  place-items:center;
}
.drop-hint{
  color:var(--muted);
  font-size:13px;
  text-align:center;
  border:1px dashed rgba(255,255,255,.14);
  border-radius:14px;
  padding:14px;
  width:100%;
}
.drag-card{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.06);
  cursor:grab;
  user-select:none;
}
.drag-card:active{cursor:grabbing}
.drag-card b{
  font-size:14px;
  line-height:1.32;
}
.drag-card.correct{
  border-color:rgba(78,214,168,.65);
  background:rgba(78,214,168,.12);
}
.drag-card.wrong{
  border-color:rgba(239,91,125,.65);
  background:rgba(239,91,125,.12);
}
.drag-remove{
  width:26px;
  height:26px;
  padding:0;
  border-radius:9px;
  font-size:16px;
  line-height:1;
  opacity:.85;
}
@media (max-width:760px){
  .group-board{grid-template-columns:1fr}
  .group-column{min-height:auto}
}


/* === Итоговое тестирование по препаратам === */
.prep-test-card{
  background:linear-gradient(180deg, rgba(177,124,255,.10), rgba(255,255,255,.025));
  border-color:rgba(177,124,255,.22);
}
.prep-test-card .inline-actions,
.card .inline-actions{
  gap:8px;
}
.card .inline-actions button{
  padding:9px 12px;

}


/* === Препараты: варианты окраски + таймер 40 сек === */
.micro-timer-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  margin:0 0 12px;
  border-radius:16px;
  border:1px solid rgba(177,124,255,.22);
  background:rgba(177,124,255,.08);
}
.micro-timer-card strong{
  display:block;
  font-size:14px;
}
.micro-timer-card span{
  display:block;
  color:var(--muted);
  font-size:12px;
  margin-top:2px;
}
.micro-timer-values{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
  min-width:130px;
}
.micro-timer-values span{
  margin:0;
  color:var(--text);
  font-weight:900;
}
.micro-timer-values .timer-bad{
  color:var(--danger);
}


/* === Песочные часы и авто-незачёт после 40 сек === */
.micro-timer-card.timeout{
  border-color:rgba(239,91,125,.55);
  background:rgba(239,91,125,.10);
  animation: timeoutPulse 1s ease-in-out infinite;
}
.micro-timer-title{
  display:flex;
  align-items:center;
  gap:10px;
}
.micro-hourglass{
  width:38px;
  height:38px;
  display:grid;
  place-items:center;
  border-radius:14px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  position:relative;
  overflow:hidden;
}
.micro-hourglass::before,
.micro-hourglass::after{
  content:"";
  position:absolute;
  left:11px;
  width:16px;
  height:14px;
  border:2px solid rgba(255,255,255,.72);
}
.micro-hourglass::before{
  top:5px;
  border-bottom:none;
  border-radius:9px 9px 3px 3px;
}
.micro-hourglass::after{
  bottom:5px;
  border-top:none;
  border-radius:3px 3px 9px 9px;
}
.micro-hourglass span{
  position:absolute;
  top:8px;
  left:17px;
  width:4px;
  height:22px;
  border-radius:999px;
  background:linear-gradient(to bottom, rgba(255,255,255,.85), rgba(255,255,255,.18), rgba(255,255,255,.85));
  transform-origin:center;
}
.micro-hourglass.active{
  animation: hourglassFlip 1.15s ease-in-out infinite;
  background:rgba(177,124,255,.14);
  border-color:rgba(177,124,255,.32);
}
.micro-hourglass.active span{
  animation: sandFlow .8s linear infinite;
}
.micro-hourglass.expired{
  background:rgba(239,91,125,.16);
  border-color:rgba(239,91,125,.45);
}
.timeout-banner{
  margin:0 0 12px;
  padding:11px 13px;
  border-radius:15px;
  border:1px solid rgba(239,91,125,.38);
  background:rgba(239,91,125,.12);
  color:var(--text);
  font-weight:900;
  line-height:1.35;
}
@keyframes hourglassFlip{
  0%{transform:rotate(0deg) scale(1)}
  45%{transform:rotate(180deg) scale(1.08)}
  100%{transform:rotate(360deg) scale(1)}
}
@keyframes sandFlow{
  0%{opacity:.25; transform:scaleY(.35)}
  50%{opacity:1; transform:scaleY(1)}
  100%{opacity:.25; transform:scaleY(.35)}
}
@keyframes timeoutPulse{
  0%,100%{box-shadow:0 0 0 rgba(239,91,125,0)}
  50%{box-shadow:0 0 0 4px rgba(239,91,125,.10)}
}


/* === Диаграмма времени вместо песочных часов, лимит 25 сек === */
.micro-time-chart{
  --timer-deg:0deg;
  width:44px;
  height:44px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:
    conic-gradient(
      #4ed6a8 0deg,
      #7c5cff 130deg,
      #ffcf5a 230deg,
      rgba(255,255,255,.10) var(--timer-deg),
      rgba(255,255,255,.10) 360deg
    );
  padding:4px;
  box-shadow:0 0 0 1px rgba(255,255,255,.10) inset;
  animation: chartPulse 1.2s ease-in-out infinite;
}
.micro-time-chart.warn{
  background:
    conic-gradient(
      #ffcf5a 0deg,
      #ff9f43 var(--timer-deg),
      rgba(255,255,255,.10) var(--timer-deg),
      rgba(255,255,255,.10) 360deg
    );
}
.micro-time-chart.expired{
  background:
    conic-gradient(
      #ef5b7d 0deg,
      #ff4d4d var(--timer-deg),
      rgba(239,91,125,.16) var(--timer-deg),
      rgba(239,91,125,.16) 360deg
    );
  animation: chartExpired .55s ease-in-out infinite;
}
.chart-ring{
  width:100%;
  height:100%;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:var(--panel);
  border:1px solid rgba(255,255,255,.10);
}
.chart-ring span{
  color:var(--text);
  font-weight:950;
  font-size:14px;
  line-height:1;
  margin:0;
}
.micro-time-chart.expired .chart-ring span{
  color:var(--danger);
}
.micro-hourglass{display:none !important;}
@keyframes chartPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.045)}
}
@keyframes chartExpired{
  0%,100%{transform:scale(1); filter:saturate(1)}
  50%{transform:scale(1.08); filter:saturate(1.45)}
}


/* === Кровь: диффероны по 2 линии === */
.dual-board{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:12px;
  margin:14px 0;
}
.dual-column{
  min-height:180px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.035);
  overflow:hidden;
}
.dual-column.source{
  background:rgba(177,124,255,.055);
  border-color:rgba(177,124,255,.20);
}
.dual-dropzone{
  min-height:130px;
  padding:10px;
  display:grid;
  align-content:start;
  gap:8px;
}
.dual-dropzone.empty{place-items:center}
.dual-card{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.06);
  cursor:grab;
  animation: bloodCardIn .18s ease-out both;
}
.dual-card b{font-size:14px;line-height:1.32}
.dual-card-actions{display:flex;gap:5px;align-items:center}
.dual-card.correct{
  border-color:rgba(78,214,168,.65);
  background:rgba(78,214,168,.12);
  animation: greenWave .8s ease-out both;
}
.dual-card.semi{
  border-color:rgba(255,207,90,.72);
  background:rgba(255,207,90,.12);
}
.dual-card.wrong{
  border-color:rgba(239,91,125,.65);
  background:rgba(239,91,125,.12);
  animation: shakeWrong .28s ease-in-out both;
}
@keyframes bloodCardIn{
  from{opacity:0; transform:translateY(8px) scale(.98)}
  to{opacity:1; transform:translateY(0) scale(1)}
}
@keyframes greenWave{
  0%{box-shadow:inset 0 0 0 0 rgba(78,214,168,.0)}
  40%{box-shadow:inset 360px 0 0 0 rgba(78,214,168,.13)}
  100%{box-shadow:inset 0 0 0 0 rgba(78,214,168,.0)}
}
@keyframes shakeWrong{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  50%{transform:translateX(4px)}
  75%{transform:translateX(-3px)}
}
@media (max-width:760px){
  .dual-board{grid-template-columns:1fr}
  .dual-card{grid-template-columns:1fr}
  .dual-card-actions{justify-content:flex-start}
}

/* =========================================================
   Supabase DB loader:
   препараты, описания, варианты, схемы, теория и задачи
   грузятся из таблиц Supabase.
   ========================================================= */
function showDbLoading(message = "Загрузка базы препаратов…") {
  const app = document.getElementById("app");
  if (!app) return;
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login" style="grid-template-columns:1fr;max-width:720px;">
        <div class="left">
          <div class="brand-badge">🔬</div>
          <h1>${message}</h1>
          <p>Сайт получает препараты, описания, схемы и вопросы из Supabase.</p>
        </div>
      </div>
    </div>
  `;
}

function showDbError(error) {
  console.error(error);
  const app = document.getElementById("app");
  if (!app) return;
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login" style="grid-template-columns:1fr;max-width:820px;">
        <div class="left">
          <div class="brand-badge">⚠️</div>
          <h1>База препаратов не загрузилась</h1>
          <p>Проверь доступ к критичным таблицам Supabase: <b>colloquiums</b> и <b>preparations</b>. Остальные таблицы теперь загружаются опционально и не должны блокировать сайт.</p>
          <div class="featurelist">
            <div class="feature"><span>Ошибка:</span><div><b>${String(error?.message || error)}</b></div></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function sbSelect(table, query = "*") {
  if (!supabaseClient) throw new Error("Supabase client не создан. Проверь подключение CDN и ключи.");
  const { data, error } = await supabaseClient.from(table).select(query);
  if (error) throw error;
  return data || [];
}

async function sbSelectOptional(table, query = "*") {
  if (!supabaseClient) return [];
  const { data, error } = await supabaseClient.from(table).select(query);
  if (error) {
    console.warn(`Опциональная таблица ${table} не загружена:`, error.message || error);
    return [];
  }
  return data || [];
}

async function loadDbFromSupabase() {
  // Критичные таблицы: без них раздел препаратов не соберётся.
  // Некритичные таблицы грузим опционально, чтобы новый пользователь/новое устройство
  // не зависало на ошибке schemes/theory/tasks/preparation_variants.
  const [colloquiums, preparations] = await Promise.all([
    sbSelect("colloquiums"),
    sbSelect("preparations")
  ]);

  const [variants, schemes, theory, tasks] = await Promise.all([
    sbSelectOptional("preparation_variants"),
    sbSelectOptional("schemes"),
    sbSelectOptional("theory_questions"),
    sbSelectOptional("tasks")
  ]);

  const mcqRows = await sbSelectOptional("test_questions");
  const supabaseTests = (mcqRows || [])
    .map((q, idx) => ({
      id: q.id || `mcq_${idx + 1}`,
      type: "mcq",
      topic_block: q.topic_block || q.topicBlock || "",
      question: q.question || "",
      question_type: q.question_type || q.questionType || "multiple_select",
      task_data: q.task_data || q.taskData || {},
      options: Array.isArray(q.options) ? q.options : [],
      correct_index: Number.isFinite(Number(q.correct_index)) ? Number(q.correct_index) : null,
      correct_indexes: Array.isArray(q.correct_indexes) ? q.correct_indexes.map(Number) : (Number.isFinite(Number(q.correct_index)) ? [Number(q.correct_index)] : []),
      correct_answer: q.correct_answer || "",
      explanation: q.explanation || "",
      order_index: q.order_index || idx + 1
    }))
    .filter(q => q.question && Array.isArray(q.options) && q.options.length);

  const hasCytologyFromSupabase = supabaseTests.some(q => q.topic_block === 'Цитология: клетка, органеллы, клеточный цикл и методы исследования');
  mcqTests = (hasCytologyFromSupabase ? supabaseTests : [...supabaseTests, ...BUILTIN_TEST_QUESTIONS])
    .sort((a, b) => String(a.topic_block || '').localeCompare(String(b.topic_block || ''), 'ru') || (a.order_index || 0) - (b.order_index || 0));

  const nextDb = {};
  colloquiums
    .sort((a, b) => (a.num || 0) - (b.num || 0))
    .forEach((c) => {
      nextDb[c.id] = {
        id: c.id,
        num: c.num,
        title: c.title,
        desc: c.description || "",
        microscopy: [],
        schemes: [],
        theory: [],
        tasks: []
      };
    });

  const variantsByPrep = {};
  variants
    .sort((a, b) => (a.order_index || 0) - (b.order_index || 0))
    .forEach((v) => {
      if (!variantsByPrep[v.preparation_id]) variantsByPrep[v.preparation_id] = [];
      variantsByPrep[v.preparation_id].push({ id: v.id, image_url: v.image_url || "" });
    });

  preparations
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((p) => {
      const colId = p.colloq_id || `colloq_${p.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: p.colloq, title: `Коллоквиум ${p.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }
      nextDb[colId].microscopy.push({
        id: p.id,
        type: p.type || "micro",
        colloq: p.colloq,
        name: p.name,
        stain: p.stain || "",
        image_url: p.image_url || "",
        description: p.description || "",
        variants: []
      });
    });

  schemes
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((s) => {
      const colId = s.colloq_id || `colloq_${s.colloq}`;

        nextDb[colId] = { id: colId, num: t.colloq, title: `Коллоквиум ${t.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };

        topic_block: t.topic_block || t.topicBlock || ""
      });
    });

  tasks
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((task) => {
      const colId = task.colloq_id || `colloq_${task.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: task.colloq, title: `Коллоквиум ${task.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }

        id: task.id,
        type: task.type || "task",
        colloq: task.colloq,
        question: task.question,
        answer: task.answer || "",
        answerVariants: Array.isArray(task.answer_variants) ? task.answer_variants : [],
        topic_block: task.topic_block || task.topicBlock || "",
        requiresManualCheck: !!task.requires_manual_check
      });
    });

  db = nextDb;
  return db;
}

function renderTopicBlockCards(kind) {
  const actionKind = kind === 'scheme' ? 'scheme' : kind;
  const blockCards = TOPIC_BLOCKS.map((block, idx) => {
    const totalItems = topicCount(actionKind, block);
    const learnedItems = actionKind === 'mcq' ? 0 : topicLearnedCount(actionKind, block);
    const percent = totalItems && actionKind !== 'mcq' ? Math.round(learnedItems / totalItems * 100) : 0;
    const tag = totalItems ? (percent === 100 && actionKind !== 'mcq' ? 'good' : 'dev') : 'warn';
    const actionText = totalItems ? (actionKind === 'mcq' ? 'Тест / нарешка' : 'Открыть блок') : 'Пока пусто';
    const action = actionKind === 'mcq'
      ? `startTopicTest(decodeURIComponent('${encodeURIComponent(block)}'), 'exam')`
      : `startTopicTraining('${actionKind}', decodeURIComponent('${encodeURIComponent(block)}'))`;
    const description = actionKind === 'mcq'
      ? 'Тестирование по сложным вопросам с выбором ответа. Есть обычный тест и режим нарешки.'
      : 'Блок темы для теоретических вопросов, задач или схем. Экзамен при этом остаётся независимым.';
    return `
      <div class="card clickable" onclick="${action}">
        <div class="card-top">
          <div>
            <h4>${idx + 1}. ${safeText(block)}</h4>
            <p>${safeText(description)}</p>
          </div>
          <span class="badge ${tag}">${actionText}</span>
        </div>
        <div class="progress"><span style="width:${percent}%"></span></div>
        <div class="meta">
          <span>${actionKind === 'mcq' ? `${totalItems} тест. вопросов` : `${learnedItems} / ${totalItems} элементов`}</span>
          <span>${actionKind === 'mcq' ? 'выбор ответа' : `${percent}%`}</span>
        </div>
        ${actionKind === 'mcq' && totalItems ? `
          <div class="inline-actions" style="margin-top:12px">
            <button class="ghost" type="button" onclick="event.stopPropagation(); startTopicTest(decodeURIComponent('${encodeURIComponent(block)}'), 'exam')">Обычный тест</button>
            <button class="primary" type="button" onclick="event.stopPropagation(); startTopicTest(decodeURIComponent('${encodeURIComponent(block)}'), 'drill')">Нарешка</button>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');

  const uncategorized = collectionForKind(actionKind).filter(item => !String(item?.topic_block || item?.topicBlock || '').trim() && !TOPIC_BLOCKS.includes(topicBlockOf(item)));

function normalize(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/ё/g, 'е')
    .replace(/[^\p{L}\p{N}]+/gu, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function sameText(a, b) {
  const x = normalize(a);
  const y = normalize(b);
  if (!x || !y) return false;
  if (x === y) return true;
  if (x.length >= 4 && y.includes(x)) return true;
  if (y.length >= 4 && x.includes(y)) return true;
  return false;
}
function sameStain(a, b) {
  const x = normalize(a);
  const y = normalize(b);
  if (!x || !y) return false;
  if (sameText(x, y)) return true;
  const groups = [
    ['гематоксилин эозин', 'г э', 'гэ', 'he', 'h e'],
    ['романовский гимза', 'романовского гимза', 'гимза'],
    ['метод маллори', 'маллори', 'по маллори'],
    ['метод по шморлю', 'по шморлю', 'шморль', 'шморлю'],
    ['железный гематоксилин', 'железный гемотоксилин', 'гематоксилин железный'],
    ['импрегнация серебром', 'серебро', 'импрегнация'],
    ['орсеин'],
    ['осмий'],
    ['пас', 'pas'],
    ['судан']
  ];
  return groups.some(group => group.includes(x) && group.includes(y));
}
function matchVariants(input, variants) {
  if (!Array.isArray(variants)) return sameText(input, variants);
  return variants.some(v => sameText(input, v));
}
function numericLike(s) {
  const n = Number(String(s).replace(',', '.').replace(/[^\d.-]/g, ''));
  return Number.isFinite(n) ? n : null;
}

function allowedGradesForKind(kind) {

}

    theory: 'Шкала без 1: 2, 3, 4 или 5. Оценивайте по точности и полноте ответа.',
  })[kind] || 'Шкала без 1: 2–5.';
}

function countSchemeMatches(cur, attempt) {
  const labels = cur.labels || {};
  let matched = 0;
  if (sameText(attempt?.schemeTitle, cur.title)) matched++;
  for (const key of Object.keys(labels)) {
    if (sameText(attempt?.labels?.[key], labels[key])) matched++;
  }
  return { matched, total: Object.keys(labels).length + 1 };
}

function evaluateItem(cur, attempt) {
  let ok = false;
  let detail = '';
  if (cur.type === 'micro') {
    ok = sameText(attempt?.name, cur.name) && sameText(attempt?.stain, cur.stain);
    detail = ok ? `Верно: ${cur.name} / ${cur.stain}` : `Правильно: ${cur.name} / ${cur.stain}`;
  } else if (cur.type === 'scheme') {
    const { matched, total } = countSchemeMatches(cur, attempt);
    ok = matched / total >= 0.8;
    detail = ok ? 'Схема принята.' : `Правильно: ${cur.title}. Подписи: ${Object.entries(cur.labels || {}).map(([k,v]) => `${k}=${v}`).join('; ')}`;
  } else if (cur.type === 'theory') {
    ok = matchVariants(attempt?.answer, cur.answerVariants || cur.answer);
    detail = ok ? 'Ответ принят.' : `Эталон: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`;
  } else if (cur.type === 'task') {
    const entered = attempt?.answer || '';
    const num = numericLike(entered);
    const target = numericLike(cur.answer);
    if (num !== null && target !== null) {
      ok = Math.abs(num - target) / Math.max(1, Math.abs(target)) <= 0.05;
    } else {
      ok = matchVariants(entered, cur.answerVariants || cur.answer);
    }
    detail = ok ? 'Решение верно.' : `Правильно: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`;
  }
  return { ok, detail };
}

function gradeSuggestion(kind, cur, attempt, ok) {
  if (kind === 'micro') return ok ? 5 : 2;
  if (kind === 'task') return ok ? 5 : 2;
  if (kind === 'scheme') {
    const { matched, total } = countSchemeMatches(cur, attempt);
    const labelsTotal = Math.max(0, total - 1);
    const labelsMatched = Math.max(0, matched - 1);
    const titleOk = sameText(attempt?.schemeTitle, cur.title);
    if (titleOk && labelsMatched === labelsTotal && labelsTotal > 0) return 5;
    if (titleOk && labelsTotal > 0 && labelsMatched >= Math.ceil(labelsTotal / 2)) return 4;
    if (titleOk) return 3;
    return 2;
  }
  if (kind === 'theory') {
    const variants = Array.isArray(cur.answerVariants) ? cur.answerVariants : [cur.answer];
    if (matchVariants(attempt?.answer, variants)) return 5;
    const ref = normalize(variants[0] || '');
    const inp = normalize(attempt?.answer || '');
    if (!ref || !inp) return 2;
    const refTokens = new Set(ref.split(' ').filter(Boolean));
    const inpTokens = new Set(inp.split(' ').filter(Boolean));
    let hit = 0;
    for (const token of inpTokens) if (refTokens.has(token)) hit++;
    const ratio = refTokens.size ? hit / refTokens.size : 0;
    if (ratio >= 0.75) return 4;
    if (ratio >= 0.45) return 3;
    return 2;
  }
  return ok ? 5 : 2;
}

function ensureProgressShape(p) {

function updateStreak() {
  const today = todayKey();
  const last = state.progress.lastStudyDate;
  if (!last) state.progress.streak = 1;
  else if (last === today) state.progress.streak = Math.max(1, state.progress.streak || 1);
  else {
    const d1 = new Date(last + 'T00:00:00');
    const d2 = new Date(today + 'T00:00:00');
    const diff = Math.round((d2 - d1) / 86400000);
    if (diff === 1) state.progress.streak = (state.progress.streak || 0) + 1;
    else state.progress.streak = 1;
  }
  state.progress.lastStudyDate = today;
}
function markLearned(id, points = 10) {
  state.progress = ensureProgressShape(state.progress);
  if (!state.progress.learnedIds.includes(id)) state.progress.learnedIds.push(id);
  state.progress.score = (state.progress.score || 0) + points;
  updateStreak();
  saveProgress();
}

async function loadProfileForUser(authUser) {
  if (!authUser || !supabaseClient) return null;
  const { data: profileData, error } = await supabaseClient
    .from('profiles')
    .select('id, full_name, group_id, role')
    .eq('id', authUser.id)
    .maybeSingle();
  if (error) console.warn('Ошибка загрузки профиля:', error);
  let profile = profileData || null;
  if (!profile) {
    const meta = authUser.user_metadata || {};
    const fullName = meta.full_name || meta.fullName || authUser.email || 'Студент';
    const groupName = meta.group_name || meta.group || '';
    const group = await findGroupByNameFromSupabase(groupName);
    const payload = { id: authUser.id, full_name: fullName, group_id: group?.id || null, role: 'student' };
    const { error: createError } = await supabaseClient.from('profiles').upsert(payload);
    if (createError) console.warn('Не удалось создать профиль после подтверждения email:', createError);
    else profile = payload;
  }
  let groupName = '';
  if (profile?.group_id) {
    const localGroup = (state.groups || []).find(g => g.id === profile.group_id);
    if (localGroup) groupName = localGroup.name;
    else {
      const { data: groupData } = await supabaseClient.from('groups').select('name').eq('id', profile.group_id).maybeSingle();
      groupName = groupData?.name || '';
    }
  }
  return {
    id: authUser.id,
    email: authUser.email || '',
    fullName: profile?.full_name || authUser.user_metadata?.full_name || authUser.email || 'Студент',
    group: groupName || authUser.user_metadata?.group_name || '',
    groupId: profile?.group_id || null,
    role: profile?.role || 'student'
  };
}

  if (!supabaseClient) {
    setAuthMessage('Supabase не загрузился. Проверь интернет и обнови страницу.');
    return;
  }
  setAuthMessage('Выполняется вход...');
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) {
    setAuthMessage('Ошибка входа: ' + error.message);

  const profileUser = await loadProfileForUser(data.user);
  if (!profileUser) {
    setAuthMessage('Аккаунт найден, но профиль студента не создан. Зарегистрируйся заново или напиши преподавателю.');
    return;
  }
  await setLoggedInUser(profileUser);
  state.authMessage = '';

}
async function registerStudent(email, password, fullName, groupName) {
  if (!supabaseClient) {
    setAuthMessage('Supabase не загрузился. Проверь интернет и обнови страницу.');
    return;
  }
  let group = groupByName(groupName);
  if (!group || !group.id) group = await findGroupByNameFromSupabase(groupName);
  if (!group || !group.id) {
    setAuthMessage('Группа не найдена в базе. Проверь список групп.');
    return;
  }
  setAuthMessage('Создаём аккаунт...');
  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password,
    options: { data: { full_name: fullName, group_name: groupName } }
  });
  if (error) {
    setAuthMessage('Ошибка регистрации: ' + error.message);
    return;
  }
  if (!data?.session) {
    state.pendingEmail = email;
    state.authMode = 'login';
    setAuthMessage('Регистрация создана. Если подтверждение почты включено, подтвердите письмо и войдите email/паролем.');
    return;
  }
  const profileUser = await loadProfileForUser(data.user);
  await setLoggedInUser(profileUser || { id: data.user.id, email, fullName, group: groupName, groupId: group.id, role: 'student' });
  state.authMessage = '';
  render();
}

async function verifyEmailCode(email, token) {
  if (!supabaseClient) {
    setAuthMessage('Supabase не загрузился. Проверь интернет и обнови страницу.');
    return;
  }
  setAuthMessage('Проверяем код...');
  const { data, error } = await supabaseClient.auth.verifyOtp({
    email,
    token,
    type: 'signup'
  });
  if (error) {
    setAuthMessage('Ошибка подтверждения: ' + error.message);
    return;
  }
  const authUser = data?.user || data?.session?.user;
  if (!authUser) {
    setAuthMessage('Код принят, но сессия не создана. Попробуй войти email и паролем.');
    return;
  }
  const profileUser = await loadProfileForUser(authUser);
  await setLoggedInUser(profileUser);
  state.authMessage = '';
  render();
}
async function handleLoginSubmit(e) {
  e.preventDefault();
  const form = e.currentTarget;
  const mode = form.mode.value;
  const email = form.email.value.trim();
  const password = form.password ? form.password.value : '';
  const token = form.token ? form.token.value.trim() : '';
  const fullName = form.fullName ? form.fullName.value.trim() : '';
  const group = form.group ? form.group.value.trim() : '';
  if (mode === 'verify') {
    if (!email || !token) {
      setAuthMessage('Введите email и код подтверждения.');
      return;
    }
    await verifyEmailCode(email, token);
    return;
  }
  if (!email || !password) {
    setAuthMessage('Введите email и пароль.');
    return;
  }
  if (mode === 'register') {
    if (!fullName || !group) {
      setAuthMessage('Для регистрации нужно ввести ФИО и выбрать группу.');
      return;
    }
    await registerStudent(email, password, fullName, group);
  } else {
    await loginStudent(email, password);
  }
}

function cardTagByState(type, colloqId) {

function questionTypeOf(item) {
  return String(item?.question_type || item?.questionType || 'multiple_select').trim() || 'multiple_select';
}
function taskDataOf(item) {
  return item?.task_data || item?.taskData || {};
}
function orderedIndexesEqual(a, b) {
  const x = (a || []).map(Number);
  const y = (b || []).map(Number);
  return x.length === y.length && x.every((v, i) => v === y[i]);
}

function prepareMcqItemForRun(item) {
  const qType = questionTypeOf(item);
  const sourceOptions = Array.isArray(item?.options) ? item.options : [];
  const taskData = taskDataOf(item);

  if (qType === 'dual_order_groups') {
    const groups = Array.isArray(taskData.groups) ? taskData.groups : [];
    const cards = Array.isArray(taskData.cards) ? taskData.cards : sourceOptions.map((text, idx) => ({ id: String(idx), text }));
    return {
      ...item,
      question_type: qType,
      task_data: {
        ...taskData,
        groups,
        cards: shuffle(cards.map(c => ({...c}))),
        correctOrders: taskData.correctOrders || taskData.correct_orders || {}
      }
    };
  }

  if (qType === 'drag_to_groups') {
    const groups = Array.isArray(taskData.groups) ? taskData.groups : [];
    const cards = Array.isArray(taskData.cards) ? taskData.cards : sourceOptions.map((text, idx) => ({ id: String(idx), text }));
    return {
      ...item,
      question_type: qType,
      task_data: {
        ...taskData,
        groups,
        cards: shuffle(cards.map(c => ({...c}))),
        correctGroups: taskData.correctGroups || taskData.correct_groups || {}
      }
    };
  }

  const correctSource = Array.isArray(item?.correct_indexes) && item.correct_indexes.length
    ? item.correct_indexes.map(Number)
    : (Number.isFinite(Number(item?.correct_index)) ? [Number(item.correct_index)] : []);

  const mapped = sourceOptions.map((text, originalIndex) => ({ text, originalIndex }));
  const shuffled = shuffle(mapped);

  let correctIndexes;
  if (qType === 'definition_order') {
    correctIndexes = correctSource
      .map(originalIndex => shuffled.findIndex(opt => opt.originalIndex === originalIndex))
      .filter(idx => idx >= 0);
  } else {
    correctIndexes = shuffled
      .map((opt, idx) => correctSource.includes(opt.originalIndex) ? idx : -1)
      .filter(idx => idx >= 0);
  }

  return {
    ...item,
    question_type: qType,
    task_data: taskData,
    options: shuffled.map(opt => opt.text),
    correct_index: correctIndexes[0] ?? null,
    correct_indexes: correctIndexes,
    _originalCorrectIndexes: correctSource
  };
}

function currentMcqItem() {
  return state.mcqTest?.queue?.[state.mcqTest.currentIndex] || null;
}
function correctIndexesForMcq(item) {
  const arr = Array.isArray(item?.correct_indexes) && item.correct_indexes.length
    ? item.correct_indexes.map(Number)
    : (Number.isFinite(Number(item?.correct_index)) ? [Number(item.correct_index)] : []);
  return questionTypeOf(item) === 'definition_order'
    ? arr
    : Array.from(new Set(arr)).sort((a, b) => a - b);
}
function sameIndexSet(a, b) {
  const x = Array.from(new Set((a || []).map(Number))).sort((m, n) => m - n);
  const y = Array.from(new Set((b || []).map(Number))).sort((m, n) => m - n);
  return x.length === y.length && x.every((v, i) => v === y[i]);
}
function selectedOrderForCurrent() {
  const cur = currentMcqItem();
  if (!cur) return [];
  const total = Array.isArray(cur.options) ? cur.options.length : 0;
  if (Array.isArray(state.mcqTest?.selected) && state.mcqTest.selected.length === total) return state.mcqTest.selected.slice();
  return Array.from({length: total}, (_, i) => i);
}

function selectMcqOption(index) {
  const test = state.mcqTest;
  const cur = currentMcqItem();
  if (!test || test.checked || !cur) return;
  const qType = questionTypeOf(cur);

  if (qType === 'definition_order') return;

  const current = Array.isArray(test.selected) ? test.selected.slice() : [];
  const i = current.indexOf(index);

  if (qType === 'single_choice') {
    test.selected = [index];
  } else {
    if (i >= 0) current.splice(i, 1);
    else current.push(index);
    test.selected = current.sort((a, b) => a - b);
  }
  render();
}

function moveOrderItem(pos, direction) {
  const test = state.mcqTest;
  const cur = currentMcqItem();
  if (!test || test.checked || !cur) return;
  const order = selectedOrderForCurrent();
  const target = pos + direction;
  if (target < 0 || target >= order.length) return;
  const tmp = order[pos];
  order[pos] = order[target];
  order[target] = tmp;
  test.selected = order;
  render();
}

function handleGroupCardDragStart(event, encodedCardId) {
  if (state.mcqTest?.checked) return;
  event.dataTransfer.setData('text/plain', encodedCardId);
  event.dataTransfer.effectAllowed = 'move';
}

function allowGroupDrop(event) {
  if (state.mcqTest?.checked) return;
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
}

function handleGroupDrop(event, encodedGroupId) {
  if (state.mcqTest?.checked) return;
  event.preventDefault();
  const encodedCardId = event.dataTransfer.getData('text/plain');
  if (!encodedCardId) return;
  setGroupAnswer(decodeURIComponent(encodedCardId), encodedGroupId ? decodeURIComponent(encodedGroupId) : '');
}

function setGroupAnswer(cardId, groupId) {
  const test = state.mcqTest;
  if (!test || test.checked) return;
  const next = {...(test.groupAnswers || {})};
  if (groupId) next[cardId] = groupId;
  else delete next[cardId];
  test.groupAnswers = next;
  render();
}

function evaluateGroupAnswer(cur, groupAnswers) {
  const taskData = taskDataOf(cur);
  const groups = Array.isArray(taskData.groups) ? taskData.groups : [];
  const cards = Array.isArray(taskData.cards) ? taskData.cards : [];
  const correctGroups = taskData.correctGroups || taskData.correct_groups || {};
  const total = cards.length;
  let matched = 0;
  const expectedByCard = {};
  Object.entries(correctGroups).forEach(([groupId, cardIds]) => {
    (cardIds || []).forEach(cardId => { expectedByCard[cardId] = groupId; });
  });
  cards.forEach(card => {
    if (groupAnswers?.[card.id] && expectedByCard[card.id] && groupAnswers[card.id] === expectedByCard[card.id]) matched++;
  });
  const ok = total > 0 && matched === total;
  const correctText = groups.map(g => `${g.title}: ${(correctGroups[g.id] || [])
    .map(cardId => cards.find(c => c.id === cardId)?.text || cardId).join(', ')}`).join('; ');
  return { ok, matched, total, correctText };
}

function checkMcqAnswer() {
  const test = state.mcqTest;
  const cur = currentMcqItem();
  if (!test || !cur) return;

  const qType = questionTypeOf(cur);
  let ok = false;
  let selectedPayload = [];
  let correctPayload = correctIndexesForMcq(cur);
  let correctText = '';

  if (qType === 'drag_to_groups') {
    const cards = taskDataOf(cur).cards || [];
    if (cards.some(card => !test.groupAnswers?.[card.id])) {
      alert('Сначала распределите все карточки по группам.');
      return;
    }
    const res = evaluateGroupAnswer(cur, test.groupAnswers || {});
    ok = res.ok;
    selectedPayload = {...(test.groupAnswers || {})};
    correctPayload = taskDataOf(cur).correctGroups || taskDataOf(cur).correct_groups || {};
    correctText = res.correctText;
  } else if (qType === 'dual_order_groups') {
    const {groups, cards} = dualDataOf(cur);
    const assigned = new Set(Object.values(test.dualAnswers || {}).flatMap(arr => arr || []));
    if (cards.some(card => !assigned.has(card.id))) {
      alert('Сначала распределите все стадии по двум дифферонам.');
      return;
    }
    const res = evaluateDualOrderAnswer(cur, test.dualAnswers || {});
    ok = res.ok;
    selectedPayload = {...(test.dualAnswers || {})};
    correctPayload = dualDataOf(cur).correctOrders || {};
    correctText = res.correctText;
  } else if (qType === 'definition_order') {
    const order = selectedOrderForCurrent();
    const correctIndexes = correctIndexesForMcq(cur);
    ok = orderedIndexesEqual(order, correctIndexes);
    selectedPayload = order;
    correctPayload = correctIndexes;
    correctText = correctIndexes.map(i => cur.options?.[i] || '').join(' ');
  } else {
    if (!Array.isArray(test.selected) || !test.selected.length) {
      alert('Сначала выбери один или несколько вариантов ответа.');
      return;
    }
    const correctIndexes = correctIndexesForMcq(cur);
    ok = sameIndexSet(test.selected, correctIndexes);
    selectedPayload = test.selected.slice();
    correctPayload = correctIndexes;
    correctText = correctIndexes.map(i => cur.options?.[i] || '').filter(Boolean).join('; ') || cur.correct_answer || '';
  }

  test.answers[test.currentIndex] = {
    itemId: cur.id,
    selected: selectedPayload,
    correctIndexes: correctPayload,
    correctText,
    ok,
    questionType: qType,
  };

  test.attempts = (test.attempts || 0) + 1;
  if (ok) test.correctCount = (test.correctCount || 0) + 1;
  else test.wrongCount = (test.wrongCount || 0) + 1;

  if (test.mode === 'drill' && !ok) {
    test.queue.push(prepareMcqItemForRun(deepClone(cur)));
  }

  test.checked = true;
  render();
}

function resetMcqAttemptState() {
  if (!state.mcqTest) return;
  state.mcqTest.selected = [];
  state.mcqTest.groupAnswers = {};
  state.mcqTest.dualAnswers = {};
  state.mcqTest.checked = false;
}

function nextMcqQuestion() {
  const test = state.mcqTest;
  if (!test) return;

  if (test.currentIndex >= test.queue.length - 1) {
    finishMcqTest();
    return;
  }
  test.currentIndex++;
  resetMcqAttemptState();
  render();
}

function finishMcqTest() {
  if (!state.mcqTest) return;
  state.mcqTest.finished = true;
  render();
}


function dualDataOf(cur) {
  const data = taskDataOf(cur);
  return {
    groups: Array.isArray(data.groups) ? data.groups : [],
    cards: Array.isArray(data.cards) ? data.cards : [],
    correctOrders: data.correctOrders || data.correct_orders || {}
  };
}
function dualAssignedIds() {
  const ans = state.mcqTest?.dualAnswers || {};
  return new Set(Object.values(ans).flatMap(arr => Array.isArray(arr) ? arr : []));
}
function dualCardById(cur, id) {
  return (dualDataOf(cur).cards || []).find(c => c.id === id);
}
function handleDualCardDragStart(event, encodedCardId) {
  if (state.mcqTest?.checked) return;
  event.dataTransfer.setData('text/plain', encodedCardId);
  event.dataTransfer.effectAllowed = 'move';
}
function allowDualDrop(event) {
  if (state.mcqTest?.checked) return;
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
}
function removeDualCardFromAll(cardId) {
  const test = state.mcqTest;
  if (!test) return;
  const next = {...(test.dualAnswers || {})};
  Object.keys(next).forEach(gid => {
    next[gid] = (next[gid] || []).filter(id => id !== cardId);
  });
  test.dualAnswers = next;
}
function handleDualDrop(event, encodedGroupId) {
  if (state.mcqTest?.checked) return;
  event.preventDefault();
  const encodedCardId = event.dataTransfer.getData('text/plain');
  if (!encodedCardId) return;
  const cardId = decodeURIComponent(encodedCardId);
  const groupId = encodedGroupId ? decodeURIComponent(encodedGroupId) : '';
  removeDualCardFromAll(cardId);
  if (groupId) {
    const next = {...(state.mcqTest.dualAnswers || {})};
    next[groupId] = [...(next[groupId] || []), cardId];
    state.mcqTest.dualAnswers = next;
  }
  render();
}
function moveDualCard(groupId, index, delta) {
  const test = state.mcqTest;
  if (!test || test.checked) return;
  const next = {...(test.dualAnswers || {})};
  const arr = [...(next[groupId] || [])];
  const target = index + delta;
  if (target < 0 || target >= arr.length) return;
  const tmp = arr[index];
  arr[index] = arr[target];
  arr[target] = tmp;
  next[groupId] = arr;
  test.dualAnswers = next;
  render();
}
function expectedDualGroup(cur, cardId) {
  const {correctOrders} = dualDataOf(cur);
  for (const [gid, ids] of Object.entries(correctOrders)) {
    if ((ids || []).includes(cardId)) return gid;
  }
  return '';
}
function expectedDualPosition(cur, cardId) {
  const {correctOrders} = dualDataOf(cur);
  for (const ids of Object.values(correctOrders)) {
    const idx = (ids || []).indexOf(cardId);
    if (idx >= 0) return idx;
  }
  return -1;
}
function renderDualCard(cur, cardId, groupId, idx, checked) {
  const card = dualCardById(cur, cardId);
  if (!card) return '';
  const expectedGroup = expectedDualGroup(cur, cardId);
  const expectedPos = expectedDualPosition(cur, cardId);
  const groupOk = checked && groupId === expectedGroup;
  const posOk = checked && groupOk && idx === expectedPos;
  const groupWrong = checked && groupId && groupId !== expectedGroup;
  const posWrong = checked && groupOk && idx !== expectedPos;
  const cls = posOk ? 'correct' : groupWrong ? 'wrong' : posWrong ? 'semi' : '';
  return `
    <div class="dual-card ${cls}" draggable="${checked ? 'false' : 'true'}" ondragstart="handleDualCardDragStart(event, '${encodeURIComponent(cardId)}')">
      <b>${safeText(card.text)}</b>
      ${groupId && !checked ? `
        <div class="dual-card-actions">
          <button type="button" class="ghost small-btn" onclick="moveDualCard('${safeText(groupId)}', ${idx}, -1)">↑</button>
          <button type="button" class="ghost small-btn" onclick="moveDualCard('${safeText(groupId)}', ${idx}, 1)">↓</button>
          <button type="button" class="ghost small-btn" onclick="removeDualCardFromAll('${safeText(cardId)}'); render();">×</button>
        </div>` : ''}
    </div>
  `;
}
function renderDualOrderGroupsQuestion(cur) {
  const {groups, cards} = dualDataOf(cur);
  const checked = state.mcqTest?.checked;
  const answers = state.mcqTest?.dualAnswers || {};
  const assigned = dualAssignedIds();
  const unassigned = cards.filter(c => !assigned.has(c.id));
  return `
    <p class="tiny" style="margin-top:6px">Распредели карточки между двумя дифферонами и расставь порядок стрелками ↑ ↓.</p>
    <div class="dual-board">
      <div class="dual-column source" ondragover="allowDualDrop(event)" ondrop="handleDualDrop(event, '')">
        <div class="group-column-head"><strong>Карточки</strong><span>${unassigned.length}</span></div>
        <div class="dual-dropzone ${unassigned.length ? '' : 'empty'}">
          ${unassigned.length ? unassigned.map(c => renderDualCard(cur, c.id, '', -1, checked)).join('') : '<div class="drop-hint">Все карточки распределены</div>'}
        </div>
      </div>
      ${groups.map(g => {
        const ids = answers[g.id] || [];
        return `
          <div class="dual-column" ondragover="allowDualDrop(event)" ondrop="handleDualDrop(event, '${encodeURIComponent(g.id)}')">

            <div class="dual-dropzone ${ids.length ? '' : 'empty'}">
              ${ids.length ? ids.map((id, idx) => renderDualCard(cur, id, g.id, idx, checked)).join('') : '<div class="drop-hint">Перетащите стадии сюда</div>'}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}
function evaluateDualOrderAnswer(cur, answers) {
  const {groups, correctOrders} = dualDataOf(cur);
  const ok = groups.every(g => {
    const user = answers?.[g.id] || [];
    const correct = correctOrders?.[g.id] || [];
    return user.length === correct.length && user.every((id, idx) => id === correct[idx]);
  });
  const correctText = groups.map(g => `${g.title}: ${(correctOrders?.[g.id] || []).map(id => dualCardById(cur, id)?.text || id).join(' → ')}`).join('; ');
  return {ok, correctText};
}


function userAnswerText(item, answer) {

  if (qType === 'drag_to_groups') {

    const groups = data.groups || [];

  }
  return Array.isArray(answer?.selected) && answer.selected.length
    ? answer.selected.map(i => item.options?.[i] ?? '').filter(Boolean).join('; ')
    : '—';
}

function correctAnswerText(item, answer) {

  if (qType === 'drag_to_groups') return answer?.correctText || evaluateGroupAnswer(item, {}).correctText || item.correct_answer || '—';
  if (qType === 'definition_order') {

    return correct.map(i => item.options?.[i] || '').join(' ') || item.correct_answer || '—';
  }
  if (qType === 'dual_order_groups') return answer?.correctText || evaluateDualOrderAnswer(item, {}).correctText || item.correct_answer || '—';
  const correctArr = Array.isArray(answer?.correctIndexes) && answer.correctIndexes.length ? answer.correctIndexes : correctIndexesForMcq(item);
  return correctArr.map(i => item.options?.[i] ?? '').filter(Boolean).join('; ') || item.correct_answer || '—';
}

function expectedGroupForCard(cur, cardId) {
  const taskData = taskDataOf(cur);
  const correctGroups = taskData.correctGroups || taskData.correct_groups || {};
  let expected = '';
  Object.entries(correctGroups).forEach(([groupId, cardIds]) => {
    if ((cardIds || []).includes(cardId)) expected = groupId;
  });
  return expected;
}

function renderGroupDraggableCard(cur, card, checked) {
  const answers = state.mcqTest?.groupAnswers || {};
  const current = answers[card.id] || '';
  const expected = expectedGroupForCard(cur, card.id);
  const isCorrect = checked && current && current === expected;
  const isWrong = checked && current && current !== expected;
  const encoded = encodeURIComponent(card.id);

  return `
    <div class="drag-card ${isCorrect ? 'correct' : ''} ${isWrong ? 'wrong' : ''}"
      draggable="${checked ? 'false' : 'true'}"
      ondragstart="handleGroupCardDragStart(event, '${encoded}')">

function nextTrainingQuestion() {
  if (!state.training) return;
  if (state.training.awaitingGrade) return;
  if (!state.training.queue.length) {
    state.training.done = true;
    state.training.current = null;
    render();

  }
  state.training.current = state.training.queue.shift();
  state.training.currentAttempt = {};
  state.training.lastResult = null;
  state.training.resultDetail = null;
  state.training.awaitingGrade = false;
  state.training.evaluation = null;
  state.training.selectedGrade = null;
  state.training.questionStartedAt = Date.now();
  state.training.currentElapsedSec = null;
  render();
}
function clampGrade(v) {
  return clamp(Number(v) || 0, 2, 5);
}
function ratingLabel(g) {
  return ({2:'2 — не засчитано', 3:'3 — частично', 4:'4 — почти верно', 5:'5 — отлично'})[g] || String(g || '');
}
function evaluateItem(item, attempt) {
  const cur = item || {};
  const a = attempt || {};
  if (cur.type === 'micro') {
    const nameOk = sameText(a.name, cur.name) || normalize(cur.name).includes(normalize(a.name || ''));
    const stainOk = sameStain(a.stain, cur.stain);
    const ok = nameOk && stainOk;
    return {
      ok,
      suggestedGrade: ok ? 5 : 2,
      detail: ok ? `Верно: ${cur.name} / ${cur.stain}` : `Правильно: ${cur.name} / ${cur.stain}`,
      title: cur.name || cur.title || ''
    };
  }
  if (cur.type === 'scheme') {
    const titleOk = sameText(a.schemeTitle, cur.title);
    const labels = cur.labels || {};
    let good = 0;
    const total = Math.max(1, Object.keys(labels).length);
    for (const key of Object.keys(labels)) {
      if (sameText(a.labels?.[key], labels[key])) good++;
    }
    const ratio = good / total;
    let suggestedGrade = 2;
    if (titleOk && ratio === 1) suggestedGrade = 5;
    else if (titleOk && ratio >= 0.5) suggestedGrade = 4;
    else if (titleOk) suggestedGrade = 3;
    const ok = suggestedGrade >= 5;
    return {
      ok,
      suggestedGrade,
      detail: titleOk
        ? `Название верное. Подписей угадано: ${good}/${total}.`
        : `Название схемы не совпало. Правильно: ${cur.title}.`,
      title: cur.title || ''
    };
  }
  if (cur.type === 'theory') {
    const entered = String(a.answer || '').trim();
    return {
      ok: false,
      suggestedGrade: entered ? 3 : 2,
      detail: 'Сложный теоретический ответ. Поставьте себе оценку после проверки.',
      title: cur.question || ''
    };
  }
  if (cur.type === 'task') {
    const entered = a.answer || '';
    const num = numericLike(entered);
    const target = numericLike(cur.answer);
    let ok = false;
    if (num !== null && target !== null) {
      ok = Math.abs(num - target) / Math.max(1, Math.abs(target)) <= 0.05;
    } else {
      ok = matchVariants(entered, cur.answerVariants || cur.answer);
    }
    return {
      ok,
      suggestedGrade: ok ? 5 : 2,
      detail: ok ? 'Решение верно.' : `Правильно: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`,
      title: cur.question || ''
    };
  }
  return { ok:false, suggestedGrade:3, detail:'', title:'' };
}
function applyGradeToProgress(item, grade) {
  if (!state.progress || !item) return;
  if (grade === 5 && !state.progress.learnedIds.includes(item.id)) state.progress.learnedIds.push(item.id);
  state.progress.score = (state.progress.score || 0) + clampGrade(grade);
  updateStreak();
  saveProgress();
}
function submitTrainingAnswer() {
  const tr = state.training;
  if (!tr || !tr.current || tr.awaitingGrade || tr.microTimedOut) return;
  const cur = tr.current;
  const elapsed = tr.questionStartedAt ? Math.max(0, Math.round((Date.now() - tr.questionStartedAt) / 1000)) : null;
  tr.currentElapsedSec = elapsed;
  const evalData = evaluateItem(cur, tr.currentAttempt);
  if (cur.type === 'micro' && elapsed !== null) {
    evalData.detail = `${evalData.detail}. Время ответа: ${elapsed} сек${elapsed > 40 ? ' (больше 25 сек)' : ''}.`;
  }
  tr.awaitingGrade = true;
  tr.evaluation = evalData;
  tr.lastResult = evalData.ok;
  tr.resultDetail = evalData.detail;
  tr.selectedGrade = clampGrade(evalData.suggestedGrade || 3);
  render();
}
function finalizeTrainingGrade(grade) {
  const tr = state.training;
  if (!tr || !tr.current || !tr.awaitingGrade) return;
  const cur = tr.current;
  const g = clampGrade(grade);
  tr.answered = (tr.answered || 0) + 1;
  tr.gradeHistory = tr.gradeHistory || [];
  tr.gradeHistory.push({id: cur.id, grade: g, elapsedSec: tr.currentElapsedSec});
  if (tr.kind === 'micro' && typeof tr.currentElapsedSec === 'number') {
    tr.timeHistory = tr.timeHistory || [];
    tr.timeHistory.push({id: cur.id, elapsedSec: tr.currentElapsedSec, grade: g});
  }
  tr.correct = (tr.correct || 0) + (g === 5 ? 1 : 0);
  applyGradeToProgress(cur, g);
  tr.lastGrade = g;
  tr.lastResult = g === 5;
  tr.resultDetail = `${tr.evaluation?.detail || ''} Итоговая оценка: ${g}/5.`;
  tr.awaitingGrade = false;
  tr.evaluation = null;
  tr.selectedGrade = null;
  if (g === 5) {
    nextTrainingQuestion();
    return;
  }

  if (tr.kind === 'micro' && tr.microMode === 'final') {
    // Итоговое тестирование: каждый препарат показывается один раз.
    nextTrainingQuestion();
    return;
  }

  if (tr.kind === 'micro' && tr.microMode === 'drill') {
    // Нарешка препаратов: ошибка всегда возвращается в конец очереди.
    tr.queue.push(deepClone(cur));
    nextTrainingQuestion();
    return;
  }

  if (Math.random() < 0.5) {
    tr.queue.push(cur);
  } else {
    const maxGap = Math.min(3, Math.max(1, tr.queue.length));
    const gap = 1 + Math.floor(Math.random() * maxGap);
    const pos = Math.min(tr.queue.length, gap);
    tr.queue.splice(pos, 0, cur);
  }
  nextTrainingQuestion();
}

function buildExamTicket() {
  const pool = {
    micro: shuffle(allMicro()),
    scheme: shuffle(allSchemes()),
    theory: shuffle(allTheory()),
    task: shuffle(allTasks()),
  };
  const take = (arr, n, fallbackFactory) => {
    const out = [];
    for (let i = 0; i < n; i++) {
      if (arr.length) out.push(arr.shift());
      else out.push(fallbackFactory(i));
    }
    return out;
  };
  const dummy = {
    micro: i => ({id:`dummy_micro_${i}`, type:'micro', name:'Материал', stain:'Окраска не указана', image_url: microSvg('Материал', 'Заполните массив microscopy', 'dummy'+i), colloqId:'dummy'}),
    scheme: i => ({id:`dummy_scheme_${i}`, type:'scheme', title:'Материал', labels:{'1':'...', '2':'...'}, image_url: schemeSvg({id:`dummy_scheme_${i}`, title:'Материал', labels:{'1':'...','2':'...'}}), colloqId:'dummy'}),
    theory: i => ({id:`dummy_theory_${i}`, type:'theory', question:'Материал', answerVariants:['Материал'], colloqId:'dummy'}),
    task: i => ({id:`dummy_task_${i}`, type:'task', question:'Материал', answer:'Материал', answerVariants:['Материал'], colloqId:'dummy'}),
  };
  const ticket = [
    ...take(pool.micro, 2, dummy.micro),
    ...take(pool.scheme, 1, dummy.scheme),
    ...take(pool.theory, 2, dummy.theory),
    ...take(pool.task, 2, dummy.task),
  ].map((item, idx) => ({...item, ticketIndex: idx + 1}));
  return ticket;
}

    student_name: state.user.fullName || '',
    group_name: state.user.group || '',

    duration_seconds: Math.max(0, Math.round(((record.finishedAt || Date.now()) - (record.startedAt || Date.now())) / 1000)),
    answers_json: record

  if (error) {
    console.warn('Ошибка сохранения результата в Supabase:', error);

async function finalizeExamGrades() {
  const ex = state.exam;
  if (!ex || ex.finalized) return;
  ex.finalized = true;
  const answers = ex.answers || [];
  const items = ex.ticket || [];
  const grades = items.map((item, idx) => clampGrade(answers[idx]?.grade ?? answers[idx]?.suggestedGrade ?? (item.type === 'theory' ? 3 : 2)));
  const avg = grades.length ? grades.reduce((s, v) => s + v, 0) / grades.length : 0;
  const finalMark = grades.length ? Math.round(avg) : 0;
  items.forEach((item, idx) => {
    const grade = grades[idx];
    if (item) applyGradeToProgress(item, grade);
  });
  const examRecord = {
    id: `exam_${Date.now()}`,
    startedAt: ex.startedAt,
    finishedAt: Date.now(),
    durationMinutes: Math.round((ex.duration || 0) / 60000) || 90,
    avg: Number(avg.toFixed(2)),
    finalMark,

    groupName: state.user?.group || '',
    items: items.map((item, idx) => ({

function renderTraining() {
  const tr = state.training;

    const percent = total ? Math.round(correct / total * 100) : 0;
    const times = Array.isArray(tr.timeHistory) ? tr.timeHistory.map(x => Number(x.elapsedSec)).filter(Number.isFinite) : [];
    const avgTime = times.length ? Math.round(times.reduce((s, v) => s + v, 0) / times.length) : null;
    const timeoutCount = Array.isArray(tr.timeHistory) ? tr.timeHistory.filter(x => x.timeout).length : 0;
    return `

              ? `Итоговое тестирование завершено. Правильно: <strong>${correct}</strong> из <strong>${total}</strong>. Результат: <strong>${percent}%</strong>.`

            <button class="ghost" onclick="showView('dashboard')">Вернуться на дашборд</button>

      </div>

function renderExam() {
  const ex = state.exam;
  if (!ex) return '';
  const cur = currentExamItem();
  const timer = formatTime(remainingExamTime());

  if (ex.finished) {
    const answers = ex.answers || [];
    const items = ex.ticket || [];
    const grades = items.map((item, idx) => {
      const a = answers[idx] || {};
      return clampGrade(a.grade ?? a.suggestedGrade ?? (item.type === 'theory' ? 3 : item.type === 'scheme' ? 2 : 2));
    });
    const avg = grades.length ? (grades.reduce((s, v) => s + v, 0) / grades.length) : 0;
    const avgText = avg ? avg.toFixed(2) : '0.00';
    const finalMark = avg ? Math.round(avg) : 0;
    return `
      <div class="shell">
        <div class="backline">
          <button class="ghost" onclick="showView('dashboard')">← Назад</button>
          <div class="muted">Экзамен · итоговая оценка</div>

        </div>
        <div class="panel pad">

          <div class="results">
            ${items.map((item, idx) => {
              const a = answers[idx] || {};
              const grade = clampGrade(a.grade ?? a.suggestedGrade ?? (item.type === 'theory' ? 3 : item.type === 'scheme' ? 2 : 2));
              const label = item?.type === 'micro' ? (item?.name || item?.title || '') : item?.type === 'scheme' ? (item?.title || '') : item?.question || '';
              const detail = a?.detail || 'Ответ не зафиксирован.';
              const suggestion = a?.suggestedGrade ? `Рекомендация: ${a.suggestedGrade}/5.` : '';
              return `
                <div class="result-row ${grade === 5 ? 'ok' : 'bad'}">
                  <div style="flex:1">
                    <strong>№${idx + 1}. ${safeText(label)}</strong>
                    <div class="tiny">${safeText(detail)}</div>
