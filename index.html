              материнские сосуды и участки фибриноида.
            </p>

            <p>
              Главный диагностический признак материнской части плаценты — наличие
              <b>децидуальных клеток</b> и соединительнотканных перегородок, между которыми
              находятся пространства, заполненные материнской кровью. В эти пространства
              погружены ворсины хориона, относящиеся уже к плодной части плаценты.
            </p>

            <p>
              В отличие от плодной части, где основным ориентиром являются ворсины хориона
              с сосудами плода, материнская часть связана с изменённым эндометрием. Здесь
              важны децидуальная ткань, материнские сосуды, септы и базальная пластинка.
            </p>

            <p>
              Препарат материнской части плаценты не следует путать с обычной маткой.
              В матке вне беременности видны эндометрий с маточными железами и миометрий.
              В материнской части плаценты эндометрий уже преобразован в децидуальную ткань,
              а его структура перестроена из-за внедрения ворсин хориона и образования лакун.
            </p>

            <h3>Общее строение материнской части плаценты</h3>

            <p>
              Плацента состоит из двух компонентов: плодного и материнского. Плодная часть
              образована ветвистым хорионом, а материнская часть — базальной децидуальной
              оболочкой эндометрия. Материнская часть формируется в области имплантации
              зародыша.
            </p>

            <p>
              В процессе развития ворсины хориона внедряются в decidua basalis и разрушают
              часть её ткани. В результате образуются полости — <b>лакуны</b>, заполненные
              материнской кровью. Между лакунами сохраняются участки децидуальной ткани —
              <b>септы</b>, или плацентарные перегородки.
            </p>

            <p>
              Таким образом, материнская часть плаценты — это не просто участок слизистой
              оболочки матки, а глубоко перестроенный эндометрий, связанный с ворсинами
              хориона, материнским кровотоком и системой плацентарного обмена.
            </p>

            <p>
              В материнской части выделяют <b>базальную пластинку</b>, <b>септы</b>,
              <b>лакуны</b>, материнские сосуды, децидуальные клетки и участки фибриноида.
              Эти структуры обеспечивают фиксацию плодной части плаценты и участие
              материнской крови в обмене с плодом.
            </p>
          </div>

          <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
            <h3>Decidua basalis</h3>

            <p>
              <b>Decidua basalis</b> — это базальная часть децидуальной оболочки, лежащая
              под имплантированным зародышем. Именно она образует материнский компонент
              плаценты. В отличие от обычного эндометрия, decidua basalis содержит крупные
              децидуальные клетки и подвергается выраженной структурной перестройке.
            </p>

            <p>
              Децидуальная оболочка формируется из эндометрия под влиянием беременности.
              Стромальные клетки эндометрия увеличиваются, становятся крупными,
              светлыми, богатыми цитоплазмой и превращаются в <b>децидуальные клетки</b>.
            </p>

            <p>
              Децидуальная ткань выполняет несколько функций. Она участвует в фиксации
              плаценты, регулирует глубину внедрения трофобласта, образует материнскую
              основу плаценты и участвует в иммунологическом взаимодействии между организмом
              матери и тканями плода.
            </p>

            <p>
              В материнской части плаценты decidua basalis уже не имеет вида обычной
              слизистой оболочки матки. Она пронизана ворсинами хориона, разделена на
              участки, содержит лакуны с материнской кровью и участвует в формировании
              базальной пластинки и септ.
            </p>

            <h3>Децидуальные клетки</h3>

            <p>
              Децидуальные клетки — главный клеточный элемент материнской части плаценты.
              Они происходят из клеток стромы эндометрия, которые во время беременности
              претерпевают децидуальную трансформацию.
            </p>

            <p>
              Эти клетки крупные, округлые или полигональные, имеют светлую цитоплазму
              и хорошо выраженное ядро. Их цитоплазма богата включениями, связанными
              с накоплением питательных веществ и активным обменом.
            </p>

            <p>
              Децидуальные клетки не являются эпителием. Это изменённые клетки
              соединительнотканной стромы эндометрия. Их появление отражает глубокую
              гормонально обусловленную перестройку слизистой оболочки матки при
              беременности.
            </p>

            <p>
              В препарате децидуальные клетки помогают отличить материнскую часть
              плаценты от плодной. В плодной части основными структурами являются ворсины
              хориона с трофобластом и сосудами плода, а в материнской — децидуальная
              ткань и материнские сосуды.
            </p>
          </div>

          <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
            <h3>Лакуны</h3>

            <p>
              <b>Лакуны</b> — это пространства в материнской части плаценты, образовавшиеся
              в результате разрушения ткани decidua basalis ворсинами хориона. Они заполнены
              материнской кровью.
            </p>

            <p>
              В лакунах находятся ворсины хориона. Часть ворсин свободно омывается
              материнской кровью, часть может быть фиксирована к материнским структурам.
              Именно в области лакун происходит непосредственное омывание ворсин хориона
              материнской кровью.
            </p>

            <p>
              Лакуны являются важнейшим элементом гемохориальной плаценты человека.
              Поскольку ворсины хориона погружены прямо в материнскую кровь, ткани матери
              не входят в состав гематоплацентарного барьера. Барьер между кровью матери
              и кровью плода образован структурами ворсин хориона, то есть тканями плода.
            </p>

            <p>
              На препарате лакуны могут выглядеть как широкие пространства между
              децидуальными перегородками и ворсинами. Если в них сохранилась кровь, они
              содержат эритроциты материнского происхождения.
            </p>

            <h3>Септы</h3>

            <p>
              <b>Септы</b> — это соединительнотканные перегородки между лакунами.
              Они являются остатками decidua basalis на тех участках, куда внедрились
              ворсины хориона.
            </p>

            <p>
              Септы разделяют материнскую часть плаценты на участки и частично
              разграничивают межворсинчатое пространство. Они не изолируют полностью
              отдельные области, но создают структурную организацию плацентарной ткани.
            </p>

            <p>
              В септах проходят материнские сосуды, открывающиеся в лакуны. По этим
              сосудам материнская кровь поступает в межворсинчатое пространство и
              омывает ворсины хориона.
            </p>

            <p>
              На поверхности септ, граничащей с кровью, может находиться <b>фибриноид
              Рора</b>. Он представляет собой фибриноподобный материал, связанный с
              компонентами крови и продуктами распада подлежащей ткани.
            </p>
          </div>

          <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
            <h3>Базальная пластинка</h3>

            <p>
              <b>Базальная пластинка</b> — часть материнского компонента плаценты,
              расположенная со стороны эндометрия. Она соответствует глубокой зоне
              decidua basalis и служит основанием материнской части плаценты.
            </p>

            <p>
              Базальная пластинка содержит децидуальные клетки, соединительнотканные
              элементы, материнские сосуды, участки фибриноида и трофобластические
              клетки, связанные с прикреплением ворсин.
            </p>

            <p>
              В области базальной пластинки происходит контакт плодной части плаценты
              с материнской тканью. Сюда могут прикрепляться якорные ворсины хориона.
              Поэтому базальная пластинка имеет значение для фиксации плаценты к стенке
              матки.
            </p>

            <p>
              При рассмотрении препарата важно отличать базальную пластинку от хориальной
              пластинки. Хориальная пластинка относится к плодной части и лежит со стороны
              плода, а базальная пластинка относится к материнской части и связана с
              decidua basalis.
            </p>

            <h3>Материнские сосуды</h3>

            <p>
              Материнские сосуды проходят в децидуальной ткани и септах. Они открываются
              в лакуны, благодаря чему материнская кровь поступает в межворсинчатое
              пространство.
            </p>

            <p>
              В норме материнская кровь свободно омывает ворсины хориона, но не смешивается
              с кровью плода. Между двумя кровотоками находится гематоплацентарный барьер,
              образованный стенкой ворсин хориона и капиллярами плода.
            </p>

            <p>
              Перестройка материнских сосудов имеет большое значение для нормальной
              работы плаценты. Сосуды должны обеспечивать достаточный приток крови
              к межворсинчатому пространству, иначе нарушается обмен между матерью
              и плодом.
            </p>
          </div>

          <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
            <h3>Фибриноид Рора</h3>

            <p>
              <b>Фибриноид Рора</b> может находиться на поверхности септ, обращённой
              к материнской крови. Он представляет собой неклеточный фибриноподобный
              материал.
            </p>

            <p>
              Фибриноид Рора связан с компонентами материнской крови и продуктами
              распада подлежащей ткани. Он возникает в местах контакта материнских
              структур с кровью и трофобластическими элементами.
            </p>

            <p>
              Фибриноид нужно отличать от клеточных структур. Он не имеет собственной
              клеточной организации, выглядит как однородная или слабо структурированная
              масса и может располагаться на границе тканей.
            </p>

            <p>
              В умеренном количестве фибриноид может встречаться в нормальной плаценте.
              Однако избыточное отложение фибриноида может уменьшать активную поверхность
              обмена и участвовать в развитии плацентарной недостаточности.
            </p>

            <h3>Связь с плодной частью</h3>

            <p>
              Материнская часть плаценты тесно связана с плодной частью. В лакуны
              материнской части погружены ворсины хориона, принадлежащие плоду.
              Поэтому в одном препарате могут одновременно встречаться структуры
              материнского и плодного происхождения.
            </p>

            <p>
              Плодная часть представлена ворсинами хориона, внутри которых находятся
              сосуды плода. Материнская часть представлена decidua basalis, лакунами,
              септами и материнскими сосудами.
            </p>

            <p>
              Функционально эти две части образуют единую систему. Материнская кровь
              поступает в лакуны и омывает ворсины хориона, а кровь плода течёт внутри
              сосудов ворсин. Между ними происходит обмен газами, питательными веществами
              и продуктами обмена.
            </p>
          </div>

          <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
            <h3>Гемохориальный тип плаценты</h3>

            <p>
              Плацента человека относится к <b>гемохориальному типу</b>. Это означает,
              что ворсины хориона непосредственно омываются материнской кровью.
            </p>

            <p>
              При таком типе плаценты ткани матери не участвуют в формировании
              гематоплацентарного барьера. Материнская кровь находится снаружи ворсин,
              а кровь плода — внутри сосудов ворсин.
            </p>

            <p>
              Между кровью матери и кровью плода остаются структуры ворсины:
              трофобластический покров, соединительная ткань ворсины и эндотелий
              капилляров плода. На поздних сроках беременности этот барьер истончается,
              что облегчает обмен.
            </p>

            <h3>Функции материнской части</h3>

            <p>
              Материнская часть плаценты участвует в прикреплении плаценты к стенке
              матки, обеспечении притока материнской крови к межворсинчатому пространству
              и формировании среды, в которой ворсины хориона могут выполнять обменную
              функцию.
            </p>

            <p>
              Decidua basalis также участвует в регуляции взаимодействия между тканями
              матери и плода. Децидуальная ткань ограничивает избыточную инвазию
              трофобласта и участвует в иммунологической адаптации беременности.
            </p>

            <p>
              Перед родами в децидуальной ткани усиливаются процессы, связанные
              с отделением плаценты. Это имеет значение для нормального последового
              периода, когда плацента должна отделиться от стенки матки.
            </p>
          </div>

          <div style="grid-column:1 / -1; background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
            <h3>Сравнение с другими препаратами</h3>

            <p>
              От плодной части плаценты материнская часть отличается преобладанием
              <b>decidua basalis</b>, септ, лакун и материнских сосудов. В плодной части
              основными ориентирами являются хориальная пластинка и ворсины хориона
              с сосудами плода.
            </p>

            <p>
              От матки вне беременности материнская часть плаценты отличается выраженной
              децидуальной трансформацией эндометрия, наличием лакун с материнской кровью
              и внедрением ворсин хориона.
            </p>

            <p>
              От препарата туловищных и амниотических складок она отличается отсутствием
              тела зародыша, амниотических складок, желточного мешка и ранних эмбриональных
              структур. Здесь представлен уже сформированный материнский компонент плаценты.
            </p>

            <h3>Клинические и патогистологические связи</h3>

            <p>
              Нарушение строения материнской части плаценты может приводить к плацентарной
              недостаточности. Если материнская кровь недостаточно поступает в лакуны,
              ворсины хориона хуже омываются кровью, и обмен между матерью и плодом
              нарушается.
            </p>

            <p>
              При нарушении перестройки материнских сосудов может снижаться маточно-
              плацентарный кровоток. Это может сопровождаться гипоксией плода, задержкой
              внутриутробного развития и другими осложнениями беременности.
            </p>

            <p>
              При воспалительных поражениях материнской части возможны клеточная
              инфильтрация децидуальной ткани, повреждение сосудов, тромбозы, фибриноидные
              отложения и нарушение нормальной структуры межворсинчатого пространства.
            </p>

            <p>
              При чрезмерном отложении фибриноида уменьшается площадь активного контакта
              материнской крови с ворсинами хориона. Это может ухудшать обменную функцию
              плаценты.
            </p>

            <p>
              При нарушении прикрепления плаценты возможны патологические формы
              врастания. Они связаны с неправильным взаимодействием ворсин хориона
              с децидуальной тканью и стенкой матки. Для точной диагностики таких
              состояний необходим материал по патологической анатомии и акушерской
              патологии.
            </p>

            <h3>Краткая выжимка</h3>

            <p>
              Материнская часть плаценты образована <b>decidua basalis</b>. Главные
              ориентиры препарата: <b>децидуальные клетки, лакуны с материнской кровью,
              септы, базальная пластинка, материнские сосуды, фибриноид Рора</b>.
            </p>

            <p>
              Главная идея препарата: ворсины хориона внедряются в базальную
              децидуальную оболочку, разрушают её участки и формируют лакуны,
              заполненные материнской кровью. Материнская кровь омывает ворсины хориона,
              но не смешивается с кровью плода.
            </p>

function normalize(s) {

function sameText(a, b) {
  const x = normalize(a);

  if (!x || !y) return false;
  if (x === y) return true;
  if (x.length >= 4 && y.includes(x)) return true;
  if (y.length >= 4 && x.includes(y)) return true;
  return false;
}

}

function countSchemeMatches(cur, attempt) {
  const labels = cur.labels || {};
  let matched = 0;
  if (sameText(attempt?.schemeTitle, cur.title)) matched++;
  for (const key of Object.keys(labels)) {
    if (sameText(attempt?.labels?.[key], labels[key])) matched++;
  }
  return { matched, total: Object.keys(labels).length + 1 };
}

function evaluateItem(cur, attempt) {
  let ok = false;
  let detail = '';
  if (cur.type === 'micro') {
    ok = sameText(attempt?.name, cur.name) && sameText(attempt?.stain, cur.stain);
    detail = ok ? `Верно: ${cur.name} / ${cur.stain}` : `Правильно: ${cur.name} / ${cur.stain}`;
  } else if (cur.type === 'scheme') {
    const { matched, total } = countSchemeMatches(cur, attempt);
    ok = matched / total >= 0.8;
    detail = ok ? 'Схема принята.' : `Правильно: ${cur.title}. Подписи: ${Object.entries(cur.labels || {}).map(([k,v]) => `${k}=${v}`).join('; ')}`;
  } else if (cur.type === 'theory') {
    ok = matchVariants(attempt?.answer, cur.answerVariants || cur.answer);
    detail = ok ? 'Ответ принят.' : `Эталон: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`;
  } else if (cur.type === 'task') {
    const entered = attempt?.answer || '';
    const num = numericLike(entered);
    const target = numericLike(cur.answer);
    if (num !== null && target !== null) {
      ok = Math.abs(num - target) / Math.max(1, Math.abs(target)) <= 0.05;
    } else {
      ok = matchVariants(entered, cur.answerVariants || cur.answer);
    }
    detail = ok ? 'Решение верно.' : `Правильно: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`;
  }
  return { ok, detail };
}

function gradeSuggestion(kind, cur, attempt, ok) {
  if (kind === 'micro') return ok ? 5 : 2;
  if (kind === 'task') return ok ? 5 : 2;
  if (kind === 'scheme') {
    const { matched, total } = countSchemeMatches(cur, attempt);
    const labelsTotal = Math.max(0, total - 1);
    const labelsMatched = Math.max(0, matched - 1);
    const titleOk = sameText(attempt?.schemeTitle, cur.title);
    if (titleOk && labelsMatched === labelsTotal && labelsTotal > 0) return 5;
    if (titleOk && labelsTotal > 0 && labelsMatched >= Math.ceil(labelsTotal / 2)) return 4;
    if (titleOk) return 3;
    return 2;
  }
  if (kind === 'theory') {
    const variants = Array.isArray(cur.answerVariants) ? cur.answerVariants : [cur.answer];
    if (matchVariants(attempt?.answer, variants)) return 5;
    const ref = normalize(variants[0] || '');
    const inp = normalize(attempt?.answer || '');
    if (!ref || !inp) return 2;
    const refTokens = new Set(ref.split(' ').filter(Boolean));
    const inpTokens = new Set(inp.split(' ').filter(Boolean));
    let hit = 0;
    for (const token of inpTokens) if (refTokens.has(token)) hit++;
    const ratio = refTokens.size ? hit / refTokens.size : 0;
    if (ratio >= 0.75) return 4;
    if (ratio >= 0.45) return 3;
    return 2;
  }
  return ok ? 5 : 2;
}

function evaluateItem(item, attempt) {
  const cur = item || {};
  const a = attempt || {};
  if (cur.type === 'micro') {
    const nameOk = sameText(a.name, cur.name) || normalize(cur.name).includes(normalize(a.name || ''));
    const stainOk = sameText(a.stain, cur.stain);
    const ok = nameOk && stainOk;
    return {
      ok,
      suggestedGrade: ok ? 5 : 2,
      detail: ok ? `Верно: ${cur.name} / ${cur.stain}` : `Правильно: ${cur.name} / ${cur.stain}`,
      title: cur.name || cur.title || ''
    };
  }
  if (cur.type === 'scheme') {
    const titleOk = sameText(a.schemeTitle, cur.title);
    const labels = cur.labels || {};
    let good = 0;
    const total = Math.max(1, Object.keys(labels).length);
    for (const key of Object.keys(labels)) {
      if (sameText(a.labels?.[key], labels[key])) good++;
    }
    const ratio = good / total;
    let suggestedGrade = 2;
    if (titleOk && ratio === 1) suggestedGrade = 5;
    else if (titleOk && ratio >= 0.5) suggestedGrade = 4;
    else if (titleOk) suggestedGrade = 3;
    const ok = suggestedGrade >= 5;
    return {
      ok,
      suggestedGrade,
      detail: titleOk
        ? `Название верное. Подписей угадано: ${good}/${total}.`
        : `Название схемы не совпало. Правильно: ${cur.title}.`,
      title: cur.title || ''
    };
  }
  if (cur.type === 'theory') {
    const entered = String(a.answer || '').trim();
    return {
      ok: false,
      suggestedGrade: entered ? 3 : 2,
      detail: 'Сложный теоретический ответ. Поставьте себе оценку после проверки.',
      title: cur.question || ''
    };
  }
  if (cur.type === 'task') {
    const entered = a.answer || '';
    const num = numericLike(entered);
    const target = numericLike(cur.answer);
    let ok = false;
    if (num !== null && target !== null) {
      ok = Math.abs(num - target) / Math.max(1, Math.abs(target)) <= 0.05;
    } else {
      ok = matchVariants(entered, cur.answerVariants || cur.answer);
    }
    return {
      ok,
      suggestedGrade: ok ? 5 : 2,
      detail: ok ? 'Решение верно.' : `Правильно: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`,
      title: cur.question || ''
    };
  }
  return { ok:false, suggestedGrade:3, detail:'', title:'' };
}
function applyGradeToProgress(item, grade) {
  if (!state.progress || !item) return;
  if (grade === 5 && !state.progress.learnedIds.includes(item.id)) state.progress.learnedIds.push(item.id);
  state.progress.score = (state.progress.score || 0) + clampGrade(grade);
  updateStreak();
  saveProgress();
}

  const tr = state.training;
  if (!tr || !tr.current || tr.awaitingGrade) return;
  const cur = tr.current;
  const evalData = evaluateItem(cur, tr.currentAttempt);
  tr.awaitingGrade = true;

  tr.lastResult = evalData.ok;

function finalizeTrainingGrade(grade) {
  const tr = state.training;
  if (!tr || !tr.current || !tr.awaitingGrade) return;
  const cur = tr.current;
  const g = clampGrade(grade);
  tr.answered = (tr.answered || 0) + 1;
  tr.gradeHistory = tr.gradeHistory || [];
  tr.gradeHistory.push({id: cur.id, grade: g});
  tr.correct = (tr.correct || 0) + (g === 5 ? 1 : 0);
  applyGradeToProgress(cur, g);
  tr.lastGrade = g;
  tr.lastResult = g === 5;
  tr.resultDetail = `${tr.evaluation?.detail || ''} Итоговая оценка: ${g}/5.`;
  tr.awaitingGrade = false;
  tr.evaluation = null;
  tr.selectedGrade = null;
  if (g === 5) {
    nextTrainingQuestion();
  } else {
    if (Math.random() < 0.5) {
      tr.queue.push(cur);
    } else {
      const maxGap = Math.min(3, Math.max(1, tr.queue.length));
      const gap = 1 + Math.floor(Math.random() * maxGap);
      const pos = Math.min(tr.queue.length, gap);
      tr.queue.splice(pos, 0, cur);
    }
    nextTrainingQuestion();
  }
}

function buildExamTicket() {
  const pool = {
    micro: shuffle(allMicro()),
    scheme: shuffle(allSchemes()),
    theory: shuffle(allTheory()),
    task: shuffle(allTasks()),
  };
  const take = (arr, n, fallbackFactory) => {
    const out = [];
    for (let i = 0; i < n; i++) {
      if (arr.length) out.push(arr.shift());
      else out.push(fallbackFactory(i));
    }
    return out;
  };
  const dummy = {
    micro: i => ({id:`dummy_micro_${i}`, type:'micro', name:'В разработке', stain:'В разработке', image_url: microSvg('В разработке', 'Заполните массив microscopy', 'dummy'+i), colloqId:'dummy'}),
    scheme: i => ({id:`dummy_scheme_${i}`, type:'scheme', title:'В разработке', labels:{'1':'...', '2':'...'}, image_url: schemeSvg({id:`dummy_scheme_${i}`, title:'В разработке', labels:{'1':'...','2':'...'}}), colloqId:'dummy'}),
    theory: i => ({id:`dummy_theory_${i}`, type:'theory', question:'В разработке', answerVariants:['В разработке'], colloqId:'dummy'}),
    task: i => ({id:`dummy_task_${i}`, type:'task', question:'В разработке', answer:'В разработке', answerVariants:['В разработке'], colloqId:'dummy'}),
  };
  const ticket = [
    ...take(pool.micro, 2, dummy.micro),
    ...take(pool.scheme, 1, dummy.scheme),
    ...take(pool.theory, 2, dummy.theory),
    ...take(pool.task, 2, dummy.task),
  ].map((item, idx) => ({...item, ticketIndex: idx + 1}));
  return ticket;
}

async function finalizeExamGrades() {
  const ex = state.exam;
  if (!ex || ex.finalized) return;
  ex.finalized = true;
  const answers = ex.answers || [];
  const items = ex.ticket || [];
  const grades = items.map((item, idx) => clampGrade(answers[idx]?.grade ?? answers[idx]?.suggestedGrade ?? (item.type === 'theory' ? 3 : 2)));
  const avg = grades.length ? grades.reduce((s, v) => s + v, 0) / grades.length : 0;
  const finalMark = grades.length ? Math.round(avg) : 0;
  items.forEach((item, idx) => {
    const grade = grades[idx];
    if (item) applyGradeToProgress(item, grade);
  });
  const examRecord = {
    id: `exam_${Date.now()}`,
    startedAt: ex.startedAt,
    finishedAt: Date.now(),
    durationMinutes: Math.round((ex.duration || 0) / 60000) || 90,
    avg: Number(avg.toFixed(2)),
    finalMark,
    grades,
    studentName: state.user?.fullName || '',

    items: items.map((item, idx) => ({
      type: item.type,

function closePrepModal() {

  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  document.getElementById('prepModalBody').innerHTML = '';
}
document.getElementById('prepModal').addEventListener('click', (e) => {
  if (e.target.id === 'prepModal') closePrepModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  const full = document.getElementById('fullscreenImageModal');
  if (full && full.classList.contains('open')) {
    closeFullscreenImage();
    return;
  }
  if (document.getElementById('prepModal').classList.contains('open')) closePrepModal();
});


function openFullscreenImage(src, caption = '') {
  const modal = document.getElementById('fullscreenImageModal');
  const img = document.getElementById('fullscreenImage');
  const cap = document.getElementById('fullscreenImageCaption');
  if (!modal || !img) return;
  img.src = src || '';
  img.alt = caption || 'Полноэкранный просмотр';
  if (cap) cap.textContent = caption || 'Нажмите Esc или по фону, чтобы закрыть';
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
}
function closeFullscreenImage() {
  const modal = document.getElementById('fullscreenImageModal');
  const img = document.getElementById('fullscreenImage');
  if (!modal) return;
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  if (img) img.src = '';
}

function renderExam() {
  const ex = state.exam;

  if (ex.finished) {
    const answers = ex.answers || [];
    const items = ex.ticket || [];
    const grades = items.map((item, idx) => {
      const a = answers[idx] || {};
      return clampGrade(a.grade ?? a.suggestedGrade ?? (item.type === 'theory' ? 3 : item.type === 'scheme' ? 2 : 2));
    });
    const avg = grades.length ? (grades.reduce((s, v) => s + v, 0) / grades.length) : 0;

    const finalMark = avg ? Math.round(avg) : 0;

function setExamGrade(index, grade) {
  const ex = state.exam;
  if (!ex || ex.finalized || !ex.answers || !ex.answers[index]) return;
  ex.answers[index].grade = clampGrade(grade);
  render();
}
function renderBank() {
  const cat = state.bankCategory;
  const map = {
    micro: {title:'Банк препаратов', items: allMicroBase(), subtitle:'Микрофотографии, названия, окраски, описание и варианты.'},
    scheme: {title:'Банк схем', items: allSchemes(), subtitle:'Схемы с маркировкой элементов.'},
    theory: {title:'Банк теории', items: allTheory(), subtitle:'Текстовые вопросы с эталонными ответами.'},
    task: {title:'Банк задач', items: allTasks(), subtitle:'Контрольные задачи и решения.'},
  };
  const data = map[cat];
  const cardHtml = data.items.map(item => {
    const learned = learnedSet().has(item.id);
    if (cat === 'micro' || cat === 'scheme') {
      return `
        <div class="bank-card">
          <img class="thumb" src="${resolveImageUrl(item)}" alt="${safeText(item.name || item.title)}" ${cat === 'micro' ? `onclick="openBankItem('${item.id}')"` : ''} />
          <div class="content">
            <div class="row">
              <h4>${safeText(item.name || item.title)}</h4>
              <span class="badge ${learned ? 'good' : 'warn'}">${learned ? '✓ Выучено' : 'В банке'}</span>
            </div>
            <p><strong>Окраска:</strong> ${safeText(item.stain || '—')}</p>
            ${cat === 'scheme' ? `<p><strong>Подписи:</strong> ${safeText(Object.entries(item.labels).map(([k,v]) => `${k}=${v}`).join('; '))}</p>` : ''}
            <div class="inline-actions" style="margin-top:10px">
              <button class="ghost" onclick="toggleLearned('${item.id}')">${learned ? 'Снять пройдено' : 'Отметить пройденным'}</button>
            </div>
          </div>
        </div>
      `;
    }
    return `
      <div class="card">
        <div class="card-top">
          <div>
            <h4>${safeText(item.question)}</h4>
            <p>${safeText(item.answerVariants ? item.answerVariants[0] : item.answer)}</p>
          </div>
          <span class="badge ${learned ? 'good' : 'dev'}">${learned ? '✓ Выучено' : 'Банк'}</span>
        </div>
      </div>
    `;
  }).join('');
  return `
    <div class="shell">
      <div class="backline">
        <button class="ghost" onclick="showView('dashboard')">← Назад</button>
        <div class="muted">${data.title}</div>
      </div>
      <div class="panel pad">
        <div class="bank-toolbar">
          <button class="tab ${cat==='micro'?'active':''}" onclick="openBank('micro')">Препараты</button>
          <button class="tab ${cat==='scheme'?'active':''}" onclick="openBank('scheme')">Схемы</button>
          <button class="tab ${cat==='theory'?'active':''}" onclick="openBank('theory')">Теория</button>
          <button class="tab ${cat==='task'?'active':''}" onclick="openBank('task')">Задачи</button>
        </div>
        <p class="muted">${data.subtitle}</p>
      </div>
      <div style="height:14px"></div>
      ${cat === 'micro' ? (() => {
        const totalMicro = data.items.length;
        const learnedMicro = data.items.filter(i => learnedSet().has(i.id)).length;
        const remainMicro = Math.max(0, totalMicro - learnedMicro);
        const percentMicro = totalMicro ? Math.round((learnedMicro / totalMicro) * 100) : 0;
        return `
        <div class="chart-card">
          <h4 style="margin:0 0 10px">Диаграмма прогресса по препаратам</h4>
          <div class="stack-chart">
            <div class="passed" style="width:${percentMicro}%"></div>
            <div class="rest" style="width:${100 - percentMicro}%"></div>
          </div>
          <div class="chart-legend">
            <span>Пройдено: <strong>${learnedMicro}</strong></span>
            <span>Не пройдено: <strong>${remainMicro}</strong></span>
            <span>${percentMicro}%</span>
          </div>
        </div>`;
      })() : ''}
      <div style="height:14px"></div>
      <div class="bank-grid">
        ${cardHtml}
      </div>
    </div>
  `;
}

  <p style="color: var(--danger); font-weight: 800; margin: 15px 0; border-left: 3px solid var(--danger); padding-left: 12px;">

function renderExamHistory() {
  const history = getExamHistory();
  const attempts = history.length;
  const avgOfAverages = attempts ? history.reduce((s, h) => s + (Number(h.avg) || 0), 0) / attempts : 0;
  const bestMark = attempts ? Math.max(...history.map(h => Number(h.finalMark) || 0)) : 0;
  const cards = history.map((h, idx) => {
    const dt = new Date(h.finishedAt || h.startedAt || Date.now());
    const stamp = isNaN(dt.getTime()) ? '—' : dt.toLocaleString('ru-RU');
    const grades = Array.isArray(h.grades) ? h.grades.join(' · ') : '—';
    const items = Array.isArray(h.items) ? h.items.map(it => `${it.label || '—'} (${it.grade || '—'})`).join('; ') : '';
    return `
      <div class="history-card">
        <div class="history-head">
          <div>
            <h4>Попытка #${attempts - idx}</h4>
            <div class="history-meta">${safeText(stamp)}</div>
          </div>
          <span class="badge ${Number(h.finalMark) >= 4 ? 'good' : 'warn'}">Итог ${safeText(String(h.finalMark || 0))}</span>
        </div>
        <div class="history-meta">Средний балл: <strong>${safeText(String(Number(h.avg || 0).toFixed ? Number(h.avg || 0).toFixed(2) : h.avg || 0))}</strong></div>
        <div class="history-meta">Оценки по билетy: ${safeText(grades)}</div>
        <div class="tiny" style="margin-top:8px">${safeText(items)}</div>
      </div>
    `;
  }).join('');
  return `
    <div class="shell">
      <div class="backline">
        <button class="ghost" onclick="showView('dashboard')">← Назад</button>
        <div class="muted">История прохождений экзаменов</div>
      </div>
      <div class="panel pad">
        <h2 style="margin-top:0">История экзаменов</h2>
        <p class="muted">Все экзаменационные попытки сохраняются локально для текущего профиля.</p>
        <div class="grid" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-top:14px">
          <div class="stat"><div class="label">Попыток</div><div class="value">${attempts}</div></div>
          <div class="stat"><div class="label">Средний балл</div><div class="value">${attempts ? avgOfAverages.toFixed(2) : '0.00'}</div></div>
          <div class="stat"><div class="label">Лучший итог</div><div class="value">${bestMark}</div></div>
        </div>
      </div>
      <div style="height:14px"></div>
      <div class="history-grid">
        ${cards || `<div class="panel pad"><p class="muted">Пока нет сохранённых попыток экзамена.</p></div>`}
      </div>
    </div>
  `;
}
function renderSettings() {
  return `
    <div class="shell">
      <div class="backline">
        <button class="ghost" onclick="showView('dashboard')">← Назад</button>
        <div class="muted">Настройки и выход</div>
      </div>
      <div class="panel pad">
        <h2 style="margin-top:0">Управление данными</h2>
        <p class="muted">Сброс удаляет только локальный прогресс текущего пользователя. Аккаунт хранится в Supabase; выход завершает сессию на этом устройстве.</p>
        <div class="inline-actions">
          <button class="danger" onclick="if(confirm('Сбросить прогресс текущего пользователя?')) resetProgress()">Сбросить прогресс</button>
          <button class="ghost" onclick="if(confirm('Выйти из аккаунта?')) logout()">Выйти</button>
        </div>
        <div style="height:16px"></div>
        <div class="mini">
          <h4>Текущий профиль</h4>
          <p>ФИО: <strong>${safeText(state.user?.fullName || '')}</strong></p>
          <p>Группа: <strong>${safeText(state.user?.group || '')}</strong></p>
          <p>Email: <strong>${safeText(state.user?.email || '—')}</strong></p>
          <p>Ключ прогресса: <span class="tiny">${safeText(storageKeyForUser(state.user?.fullName || ''))}</span></p>
        </div>
      </div>
    </div>
  `;
}
function render() {
  const app = document.getElementById('app');
  if (!app) return;
  const view = state.view;
  document.getElementById('bottomNav').style.display = view === 'dashboard' ? 'block' : 'none';
  let html = '';
  if (view === 'login') html = renderLogin();
  else if (view === 'dashboard') html = renderDashboard();
  else if (view === 'training') html = renderTraining();
  else if (view === 'exam') html = renderExam();
  else if (view === 'bank') html = renderBank();
  else if (view === 'info') html = renderInfo();
  else if (view === 'examHistory') html = renderExamHistory();
  else if (view === 'settings') html = renderSettings();
  app.innerHTML = html;
  renderExamTimer();
  // fix scheme input handlers in training/exam after render
  if (state.training && state.training.kind === 'scheme' && state.training.current) {
    document.querySelectorAll('.scheme-grid input[data-scheme-key]').forEach((el) => {
      const key = el.dataset.schemeKey;
      el.oninput = (ev) => {
        state.training.currentAttempt.labels = Object.assign({}, state.training.currentAttempt.labels || {}, {[key]: ev.target.value});
      };
    });
  }
  if (state.exam && !state.exam.finished && !state.exam.resultOpen && state.exam.ticket[state.exam.currentIndex]?.type === 'scheme') {
    document.querySelectorAll('.scheme-grid input[data-scheme-key]').forEach((el) => {
      const key = el.dataset.schemeKey;
      el.oninput = (ev) => {
        state.exam.currentAttempt.labels = Object.assign({}, state.exam.currentAttempt.labels || {}, {[key]: ev.target.value});
      };
    });
  }
}
initFromStorage().then(render);
</script>
