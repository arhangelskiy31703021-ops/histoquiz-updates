<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HistoQuiz Pro Vundervaflia</title>
  <style>
    :root{
      --bg:#120a1e;
      --bg2:#1a102a;
      --card:#221436cc;
      --card2:#2b1745;
      --line:#6d4da8;
      --line2:#8f67d8;
      --text:#f4ecff;
      --muted:#c7b4e7;
      --soft:#d7c9ef;
      --accent:#b17cff;
      --accent2:#8d5ef3;
      --danger:#ef5b7d;
      --success:#4ed6a8;
      --warning:#ffca73;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --radius: 24px;
      --radius-sm: 16px;
      --max: 1260px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(177,124,255,.18), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(142,96,243,.15), transparent 24%),
        linear-gradient(180deg, #0d0716 0%, #1a1028 100%);
      color:var(--text);
      overflow-x:hidden;
    }
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    .app{
      min-height:auto;
      display:flex;
      flex-direction:column;
    }
    .shell{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      padding:20px 0 96px;
      flex:1;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 18px;
      background:linear-gradient(180deg, rgba(45,23,71,.8), rgba(25,14,39,.8));
      border:1px solid rgba(173,134,255,.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom:16px;
      position:sticky;
      top:12px;
      z-index:20;
    }
    .brand{
      display:flex;align-items:center;gap:12px;min-width:0;
    }
    .brand-badge{
      width:46px;height:46px;border-radius:16px;
      background:linear-gradient(145deg, var(--accent), #6a36d5);
      display:grid;place-items:center;font-size:22px;box-shadow:0 10px 25px rgba(130,73,255,.35)
    }
    .brand h1{margin:0;font-size:18px;line-height:1.1}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .userchip{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      white-space:nowrap;
      max-width:45%;
      overflow:hidden;text-overflow:ellipsis;
    }
    .userchip strong{color:var(--text)}
    .hero{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:16px;
      margin-bottom:16px;
    }
    .panel{
      background:linear-gradient(180deg, rgba(44,26,69,.9), rgba(24,15,38,.86));
      border:1px solid rgba(177,124,255,.16);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel.pad{padding:18px}
    .stats{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
    }
    .stat{
      padding:16px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);
    }
    .stat .label{font-size:12px;color:var(--muted);margin-bottom:10px}
    .stat .value{font-size:26px;font-weight:800;letter-spacing:-.03em}
    .stat .hint{margin-top:8px;font-size:12px;color:var(--soft)}
    .status-card{
      padding:18px;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:14px;
      background:
        radial-gradient(circle at 20% 20%, rgba(177,124,255,.15), transparent 28%),
        linear-gradient(180deg, rgba(43,23,69,.92), rgba(19,12,31,.94));
    }
    .status-card h2{margin:0 0 8px;font-size:22px}
    .status-card p{margin:0;color:var(--muted);line-height:1.55}
    .pill-row{display:flex;flex-wrap:wrap;gap:8px}
    .pill{
      padding:8px 12px;border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      font-size:12px;
    }
    .section-tabs{
      display:flex;flex-wrap:wrap;gap:10px;
      margin:14px 0 16px;
    }
    .tab{
      border:0;
      color:var(--text);
      background:rgba(255,255,255,.06);
      padding:12px 16px;
      border-radius:999px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.08);
      transition:.2s ease;
    }
    .tab.active{
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 12px 25px rgba(125,76,255,.3);
      border-color:transparent;
    }
    .section-head{
      display:flex;justify-content:space-between;align-items:end;gap:12px;
      margin:10px 2px 14px;
    }
    .section-head h3{margin:0;font-size:20px}
    .section-head .sub{color:var(--muted);font-size:13px}
    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      overflow:hidden;
      position:relative;
    }
    .card.clickable{cursor:pointer;transition:.18s ease}
    .card.clickable:hover{transform:translateY(-2px);border-color:rgba(177,124,255,.35)}
    .card h4{margin:0 0 8px;font-size:17px;line-height:1.25}
    .card p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .card-top{
      display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;
    }
    .badge{
      padding:6px 10px;border-radius:999px;font-size:11px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      white-space:nowrap;
    }
    .badge.good{background:rgba(78,214,168,.14);color:#9bf1d2;border-color:rgba(78,214,168,.2)}
    .badge.warn{background:rgba(255,202,115,.14);color:#ffe0a7;border-color:rgba(255,202,115,.22)}
    .badge.dev{background:rgba(177,124,255,.12);color:#d8bcff;border-color:rgba(177,124,255,.18)}
    .progress{
      height:10px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;margin:14px 0 8px;
      border:1px solid rgba(255,255,255,.06);
    }
    .progress > span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg, var(--accent), var(--success))}
    .meta{
      display:flex;justify-content:space-between;gap:10px;
      color:var(--soft);font-size:12px;
    }
    .bottom-nav{
      padding:12px 0 2px;
      margin-top:18px;
    }
    .bottom-nav .wrap{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      display:grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap:10px;
    }
    .navbtn{
      border:0;
      color:var(--text);
      padding:14px 14px;
      border-radius:18px;
      cursor:pointer;
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.08);
      transition:.2s ease;
      min-height:52px;
      font-weight:700;
    }
    .navbtn:hover{transform:translateY(-1px)}
    .navbtn.red{background:linear-gradient(135deg, #ff5a7b, #d63b59)}
    .navbtn.purple{background:linear-gradient(135deg, #9f74ff, #7141df)}
    .navbtn.gray{background:linear-gradient(135deg, #4f4a5d, #353041)}
    .navbtn.full{grid-column: span 1}
    .login-wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }
    .login{
      width:min(920px, 100%);
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
    }
    .login .left{
      padding:28px;
      background:
        radial-gradient(circle at 30% 20%, rgba(177,124,255,.17), transparent 25%),
        linear-gradient(180deg, rgba(42,22,67,.95), rgba(18,11,31,.95));
      border-radius:30px;
      border:1px solid rgba(177,124,255,.18);
      box-shadow: var(--shadow);
    }
    .login .left h1{margin:6px 0 10px;font-size:34px;line-height:1.05}
    .login .left p{margin:0;color:var(--muted);line-height:1.6}
    .featurelist{
      margin-top:18px;display:grid;gap:10px
    }
    .feature{
      display:flex;gap:10px;align-items:flex-start;
      padding:12px 14px;border-radius:18px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)
    }
    .feature b{display:block;margin-bottom:2px}
    .login .right{
      padding:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border-radius:30px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      display:flex;flex-direction:column;justify-content:center;
    }
    .form{
      display:grid;gap:12px;
    }
    .field label{display:block;font-size:12px;color:var(--muted);margin:0 0 7px 2px}
    .field input, .field select, .field textarea{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(13,7,22,.55);
      color:var(--text);
      padding:14px 14px;
      outline:none;
      transition:.2s ease;
    }
    .field textarea{min-height:120px;resize:vertical}
    .field input:focus, .field select:focus, .field textarea:focus{
      border-color:rgba(177,124,255,.5);
      box-shadow:0 0 0 4px rgba(177,124,255,.12)
    }
    .primary, .ghost, .danger, .success-btn{
      border:0;
      border-radius:16px;
      padding:13px 15px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
      color:var(--text);
    }
    .primary{background:linear-gradient(135deg, var(--accent), var(--accent2));}
    .ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08)}
    .danger{background:linear-gradient(135deg, #ff6a86, #d83b5f)}
    .success-btn{background:linear-gradient(135deg, #52d5a8, #2fad7f)}
    .inline-actions{display:flex;flex-wrap:wrap;gap:10px}
    .muted{color:var(--muted)}
    .screen{display:none}
    .screen.active{display:block}
    .backline{
      display:flex;align-items:center;gap:10px;margin-bottom:14px
    }
    .backline button{padding:10px 14px;border-radius:14px}
    .training-layout{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:16px;
    }
    .media-box{
      padding:16px;
    }
    .media{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      background:#150d22;
      border:1px solid rgba(255,255,255,.08);
      min-height: 420px;
      display:grid;
      place-items:center;
    }
    .media img, .media svg{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      cursor:pointer;
      user-select:none;
    }
    .media-note{
      position:absolute;
      left:12px;top:12px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(13,7,22,.66);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
    }
    .qa{
      padding:18px;
      display:grid;
      gap:14px;
    }
    .prompt{
      padding:16px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .prompt h3{margin:0 0 8px;font-size:20px}
    .prompt p{margin:0;color:var(--muted);line-height:1.5}
    .feedback{
      padding:14px 16px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      display:none;
    }
    .feedback.show{display:block}
    .feedback.ok{border-color:rgba(78,214,168,.25);background:rgba(78,214,168,.08)}
    .feedback.bad{border-color:rgba(239,91,125,.25);background:rgba(239,91,125,.08)}
    .feedback .title{font-weight:800;margin-bottom:8px}
    .feedback .small{font-size:13px;color:var(--soft);line-height:1.45}
    .prep-description{
      display:none;
      padding:16px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(177,124,255,.12), rgba(255,255,255,.04));
      border:1px solid rgba(177,124,255,.20);
      box-shadow:0 12px 26px rgba(0,0,0,.18);
    }
    .prep-description.show{display:block}
    .prep-description h4{
      margin:0 0 10px;
      font-size:16px;
      line-height:1.25;
    }
    .prep-description .desc-text{
      color:var(--soft);
      font-size:13px;
      line-height:1.55;
      white-space:normal;
    }
    .prep-html-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      line-height:1.65;
      font-size:15px;
      color:var(--soft);
    }
    .prep-html-card{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:18px;
    }
    .prep-html-card.wide{grid-column:1 / -1}
    .prep-html-card h2{margin:0 0 12px;color:var(--text);font-size:24px;line-height:1.2}
    .prep-html-card h3{margin:18px 0 10px;color:var(--text);font-size:18px;line-height:1.25}
    .prep-html-card p{margin:0 0 12px}
    .prep-html-card b{color:var(--text)}
    .scheme-grid{
      display:grid; gap:12px; grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
    }
    .scheme-grid .field input{padding:12px}

    .prep-modal-body{
      flex:1;
      overflow:auto;
      padding:16px;
      background:radial-gradient(circle at 50% 20%, rgba(177,124,255,.08), transparent 35%);
    }
    .prep-detail-layout{
      display:grid;
      gap:16px;
      align-items:start;
    }
    .prep-detail-img{
      width:100%;
      max-height:64vh;
      object-fit:contain;
      display:block;
      border-radius:24px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.08);
    }
    .prep-detail-side{
      display:grid;
      gap:12px;
    }
    .prep-description.bank-show{
      display:block;
      margin-top:0;
      width:100%;
    }
    .prep-description.training-wide{
      display:block;
      margin-top:16px;
      width:100%;
    }
    .prep-variant-full{
      width:100%;
      padding:16px;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(177,124,255,.18);
      box-shadow:0 14px 34px rgba(0,0,0,.24);
    }
    .prep-variant-full h3{
      margin:0 0 12px;
      font-size:18px;
    }
    .prep-variant-full img{
      width:100%;
      height:min(78vh, 820px);
      object-fit:contain;
      display:block;
      border-radius:24px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.08);
    }

    .fullscreen-img-modal{
      position:fixed;
      inset:0;
      z-index:80;
      display:none;
      background:rgba(5,3,8,.92);
      backdrop-filter: blur(8px);
      padding:18px;
    }
    .fullscreen-img-modal.open{display:grid;place-items:center}
    .fullscreen-img-wrap{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      position:relative;
    }
    .fullscreen-img-wrap img{
      max-width:96vw;
      max-height:92vh;
      object-fit:contain;
      border-radius:22px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 18px 55px rgba(0,0,0,.55);
    }
    .fullscreen-close{
      position:fixed;
      right:22px;
      top:18px;
      z-index:82;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.12);
      color:var(--text);
      border-radius:16px;
      padding:12px 15px;
      cursor:pointer;
      font-weight:900;
      backdrop-filter: blur(10px);
    }
    .fullscreen-caption{
      position:fixed;
      left:22px;
      bottom:18px;
      z-index:82;
      max-width:min(760px, calc(100vw - 44px));
      padding:10px 12px;
      border-radius:999px;
      background:rgba(13,7,22,.66);
      border:1px solid rgba(255,255,255,.10);
      color:var(--soft);
      font-size:13px;
    }
    .fullscreen-trigger{cursor:zoom-in}

    .variant-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:10px;
    }
    .variant-card{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      transition:.18s ease;
    }
    .variant-card:hover{border-color:rgba(177,124,255,.35);transform:translateY(-1px)}
    .variant-card.active{border-color:rgba(177,124,255,.55);background:rgba(177,124,255,.12)}
    .variant-card img{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:#120c1b;
    }
    .variant-card .v-title{margin-top:8px;font-size:12px;color:var(--soft);font-weight:800}
    .all-preps-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap:10px;
      margin-top:12px;
      max-height:420px;
      overflow:auto;
      padding-right:4px;
    }
    .all-prep-card{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      transition:.18s ease;
    }
    .all-prep-card:hover{border-color:rgba(177,124,255,.35);transform:translateY(-1px)}
    .all-prep-card.active{border-color:rgba(78,214,168,.40);background:rgba(78,214,168,.08)}
    .all-prep-card img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:#120c1b;
    }
    .all-prep-card .prep-name{margin-top:8px;font-size:13px;font-weight:900;color:var(--text);line-height:1.25}
    .all-prep-card .prep-meta{margin-top:4px;font-size:11px;color:var(--muted);line-height:1.25}
    @media (max-width: 820px){
      .prep-detail-img{max-height:52vh}
      .all-preps-grid{max-height:360px}
    }

    .bank-toolbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      margin-bottom:14px;
    }
    .bank-toolbar .tab{padding:10px 14px}
    .bank-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .bank-card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
    }
    .bank-card .thumb{
      width:100%;
      aspect-ratio: 16/10;
      background:#120c1b;
      display:block;
      object-fit:cover;
      cursor:pointer;
    }
    .bank-card .content{padding:14px}
    .bank-card .content h4{margin:0 0 6px;font-size:16px}
    .bank-card .content p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .bank-card .content .row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
    .list{
      display:grid;gap:12px
    }
    .info-grid{display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr))}
    .mini{
      padding:16px;border-radius:22px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .mini h4{margin:0 0 8px}
    .mini p,.mini li{color:var(--muted);line-height:1.55}
    .mini ul{margin:0;padding-left:20px}
    .modal{
      position:fixed;inset:0;z-index:50;
      display:none;
      background:rgba(5,3,8,.76);
      backdrop-filter: blur(10px);
    }
    .modal.open{display:grid;place-items:center}
    .modal-panel{
      width:min(1200px, calc(100% - 18px));
      height:min(92vh, 940px);
      background:linear-gradient(180deg, rgba(32,18,50,.95), rgba(11,7,16,.97));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .modal-head{
      display:flex;justify-content:space-between;align-items:center;
      gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08)
    }
    .modal-head h3{margin:0;font-size:16px}
    .modal-body{
      flex:1;
      position:relative;
      overflow:hidden;

<script>
/* =========================================================
   БЛОК 1. БАЗА ДАННЫХ (db)
   ---------------------------------------------------------
   КУДА ВСТАВЛЯТЬ ФОТО:
   - В каждом препарате / схеме ищи поле image_url
   - Вставляй туда строку:
       data:image/png;base64,ТВОЯ_BASE64_СТРОКА
     или
       data:image/jpeg;base64,ТВОЯ_BASE64_СТРОКА

   ПРИМЕР:
   {

   }

   ПОДСКАЗКА:
   Если поле уже заполнено как placeholder —
   просто замени текст после "base64," на свою строку.
   ========================================================= */

let db = {};

/* =========================================================
   Supabase DB loader:
   препараты, описания, варианты, схемы, теория и задачи
   грузятся из таблиц Supabase.

function showDbLoading(message = "Загрузка базы препаратов…") {

async function sbSelect(table, query = "*") {
  if (!supabaseClient) throw new Error("Supabase client не создан. Проверь подключение CDN и ключи.");
  const { data, error } = await supabaseClient.from(table).select(query);
  if (error) throw error;
  return data || [];
}

async function loadDbFromSupabase() {
  const [colloquiums, preparations, variants, schemes, theory, tasks] = await Promise.all([
    sbSelect("colloquiums"),
    sbSelect("preparations"),
    sbSelect("preparation_variants"),
    sbSelect("schemes"),
    sbSelect("theory_questions"),
    sbSelect("tasks")
  ]);

  const nextDb = {};
  colloquiums
    .sort((a, b) => (a.num || 0) - (b.num || 0))
    .forEach((c) => {
      nextDb[c.id] = {
        id: c.id,
        num: c.num,
        title: c.title,
        desc: c.description || "",
        microscopy: [],
        schemes: [],
        theory: [],
        tasks: []
      };
    });

  const variantsByPrep = {};
  variants
    .sort((a, b) => (a.order_index || 0) - (b.order_index || 0))
    .forEach((v) => {
      if (!variantsByPrep[v.preparation_id]) variantsByPrep[v.preparation_id] = [];
      variantsByPrep[v.preparation_id].push({ id: v.id, image_url: v.image_url || "" });
    });

  preparations
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((p) => {
      const colId = p.colloq_id || `colloq_${p.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: p.colloq, title: `Коллоквиум ${p.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }
      nextDb[colId].microscopy.push({
        id: p.id,
        type: p.type || "micro",
        colloq: p.colloq,
        name: p.name,
        stain: p.stain || "",
        image_url: p.image_url || "",
        description: p.description || "",
        variants: variantsByPrep[p.id] || []
      });
    });

  schemes
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((s) => {
      const colId = s.colloq_id || `colloq_${s.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: s.colloq, title: `Коллоквиум ${s.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }
      nextDb[colId].schemes.push({
        id: s.id,
        type: s.type || "scheme",
        colloq: s.colloq,
        title: s.title,
        labels: s.labels || {},
        image_url: s.image_url || ""
      });
    });

  theory
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((t) => {
      const colId = t.colloq_id || `colloq_${t.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: t.colloq, title: `Коллоквиум ${t.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }
      nextDb[colId].theory.push({
        id: t.id,
        type: t.type || "theory",
        colloq: t.colloq,
        question: t.question,
        answerVariants: Array.isArray(t.answer_variants) ? t.answer_variants : []
      });
    });

  tasks
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((task) => {
      const colId = task.colloq_id || `colloq_${task.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: task.colloq, title: `Коллоквиум ${task.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }
      nextDb[colId].tasks.push({
        id: task.id,
        type: task.type || "task",
        colloq: task.colloq,
        question: task.question,
        answer: task.answer || "",
        answerVariants: Array.isArray(task.answer_variants) ? task.answer_variants : [],
        requiresManualCheck: !!task.requires_manual_check
      });
    });

  db = nextDb;
  return db;
}

function normalize(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/ё/g, 'е')
    .replace(/[^\p{L}\p{N}]+/gu, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function sameText(a, b) {
  const x = normalize(a);
  const y = normalize(b);
  if (!x || !y) return false;
  if (x === y) return true;
  if (x.length >= 4 && y.includes(x)) return true;
  if (y.length >= 4 && x.includes(y)) return true;
  return false;
}
function matchVariants(input, variants) {
  if (!Array.isArray(variants)) return sameText(input, variants);
  return variants.some(v => sameText(input, v));
}
function numericLike(s) {
  const n = Number(String(s).replace(',', '.').replace(/[^\d.-]/g, ''));
  return Number.isFinite(n) ? n : null;
}

function allowedGradesForKind(kind) {

    theory: 'Шкала без 1: 2, 3, 4 или 5. Оценивайте по точности и полноте ответа.',
  })[kind] || 'Шкала без 1: 2–5.';

function countSchemeMatches(cur, attempt) {
  const labels = cur.labels || {};
  let matched = 0;
  if (sameText(attempt?.schemeTitle, cur.title)) matched++;
  for (const key of Object.keys(labels)) {
    if (sameText(attempt?.labels?.[key], labels[key])) matched++;
  }
  return { matched, total: Object.keys(labels).length + 1 };
}

function evaluateItem(cur, attempt) {
  let ok = false;
  let detail = '';
  if (cur.type === 'micro') {
    ok = sameText(attempt?.name, cur.name) && sameText(attempt?.stain, cur.stain);
    detail = ok ? `Верно: ${cur.name} / ${cur.stain}` : `Правильно: ${cur.name} / ${cur.stain}`;
  } else if (cur.type === 'scheme') {
    const { matched, total } = countSchemeMatches(cur, attempt);
    ok = matched / total >= 0.8;
    detail = ok ? 'Схема принята.' : `Правильно: ${cur.title}. Подписи: ${Object.entries(cur.labels || {}).map(([k,v]) => `${k}=${v}`).join('; ')}`;
  } else if (cur.type === 'theory') {
    ok = matchVariants(attempt?.answer, cur.answerVariants || cur.answer);
    detail = ok ? 'Ответ принят.' : `Эталон: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`;
  } else if (cur.type === 'task') {
    const entered = attempt?.answer || '';
    const num = numericLike(entered);
    const target = numericLike(cur.answer);
    if (num !== null && target !== null) {
      ok = Math.abs(num - target) / Math.max(1, Math.abs(target)) <= 0.05;
    } else {
      ok = matchVariants(entered, cur.answerVariants || cur.answer);
    }
    detail = ok ? 'Решение верно.' : `Правильно: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`;
  }
  return { ok, detail };
}

function gradeSuggestion(kind, cur, attempt, ok) {
  if (kind === 'micro') return ok ? 5 : 2;
  if (kind === 'task') return ok ? 5 : 2;
  if (kind === 'scheme') {
    const { matched, total } = countSchemeMatches(cur, attempt);
    const labelsTotal = Math.max(0, total - 1);
    const labelsMatched = Math.max(0, matched - 1);
    const titleOk = sameText(attempt?.schemeTitle, cur.title);
    if (titleOk && labelsMatched === labelsTotal && labelsTotal > 0) return 5;
    if (titleOk && labelsTotal > 0 && labelsMatched >= Math.ceil(labelsTotal / 2)) return 4;
    if (titleOk) return 3;
    return 2;
  }
  if (kind === 'theory') {
    const variants = Array.isArray(cur.answerVariants) ? cur.answerVariants : [cur.answer];
    if (matchVariants(attempt?.answer, variants)) return 5;
    const ref = normalize(variants[0] || '');
    const inp = normalize(attempt?.answer || '');
    if (!ref || !inp) return 2;
    const refTokens = new Set(ref.split(' ').filter(Boolean));
    const inpTokens = new Set(inp.split(' ').filter(Boolean));
    let hit = 0;
    for (const token of inpTokens) if (refTokens.has(token)) hit++;
    const ratio = refTokens.size ? hit / refTokens.size : 0;
    if (ratio >= 0.75) return 4;
    if (ratio >= 0.45) return 3;
    return 2;
  }
  return ok ? 5 : 2;
}

function updateStreak() {
  const today = todayKey();
  const last = state.progress.lastStudyDate;
  if (!last) state.progress.streak = 1;
  else if (last === today) state.progress.streak = Math.max(1, state.progress.streak || 1);
  else {
    const d1 = new Date(last + 'T00:00:00');
    const d2 = new Date(today + 'T00:00:00');
    const diff = Math.round((d2 - d1) / 86400000);
    if (diff === 1) state.progress.streak = (state.progress.streak || 0) + 1;

  }

}

async function loadProfileForUser(authUser) {

    .eq('id', authUser.id)

    fullName: profile?.full_name || authUser.user_metadata?.full_name || authUser.email || 'Студент',

function evaluateItem(item, attempt) {
  const cur = item || {};
  const a = attempt || {};
  if (cur.type === 'micro') {
    const nameOk = sameText(a.name, cur.name) || normalize(cur.name).includes(normalize(a.name || ''));
    const stainOk = sameText(a.stain, cur.stain);
    const ok = nameOk && stainOk;
    return {
      ok,
      suggestedGrade: ok ? 5 : 2,
      detail: ok ? `Верно: ${cur.name} / ${cur.stain}` : `Правильно: ${cur.name} / ${cur.stain}`,
      title: cur.name || cur.title || ''
    };
  }
  if (cur.type === 'scheme') {
    const titleOk = sameText(a.schemeTitle, cur.title);
    const labels = cur.labels || {};
    let good = 0;
    const total = Math.max(1, Object.keys(labels).length);
    for (const key of Object.keys(labels)) {
      if (sameText(a.labels?.[key], labels[key])) good++;
    }
    const ratio = good / total;
    let suggestedGrade = 2;
    if (titleOk && ratio === 1) suggestedGrade = 5;
    else if (titleOk && ratio >= 0.5) suggestedGrade = 4;
    else if (titleOk) suggestedGrade = 3;
    const ok = suggestedGrade >= 5;
    return {
      ok,
      suggestedGrade,
      detail: titleOk
        ? `Название верное. Подписей угадано: ${good}/${total}.`
        : `Название схемы не совпало. Правильно: ${cur.title}.`,
      title: cur.title || ''
    };
  }
  if (cur.type === 'theory') {
    const entered = String(a.answer || '').trim();
    return {
      ok: false,
      suggestedGrade: entered ? 3 : 2,
      detail: 'Сложный теоретический ответ. Поставьте себе оценку после проверки.',
      title: cur.question || ''
    };
  }
  if (cur.type === 'task') {
    const entered = a.answer || '';
    const num = numericLike(entered);
    const target = numericLike(cur.answer);
    let ok = false;
    if (num !== null && target !== null) {
      ok = Math.abs(num - target) / Math.max(1, Math.abs(target)) <= 0.05;
    } else {
      ok = matchVariants(entered, cur.answerVariants || cur.answer);
    }
    return {
      ok,
      suggestedGrade: ok ? 5 : 2,
      detail: ok ? 'Решение верно.' : `Правильно: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`,
      title: cur.question || ''
    };
  }
  return { ok:false, suggestedGrade:3, detail:'', title:'' };
}
function applyGradeToProgress(item, grade) {
  if (!state.progress || !item) return;
  if (grade === 5 && !state.progress.learnedIds.includes(item.id)) state.progress.learnedIds.push(item.id);
  state.progress.score = (state.progress.score || 0) + clampGrade(grade);
  updateStreak();

function finalizeTrainingGrade(grade) {
  const tr = state.training;
  if (!tr || !tr.current || !tr.awaitingGrade) return;
  const cur = tr.current;
  const g = clampGrade(grade);
  tr.answered = (tr.answered || 0) + 1;
  tr.gradeHistory = tr.gradeHistory || [];
  tr.gradeHistory.push({id: cur.id, grade: g});
  tr.correct = (tr.correct || 0) + (g === 5 ? 1 : 0);
  applyGradeToProgress(cur, g);
  tr.lastGrade = g;
  tr.lastResult = g === 5;
  tr.resultDetail = `${tr.evaluation?.detail || ''} Итоговая оценка: ${g}/5.`;
  tr.awaitingGrade = false;
  tr.evaluation = null;
  tr.selectedGrade = null;
  if (g === 5) {
    nextTrainingQuestion();
  } else {
    if (Math.random() < 0.5) {
      tr.queue.push(cur);
    } else {
      const maxGap = Math.min(3, Math.max(1, tr.queue.length));
      const gap = 1 + Math.floor(Math.random() * maxGap);
      const pos = Math.min(tr.queue.length, gap);
      tr.queue.splice(pos, 0, cur);
    }
    nextTrainingQuestion();
  }
}

function buildExamTicket() {
  const pool = {
    micro: shuffle(allMicro()),
    scheme: shuffle(allSchemes()),
    theory: shuffle(allTheory()),
    task: shuffle(allTasks()),
  };
  const take = (arr, n, fallbackFactory) => {
    const out = [];
    for (let i = 0; i < n; i++) {
      if (arr.length) out.push(arr.shift());
      else out.push(fallbackFactory(i));
    }
    return out;
  };
  const dummy = {
    micro: i => ({id:`dummy_micro_${i}`, type:'micro', name:'В разработке', stain:'В разработке', image_url: microSvg('В разработке', 'Заполните массив microscopy', 'dummy'+i), colloqId:'dummy'}),
    scheme: i => ({id:`dummy_scheme_${i}`, type:'scheme', title:'В разработке', labels:{'1':'...', '2':'...'}, image_url: schemeSvg({id:`dummy_scheme_${i}`, title:'В разработке', labels:{'1':'...','2':'...'}}), colloqId:'dummy'}),
    theory: i => ({id:`dummy_theory_${i}`, type:'theory', question:'В разработке', answerVariants:['В разработке'], colloqId:'dummy'}),
    task: i => ({id:`dummy_task_${i}`, type:'task', question:'В разработке', answer:'В разработке', answerVariants:['В разработке'], colloqId:'dummy'}),
  };
  const ticket = [
    ...take(pool.micro, 2, dummy.micro),
    ...take(pool.scheme, 1, dummy.scheme),
    ...take(pool.theory, 2, dummy.theory),
    ...take(pool.task, 2, dummy.task),
  ].map((item, idx) => ({...item, ticketIndex: idx + 1}));
  return ticket;
}

  <div class="prep-html-card wide">
    <h2>Мужская половая система</h2>
    <p>Мужская половая система — это совокупность органов, которые обеспечивают образование мужских половых клеток, их созревание, транспорт, выведение, формирование спермы, участие в половом акте и эндокринную регуляцию мужского организма. В её состав входят яички, или семенники, семявыносящие пути, добавочные железы и мужской половой член.</p>
    <p>Главная функциональная цепь темы выглядит так: в извитых семенных канальцах семенника образуются сперматозоиды; в интерстиции семенника клетки Лейдига синтезируют тестостерон; в придатке яичка сперматозоиды дозревают и приобретают функциональную активность; в семявыносящем протоке они быстро продвигаются при эякуляции; семенные пузырьки, простата и бульбоуретральные железы добавляют секреты, формирующие жидкую часть спермы.</p>
    <p>Поэтому мужская половая система — это не набор отдельных органов, а единая система: <b>сперматогенез → дозревание сперматозоидов → транспорт → добавление секретов → эякуляция → подготовка к оплодотворению</b>.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Общий план органов мужской половой системы</h3>
    <p>К органам мужской половой системы относятся <b>яички</b> и <b>семявыносящие пути</b>: придатки яичек и семявыносящие протоки. Кроме них, выделяют <b>добавочные железы</b>: семенные пузырьки, предстательную железу и бульбоуретральные железы. Отдельно рассматривается <b>мужской половой член</b>, который обеспечивает введение спермы в женские половые пути.</p>
    <p>Яички являются мужскими гонадами. Их паренхима построена из многочисленных канальцев. Одни канальцы являются сперматогенными, потому что в их стенке образуются сперматозоиды. Другие канальцы относятся к начальному отделу семявыносящих путей и обеспечивают выведение сперматозоидов из яичка.</p>
    <p>В строме между канальцами располагаются сосуды, соединительнотканные элементы и интерстициальные эндокринные клетки — клетки Лейдига. Они синтезируют тестостерон и его производные. Поэтому яичко имеет две основные функции: <b>генеративную</b>, связанную с образованием сперматозоидов, и <b>эндокринную</b>, связанную с синтезом мужских половых гормонов.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Семенник: расположение, оболочки и дольки</h3>
    <p>Семенник, или яичко, располагается в мошонке. Это важно функционально, потому что нормальный сперматогенез требует температуры ниже температуры брюшной полости. Для созревания сперматид оптимальна пониженная температура; поэтому вынесение яичек за пределы брюшной полости является условием нормального образования сперматозоидов.</p>
    <p>Снаружи яичко окружено несколькими оболочками. Для гистологии особенно важны две оболочки, непосредственно связанные с яичком: <b>висцеральный листок влагалищной серозной оболочки</b> и <b>белочная оболочка</b>. Белочная оболочка построена из плотной волокнистой соединительной ткани.</p>
    <p>Белочная оболочка не просто покрывает орган снаружи. Она продолжается внутрь яичка и образует <b>средостение яичка</b>, а также соединительнотканные перегородки. Эти перегородки расходятся от средостения и делят паренхиму яичка примерно на 250 долек.</p>
    <p>В каждой дольке находится от одного до четырёх извитых семенных канальцев. Именно в них происходит сперматогенез. Между канальцами располагается интерстициальная ткань, где находятся кровеносные и лимфатические сосуды, клетки соединительной ткани и клетки Лейдига.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Канальцевая система яичка</h3>
    <p>Канальцевая система яичка начинается с <b>извитых семенных канальцев</b>. Это главные сперматогенные канальцы, в стенке которых образуются сперматозоиды. Каждый извитой семенной каналец представляет собой многократно сложенную петлю. Поэтому на препарате один и тот же каналец может несколько раз попадать в плоскость среза, и видимые округлые или овальные сечения не обязательно принадлежат разным канальцам.</p>
    <p>Возле средостения концы извитых семенных канальцев переходят в <b>прямые канальцы яичка</b>. Далее прямые канальцы переходят в <b>канальцы сети яичка</b>, расположенные в толще средостения. От сети яичка отходят <b>выносящие канальцы</b>, которые направляются к придатку яичка.</p>
    <p>Выносящие канальцы впадают в <b>проток придатка</b>. Проток придатка многократно изгибается и постепенно идёт от головки придатка к его хвосту. В хвосте придатка он переходит в <b>семявыносящий проток</b>. Так формируется последовательная система выведения сперматозоидов: извитой семенной каналец → прямой каналец → сеть яичка → выносящие канальцы → проток придатка → семявыносящий проток.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Извитой семенной каналец: общий план строения</h3>
    <p>Извитой семенной каналец — основная структурно-функциональная единица семенника. Его стенка состоит из двух основных компонентов: <b>собственной оболочки</b> и <b>эпителио-сперматогенного слоя</b>. Собственная оболочка расположена снаружи и отделяет сперматогенный эпителий от интерстициальной ткани. Эпителио-сперматогенный слой обращён к просвету канальца и составляет основную часть толщины его стенки.</p>
    <p>На препарате семенника извитые семенные канальцы выглядят как многочисленные округлые или овальные структуры. Внутри каждого канальца виден просвет, а вокруг просвета — многорядный эпителио-сперматогенный слой. В этом слое находятся клетки Сертоли и сперматогенные клетки разных стадий созревания.</p>
    <p>Вокруг канальцев располагается интерстиций. Он содержит сосуды, рыхлую соединительную ткань и клетки Лейдига. Поэтому при описании препарата семенника обязательно нужно указывать не только канальцы, но и межканальцевую интерстициальную ткань.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Собственная оболочка извитого семенного канальца</h3>
    <p>Собственная оболочка извитого семенного канальца имеет сложное строение. В ней выделяют наружный слой фиброцитоподобных клеток, наружный неклеточный слой с коллагеновыми волокнами и аморфным матриксом, слой миоидных клеток и внутренний неклеточный слой, прилежащий к базальной мембране эпителио-сперматогенного слоя.</p>
    <p>Наиболее важными клетками собственной оболочки являются <b>миоидные клетки</b>. Это клетки веретенообразной формы, которые связаны друг с другом и способны к сокращению. Их сокращение способствует медленному продвижению жидкости и сперматозоидов по семенному канальцу в сторону сети яичка.</p>
    <p>Миоидные клетки имеют не только сократительное значение. Они участвуют в барьерной функции собственной оболочки, через них происходит интенсивный обмен веществ между сперматогенным эпителием и кровью или лимфой, а также они выделяют паракринные факторы, влияющие на клетки Сертоли.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Эпителио-сперматогенный слой</h3>
    <p>Эпителио-сперматогенный слой состоит из двух принципиально разных клеточных компонентов. Первый компонент — <b>клетки Сертоли</b>, то есть поддерживающие эпителиоциты. Они являются собственно эпителиальными клетками канальца. Второй компонент — <b>сперматогенные клетки</b>, то есть клетки мужской половой линии.</p>
    <p>Сперматогенные клетки находятся на разных стадиях развития. У базальной мембраны располагаются сперматогонии. Несколько выше находятся сперматоциты. Ближе к просвету расположены сперматиды, а в самом просвете или у его края — сперматозоиды.</p>
    <p>Такое расположение отражает направление созревания: клетки постепенно перемещаются от базальной мембраны к просвету. Поэтому препарат семенника нужно читать как «лестницу созревания»: от сперматогоний у основания эпителия до сперматозоидов у просвета канальца.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Клетки Сертоли: морфология</h3>
    <p>Клетки Сертоли, или сустентоциты, — это поддерживающие эпителиоциты извитых семенных канальцев. Каждая клетка Сертоли простирается на всю толщину эпителио-сперматогенного слоя: от базальной мембраны до просвета канальца.</p>
    <p>Базальная часть клетки Сертоли лежит на базальной мембране и содержит ядро, а также большую часть органелл. Апикальная часть образует многочисленные цитоплазматические отростки, направленные к просвету канальца. Между этими отростками располагаются развивающиеся сперматогенные клетки.</p>
    <p>На обычном препарате полностью увидеть клетку Сертоли трудно, потому что её апикальные отростки маскируются сперматогенными клетками. Обычно лучше различима базальная часть с ядром. Однако функционально нужно помнить: клетка Сертоли контактирует сразу с несколькими сперматогенными клетками разных стадий развития.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Клетки Сертоли: функции</h3>
    <p>Клетки Сертоли выполняют <b>опорную функцию</b>: своими отростками они создают каркас, в котором фиксируются развивающиеся сперматогенные клетки. Они выполняют <b>трофическую функцию</b>: питание клеток, находящихся за гематотестикулярным барьером, осуществляется через клетки Сертоли.</p>
    <p>Они выполняют <b>фагоцитарную функцию</b>: поглощают погибающие сперматогенные клетки и резидуальные тельца, отделяющиеся от поздних сперматид при спермиогенезе. Кроме того, клетки Сертоли секретируют жидкость в просвет семенных канальцев, в которую после спермиации попадают сперматозоиды.</p>
    <p>Клетки Сертоли также координируют развитие сперматогенных клеток и их перемещение к просвету канальца. Они образуют транспортные белки: <b>андрогенсвязывающий белок</b>, необходимый для действия тестостерона на развивающиеся клетки, тестикулярный альбумин и трансферрин. Кроме того, они синтезируют <b>ингибин</b>, который тормозит секрецию ФСГ гипофизом по принципу отрицательной обратной связи.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Гематотестикулярный барьер</h3>
    <p>Гематотестикулярный барьер — это система структур, которая отделяет развивающиеся сперматоциты и сперматиды от иммунной системы и создаёт особую среду для мейоза и спермиогенеза. Он необходим, потому что сперматоциты и сперматиды появляются после формирования иммунной системы и могли бы восприниматься организмом как чужеродные.</p>
    <p>В состав гематотестикулярного барьера входят эндотелий капилляров и его базальная мембрана, интерстициальные прослойки, лимфатический синусоидный «чехлик» вокруг семенного канальца, собственная оболочка канальца, базальная мембрана эпителио-сперматогенного слоя и плотные контакты между клетками Сертоли.</p>
    <p>Наиболее важным звеном барьера являются плотные контакты между клетками Сертоли. Они делят эпителио-сперматогенный слой на два компартмента: <b>базальный</b> и <b>адлюминальный</b>. В базальном компартменте находятся сперматогонии и ранние сперматоциты, а в адлюминальном — более зрелые сперматоциты, сперматиды и сперматозоиды.</p>
    <p>При перемещении созревающих сперматоцитов из базального компартмента в адлюминальный барьер не разрушается полностью. Контакты между клетками Сертоли перестраиваются по принципу «шлюза»: снизу контакт замыкается, сверху прежний контакт размыкается, и изоляция адлюминального отдела сохраняется.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Клетки Лейдига</h3>
    <p>Клетки Лейдига, или интерстициальные гландулоциты, располагаются в рыхлой соединительной ткани между извитыми семенными канальцами. Они являются эндокринными клетками семенника и синтезируют тестостерон и его производные.</p>
    <p>Тестостерон необходим для поддержания сперматогенеза, развития мужских половых органов, формирования вторичных половых признаков и нормальной функции мужской репродуктивной системы. Внутри семенного канальца действие тестостерона связано с клетками Сертоли и андрогенсвязывающим белком.</p>
    <p>Морфологически клетки Лейдига обычно крупнее обычных соединительнотканных клеток. Они имеют округлую или полигональную форму, светлую цитоплазму и хорошо развитые органеллы, характерные для стероидсинтезирующих клеток: гладкую эндоплазматическую сеть и митохондрии.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Сперматогенные клетки</h3>
    <p><b>Сперматогонии</b> — наименее зрелые клетки сперматогенного ряда. Они лежат у базальной мембраны и способны к митотическим делениям. Среди них выделяют стволовые сперматогонии, поддерживающие запас клеток, и сперматогонии, вступившие в сперматогенез.</p>
    <p><b>Сперматоциты</b> — клетки, находящиеся в мейозе. Они крупнее сперматогоний, располагаются несколько дальше от базальной мембраны и имеют ядра с хорошо выраженным рисунком хроматина. На препарате особенно часто встречаются первичные сперматоциты, потому что первое деление мейоза длительное.</p>
    <p><b>Сперматиды</b> — гаплоидные клетки, которые уже не делятся, а превращаются в сперматозоиды. Ранние сперматиды округлые, небольшие, со светлым ядром. Средние сперматиды становятся овальными и имеют более тёмное ядро. Поздние сперматиды мелкие, с плотным ядром и формирующимся жгутиком, лежат ближе к просвету канальца.</p>
    <p><b>Сперматозоиды</b> находятся в просвете канальца или у его края. Они близки к поздним сперматидам, но уже отделены от эпителио-сперматогенного слоя и направляются дальше по системе семявыносящих путей.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Развитие яичка и начало сперматогенной линии</h3>
    <p>Сперматогенез у взрослого человека является продолжением более раннего процесса, который начинается ещё в эмбриогенезе. Первичные половые клетки, или гоноциты, сначала оказываются в стенке желточного мешка, затем мигрируют к первичной почке и внедряются в половые валики.</p>
    <p>Эпителий половых валиков образует половые шнуры. Внутрь этих шнуров проникают гоноциты. Под влиянием окружающих соматических клеток направление их развития определяется в сторону мужской половой линии, и они становятся пресперматогониями.</p>
    <p>Половые шнуры дают начало семенным канальцам, прямым канальцам и канальцам сети яичка. Клетки Сертоли развиваются из эпителия половых шнуров. Выносящие канальцы яичка образуются из канальцев первичной почки, а проток придатка и семявыносящий проток — из мезонефрального протока.</p>
    <p>После рождения канальцы ещё некоторое время незрелые. В первые годы жизни они могут быть представлены клеточными тяжами. Позже появляется просвет, а в период полового созревания начинают активно функционировать клетки Лейдига, усиливается синтез тестостерона и сперматогонии вступают в полноценный сперматогенез.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Собственно сперматогенез</h3>
    <p>Собственно сперматогенез начинается, когда часть сперматогоний вступает на путь необратимой дифференцировки. Выделяют четыре этапа: <b>митотическое размножение сперматогоний</b>, <b>мейотическое деление сперматоцитов</b>, <b>спермиогенез</b>, то есть морфологическое созревание сперматид, и <b>дозревание сперматозоидов в придатке яичка</b>.</p>
    <p>На этапе митотического размножения сперматогонии многократно делятся. Важная особенность состоит в том, что после делений между дочерними клетками сохраняются цитоплазматические мостики. Поэтому потомство одной исходной сперматогонии развивается как клональный синцитий. Это обеспечивает синхронность созревания группы клеток.</p>
    <p>Мейоз переводит клетку от диплоидного набора к гаплоидному. В первом делении мейоза расходятся гомологичные хромосомы, а во втором — сестринские хроматиды. В результате образуются гаплоидные сперматиды. Часть сперматид несёт X-хромосому, часть — Y-хромосому.</p>
    <p>Профаза первого деления мейоза особенно важна. В ней происходят конъюгация гомологичных хромосом, образование синаптонемального комплекса, кроссинговер и обмен участками между гомологичными хромосомами. Это обеспечивает генетическое разнообразие будущих сперматозоидов.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Спермиогенез</h3>
    <p>Спермиогенез — это превращение сперматиды в сперматозоид. Это не деление, а глубокая морфологическая перестройка клетки. В ходе спермиогенеза сперматиды превращаются из округлых клеток в высокоспециализированные клетки с головкой и хвостом.</p>
    <p>В ядре сперматиды происходит сильное уплотнение хроматина. Гистоны заменяются более основными белками — протаминами, хроматин конденсируется, объём ядра резко уменьшается, и ядро становится основой головки сперматозоида.</p>
    <p>Из аппарата Гольджи формируется <b>акросома</b>. Она располагается на переднем полюсе головки и содержит ферменты, необходимые для проникновения сперматозоида через оболочки яйцеклетки: акрозин, гиалуронидазу, коллагеназу и другие.</p>
    <p>Одна из центриолей даёт начало базальному тельцу жгутика. От него формируется аксонема, имеющая типичное строение: девять пар периферических микротрубочек и одна пара центральных. Митохондрии выстраиваются спирально вокруг начального отдела жгутика и формируют митохондриальную оболочку промежуточной части хвоста.</p>
    <p>Почти вся цитоплазма удаляется. Остаток цитоплазмы образует резидуальное тельце, которое отделяется и фагоцитируется клетками Сертоли. Завершается спермиогенез спермиацией — выходом сперматозоидов в просвет семенного канальца.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Дозревание сперматозоидов после выхода из канальца</h3>
    <p>После спермиации сперматозоиды находятся в просвете семенного канальца, но ещё не обладают полной функциональной зрелостью. Дальнейшее дозревание происходит в придатке яичка. В головке придатка продолжается морфофункциональная подготовка, а в хвосте придатка сперматозоиды приобретают подвижность и способность к последующему участию в оплодотворении.</p>
    <p>В придатке на поверхности сперматозоидов сорбируются гликопротеины, необходимые для взаимодействия с яйцеклеткой. В женских половых путях под влиянием секретов простаты, семенных пузырьков и самих женских путей усиливаются подвижность, метаболизм и готовность сперматозоидов к акросомальной реакции.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Гормональная регуляция семенника</h3>
    <p>Регуляция семенника связана с гипоталамо-гипофизарно-гонадной системой. Лютеинизирующий гормон стимулирует клетки Лейдига к синтезу тестостерона. Фолликулостимулирующий гормон действует главным образом на клетки Сертоли.</p>
    <p>Тестостерон необходим для сперматогенеза, но его действие в канальцах реализуется через клетки Сертоли и андрогенсвязывающий белок. Клетки Сертоли синтезируют ингибин, который подавляет продукцию ФСГ гипофизом. Таким образом, клетки Лейдига и Сертоли образуют функциональную пару: одни обеспечивают андрогенный фон, другие создают условия для развития половых клеток.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Придаток яичка</h3>
    <p>Придаток яичка прилежит к яичку и содержит выносящие канальцы и проток придатка. Его функции: дозревание сперматозоидов, изменение их поверхности, депонирование, концентрация и продвижение. Эпителиоциты придатка секретируют жидкость, которая участвует в формировании среды для сперматозоидов.</p>
    <p>Выносящие канальцы имеют характерный неровный контур просвета. Это связано с тем, что в их эпителии чередуются высокие реснитчатые клетки и более низкие секреторные клетки с микроворсинками. Высокие клетки выступают в просвет, низкие формируют углубления, поэтому просвет выглядит волнистым или зубчатым.</p>
    <p>Проток придатка имеет более ровный просвет и двухрядный эпителий. Высокие клетки обращены к просвету, а низкие вставочные клетки лежат у базальной мембраны. Вокруг канальцев располагаются гладкие миоциты, участвующие в продвижении содержимого, особенно при семяизвержении.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Семявыносящий проток</h3>
    <p>Семявыносящий проток является продолжением протока придатка. Он начинается от хвоста придатка, проходит в составе семенного канатика, идёт через паховый канал, достигает мочевого пузыря и впадает в предстательную часть мочеиспускательного канала.</p>
    <p>Стенка семявыносящего протока имеет слизистую, мышечную и адвентициальную оболочки. Слизистая образует продольные складки, поэтому просвет на срезе часто выглядит звёздчатым. Эпителий обычно двухрядный, с высокими клетками и базальными клетками.</p>
    <p>Мышечная оболочка особенно мощная. Она состоит из трёх слоёв гладких миоцитов: внутреннего продольного, среднего циркулярного и наружного продольного. Такое строение необходимо для быстрого продвижения сперматозоидов во время эякуляции.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Семенные пузырьки</h3>
    <p>Семенные пузырьки — парные добавочные железы мужской половой системы, расположенные позади мочевого пузыря. Их секрет составляет значительную часть жидкой части спермы и содержит вещества, необходимые для питания и поддержания активности сперматозоидов.</p>
    <p>Важный компонент секрета семенных пузырьков — фруктоза. Она служит энергетическим субстратом для сперматозоидов. Кроме того, секрет семенных пузырьков содержит белки, вещества, влияющие на вязкость спермы, и другие компоненты, необходимые для нормального функционирования сперматозоидов.</p>
    <p>Гистологически семенной пузырёк представляет собой сильно извитую железистую трубку со складчатой слизистой. Складки слизистой многочисленные, ветвящиеся, местами сближенные, поэтому просвет на препарате выглядит сложным, ячеистым и лабиринтным. Мышечная оболочка способствует выведению секрета.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Предстательная железа</h3>
    <p>Предстательная железа, или простата, — добавочная железа мужской половой системы, расположенная вокруг начальной части мочеиспускательного канала. Гистологически простата является <b>железисто-мышечным органом</b>: в ней выражены железистые отделы и фиброзно-мышечная строма.</p>
    <p>Железы простаты имеют различную форму и размеры. Их просветы могут быть округлыми, овальными, неправильными, расширенными. Эпителий желёз секреторный. Секрет простаты входит в состав спермы, участвует в её разжижении, поддерживает подвижность и функциональную готовность сперматозоидов.</p>
    <p>Строма простаты содержит соединительную ткань и большое количество гладких миоцитов. Сокращение гладкомышечных клеток способствует выведению секрета простаты во время эякуляции. Поэтому простату нельзя описывать только как железу: правильно говорить, что это железисто-мышечный орган.</p>
    <p>В просветах желез простаты часто встречаются <b>простатические конкреции</b>, или амилоидные тельца. Они выглядят как округлые плотные образования, часто имеют слоистое строение и образуются из сгущённого секрета и клеточного материала. Конкреции помогают узнать простату на препарате, но их отсутствие не исключает простату.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Бульбоуретральные железы</h3>
    <p>Бульбоуретральные, или куперовы, железы — небольшие добавочные железы. Они выделяют слизистый секрет, который подготавливает мочеиспускательный канал к прохождению спермы и входит в состав предэякуляторной жидкости.</p>
    <p>На уровне общей темы их нужно помнить как третью добавочную железу мужской половой системы наряду с семенными пузырьками и простатой. Их секрет имеет преимущественно слизистый характер и выполняет защитно-смазывающую функцию.</p>
  </div>

  <div class="prep-html-card wide">

    <p>Мужской половой член обеспечивает введение спермы в женские половые пути. Его основа — эректильная ткань, содержащая сосудистые пространства, соединительнотканные перегородки и гладкомышечные элементы. При наполнении кровью кавернозных пространств возникает эрекция.</p>
    <p>Мочеиспускательный канал проходит в губчатом теле полового члена. Он проводит мочу и сперму, но в разные функциональные моменты. Поэтому мужская уретра относится одновременно к мочевой и половой системам.</p>

    <p>В эпителио-сперматогенном слое можно увидеть клетки разных стадий сперматогенеза. У базальной мембраны лежат сперматогонии, выше — крупные сперматоциты, ближе к просвету — сперматиды и сперматозоиды. Между канальцами располагается интерстиций с сосудами и клетками Лейдига.</p>
    <p>В описании препарата обязательно нужно указать: белочную оболочку, дольки, извитые семенные канальцы, собственную оболочку канальца, эпителио-сперматогенный слой, клетки Сертоли, сперматогенные клетки, интерстиций и клетки Лейдига.</p>

    <p>Простата отличается от семенника тем, что в ней нет извитых семенных канальцев и сперматогенного эпителия. Она отличается от семенного пузырька тем, что семенной пузырёк выглядит как сильно складчатая железистая трубка, а простата состоит из множества железистых отделов в фиброзно-мышечной строме.</p>

    <p>Вокруг канальцев располагаются гладкие миоциты и соединительная ткань. Главная функция придатка — дозревание, концентрация, хранение и продвижение сперматозоидов.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Препарат: семявыносящий проток</h3>
    <p>Семявыносящий проток узнаётся по складчатой слизистой и очень мощной мышечной оболочке. Просвет часто выглядит звёздчатым из-за продольных складок слизистой. Эпителий двухрядный.</p>
    <p>Мышечная оболочка состоит из трёх слоёв гладких миоцитов. Такой мощный мышечный слой нужен для быстрого продвижения сперматозоидов при семяизвержении.</p>
