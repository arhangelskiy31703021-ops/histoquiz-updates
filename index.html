                        ${allowedGradesForKind(item.type).map(g => `<button type="button" class="grade-btn ${grade===g?'active':''}" onclick="setExamGrade(${idx}, ${g})">${g}</button>`).join('')}
                      </div>
                      <div class="grade-suggest">Текущая оценка: <strong>${grade}/5</strong>. ${safeText(suggestion)}</div>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="inline-actions" style="margin-top:14px">

            <button class="ghost" onclick="startExam()">Пройти заново</button>
            <button class="ghost" onclick="showView('dashboard')">На дашборд</button>
          </div>
        </div>
      </div>
    `;
  }
  if (!cur) return '';
  let right = '';
  if (cur.type === 'micro') {
    right = `
      <div class="field"><label>Название препарата</label><input placeholder="Введите название..." oninput="state.exam.currentAttempt.name=this.value" /></div>
      <div class="field"><label>Типичная окраска</label>
        <select onchange="state.exam.currentAttempt.stain=this.value">
          <option value="">Выберите окраску</option>
          ${['Гематоксилин-эозин','Романовский–Гимза','Осмий','Орсеин','Импрегнация серебром','Пас','Судан'].map(v => `<option>${v}</option>`).join('')}
        </select>
      </div>
    `;
  } else if (cur.type === 'scheme') {
    const keys = Object.keys(cur.labels);
    right = `
      <div class="field"><label>Название схемы</label><input placeholder="Введите название схемы" oninput="state.exam.currentAttempt.schemeTitle=this.value" /></div>
      <div class="scheme-grid">
        ${keys.map(k => `<div class="field"><label>${safeText(k)}</label><input placeholder="Подпись" data-scheme-key="${safeText(k)}" /></div>`).join('')}
      </div>
    `;
  } else {
    right = `<div class="field"><label>Ответ</label><textarea placeholder="Введите ответ" oninput="state.exam.currentAttempt.answer=this.value"></textarea></div>`;
  }
  return `
    <div class="shell">
      <div class="backline">
        <button class="ghost" onclick="showView('dashboard')">← Назад</button>
        <div class="muted">Экзаменационный билет</div>

          </div>
        </div>
        <div class="panel qa">

  `;

function setExamGrade(index, grade) {
  const ex = state.exam;
  if (!ex || ex.finalized || !ex.answers || !ex.answers[index]) return;
  ex.answers[index].grade = clampGrade(grade);
  render();
}
function renderTopicBank(cat, items) {
  const kind = cat === 'task' ? 'task' : cat === 'scheme' ? 'scheme' : 'theory';
  const cards = TOPIC_BLOCKS.map((block, idx) => {
    const blockItems = items.filter(item => topicBlockOf(item) === block);
    const totalItems = blockItems.length;
    const learnedItems = blockItems.filter(i => learnedSet().has(i.id)).length;
    const percent = totalItems ? Math.round(learnedItems / totalItems * 100) : 0;
    return `
      <div class="card clickable" onclick="startTopicTraining('${kind}', decodeURIComponent('${encodeURIComponent(block)}'))">
        <div class="card-top">
          <div>
            <h4>${idx + 1}. ${safeText(block)}</h4>
            <p>${totalItems ? `Элементов в блоке: ${totalItems}` : 'Пока нет элементов в этом блоке.'}</p>
          </div>
          <span class="badge ${totalItems ? 'dev' : 'warn'}">${totalItems ? 'Открыть' : 'Пусто'}</span>
        </div>
        <div class="progress"><span style="width:${percent}%"></span></div>
        <div class="meta">
          <span>${learnedItems} / ${totalItems}</span>
          <span>${percent}%</span>
        </div>
      </div>
    `;
  }).join('');

  const noBlockItems = items.filter(item => !String(item?.topic_block || item?.topicBlock || '').trim() && !TOPIC_BLOCKS.includes(topicBlockOf(item)));
  const noBlockCard = noBlockItems.length ? `
    <div class="card clickable" onclick="startTopicTraining('${kind}', decodeURIComponent('%D0%91%D0%B5%D0%B7%20%D0%B1%D0%BB%D0%BE%D0%BA%D0%B0%20%D1%82%D0%B5%D0%BC%D1%8B'))">
      <div class="card-top">
        <div>
          <h4>Без блока темы</h4>
          <p>Элементы, у которых ещё не заполнено поле topic_block.</p>
        </div>
        <span class="badge warn">${noBlockItems.length}</span>
      </div>
    </div>
  ` : '';

  return `<div class="grid">${cards}${noBlockCard}</div>`;
}

  `;

function renderExamHistory() {

  const cards = history.map((h, idx) => {
    const dt = new Date(h.finishedAt || h.startedAt || Date.now());

        <div class="inline-actions">
          <button class="danger" onclick="if(confirm('Сбросить прогресс текущего пользователя?')) resetProgress()">Сбросить прогресс</button>
          <button class="ghost" onclick="if(confirm('Выйти из аккаунта?')) logout()">Выйти</button>
        </div>
        <div style="height:16px"></div>
        <div class="mini">
          <h4>Текущий профиль</h4>
          <p>ФИО: <strong>${safeText(state.user?.fullName || '')}</strong></p>
          <p>Группа: <strong>${safeText(state.user?.group || '')}</strong></p>
          <p>Email: <strong>${safeText(state.user?.email || '—')}</strong></p>
          <p>Ключ прогресса: <span class="tiny">${safeText(storageKeyForUser(state.user?.fullName || ''))}</span></p>
        </div>
      </div>
    </div>
  `;
}
function autoFailMicroByTimeout() {
  const tr = state.training;
  if (!tr || tr.kind !== 'micro' || !tr.current || tr.awaitingGrade || tr.microTimedOut) return;

  const cur = tr.current;
  const elapsed = tr.questionStartedAt ? Math.max(25, Math.round((Date.now() - tr.questionStartedAt) / 1000)) : 40;

  tr.microTimedOut = true;
  tr.currentElapsedSec = elapsed;
  tr.timeoutMessage = '25 секунд истекли. Препарат засчитан как нерешённый.';
  tr.answered = (tr.answered || 0) + 1;

  tr.gradeHistory = tr.gradeHistory || [];
  tr.gradeHistory.push({id: cur.id, grade: 2, elapsedSec: elapsed, timeout: true});

  tr.timeHistory = tr.timeHistory || [];
  tr.timeHistory.push({id: cur.id, elapsedSec: elapsed, grade: 2, timeout: true});

  applyGradeToProgress(cur, 2);

  if (tr.microMode === 'drill') {
    tr.queue.push(deepClone(cur));
  }

  render();

  setTimeout(() => {
    if (!state.training || state.training !== tr) return;
    if (!tr.microTimedOut) return;
    tr.microTimedOut = false;
    tr.timeoutMessage = null;
    nextTrainingQuestion();
  }, 1400);
}

function updateMicroTimerDisplay() {
  const tr = state.training;
  const leftEl = document.getElementById('microTimerLeft');
  const spentEl = document.getElementById('microTimerSpent');
  const chartEl = document.getElementById('microTimeChart');
  const numberEl = document.getElementById('microTimerNumber');
  if (!leftEl || !spentEl || !tr || tr.kind !== 'micro' || !tr.current || !tr.questionStartedAt) return;

  const elapsed = tr.currentElapsedSec ?? Math.max(0, Math.round((Date.now() - tr.questionStartedAt) / 1000));
  const left = Math.max(0, 25 - elapsed);
  const progress = Math.min(1, Math.max(0, elapsed / 25));
  const deg = Math.round(progress * 360);

  leftEl.textContent = left > 0 ? `осталось ${left} сек` : 'время вышло';
  spentEl.textContent = `идёт ${elapsed} сек`;
  leftEl.classList.toggle('timer-bad', elapsed >= 25);

  if (numberEl) numberEl.textContent = String(left);
  if (chartEl) {
    chartEl.style.setProperty('--timer-deg', `${deg}deg`);
    chartEl.classList.toggle('warn', elapsed >= 16 && elapsed < 25);
    chartEl.classList.toggle('expired', elapsed >= 25 || !!tr.microTimedOut);
  }

  if (elapsed >= 25 && !tr.awaitingGrade && !tr.microTimedOut) {
    autoFailMicroByTimeout();
  }
}
setInterval(updateMicroTimerDisplay, 500);

function render() {
  const app = document.getElementById('app');
  if (!app) return;
  const view = state.view;
  document.getElementById('bottomNav').style.display = view === 'dashboard' ? 'block' : 'none';
  let html = '';
  if (view === 'login') html = renderLogin();
  else if (view === 'dashboard') html = renderDashboard();
  else if (view === 'training') html = renderTraining();
  else if (view === 'exam') html = renderExam();
  else if (view === 'mcqTest') html = renderMcqTest();
  else if (view === 'bank') html = renderBank();
  else if (view === 'info') html = renderInfo();
  else if (view === 'examHistory') html = renderExamHistory();
  else if (view === 'settings') html = renderSettings();
  app.innerHTML = html;
  renderExamTimer();
  // fix scheme input handlers in training/exam after render
  if (state.training && state.training.kind === 'scheme' && state.training.current) {
    document.querySelectorAll('.scheme-grid input[data-scheme-key]').forEach((el) => {
      const key = el.dataset.schemeKey;
      el.oninput = (ev) => {
        state.training.currentAttempt.labels = Object.assign({}, state.training.currentAttempt.labels || {}, {[key]: ev.target.value});
      };
    });
  }
  if (state.exam && !state.exam.finished && !state.exam.resultOpen && state.exam.ticket[state.exam.currentIndex]?.type === 'scheme') {
    document.querySelectorAll('.scheme-grid input[data-scheme-key]').forEach((el) => {
      const key = el.dataset.schemeKey;
      el.oninput = (ev) => {
        state.exam.currentAttempt.labels = Object.assign({}, state.exam.currentAttempt.labels || {}, {[key]: ev.target.value});
      };
    });
  }
}
async function initApp() {
  showDbLoading();
  try {
    await loadDbFromSupabase();
    await initFromStorage();
    render();
  } catch (error) {
    showDbError(error);
  }
}

setInterval(() => {
  if (state.user?.id) checkCurrentUserAccess();
}, 30000);

initApp();
</script>
</body>
</html>
