<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HistoQuiz Pro Vundervaflia</title>
  <style>
    :root{
      --bg:#120a1e;
      --bg2:#1a102a;
      --card:#221436cc;
      --card2:#2b1745;
      --line:#6d4da8;
      --line2:#8f67d8;
      --text:#f4ecff;
      --muted:#c7b4e7;
      --soft:#d7c9ef;
      --accent:#b17cff;
      --accent2:#8d5ef3;
      --danger:#ef5b7d;
      --success:#4ed6a8;
      --warning:#ffca73;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --radius: 24px;
      --radius-sm: 16px;
      --max: 1260px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(177,124,255,.18), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(142,96,243,.15), transparent 24%),
        linear-gradient(180deg, #0d0716 0%, #1a1028 100%);
      color:var(--text);
      overflow-x:hidden;
    }
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    .app{
      min-height:auto;
      display:flex;
      flex-direction:column;
    }
    .shell{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      padding:20px 0 96px;
      flex:1;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 18px;
      background:linear-gradient(180deg, rgba(45,23,71,.8), rgba(25,14,39,.8));
      border:1px solid rgba(173,134,255,.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom:16px;
      position:sticky;
      top:12px;
      z-index:20;
    }
    .brand{
      display:flex;align-items:center;gap:12px;min-width:0;
    }
    .brand-badge{
      width:46px;height:46px;border-radius:16px;
      background:linear-gradient(145deg, var(--accent), #6a36d5);
      display:grid;place-items:center;font-size:22px;box-shadow:0 10px 25px rgba(130,73,255,.35)
    }
    .brand h1{margin:0;font-size:18px;line-height:1.1}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .userchip{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      white-space:nowrap;
      max-width:45%;
      overflow:hidden;text-overflow:ellipsis;
    }
    .userchip strong{color:var(--text)}
    .hero{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:16px;
      margin-bottom:16px;
    }
    .panel{
      background:linear-gradient(180deg, rgba(44,26,69,.9), rgba(24,15,38,.86));
      border:1px solid rgba(177,124,255,.16);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel.pad{padding:18px}
    .stats{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
    }
    .stat{
      padding:16px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);
    }
    .stat .label{font-size:12px;color:var(--muted);margin-bottom:10px}
    .stat .value{font-size:26px;font-weight:800;letter-spacing:-.03em}
    .stat .hint{margin-top:8px;font-size:12px;color:var(--soft)}
    .status-card{
      padding:18px;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:14px;
      background:
        radial-gradient(circle at 20% 20%, rgba(177,124,255,.15), transparent 28%),
        linear-gradient(180deg, rgba(43,23,69,.92), rgba(19,12,31,.94));
    }
    .status-card h2{margin:0 0 8px;font-size:22px}
    .status-card p{margin:0;color:var(--muted);line-height:1.55}
    .pill-row{display:flex;flex-wrap:wrap;gap:8px}
    .pill{
      padding:8px 12px;border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      font-size:12px;
    }
    .section-tabs{
      display:flex;flex-wrap:wrap;gap:10px;
      margin:14px 0 16px;
    }
    .tab{
      border:0;
      color:var(--text);
      background:rgba(255,255,255,.06);
      padding:12px 16px;
      border-radius:999px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.08);
      transition:.2s ease;
    }
    .tab.active{
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 12px 25px rgba(125,76,255,.3);
      border-color:transparent;
    }
    .section-head{
      display:flex;justify-content:space-between;align-items:end;gap:12px;
      margin:10px 2px 14px;
    }
    .section-head h3{margin:0;font-size:20px}
    .section-head .sub{color:var(--muted);font-size:13px}
    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      overflow:hidden;
      position:relative;
    }
    .card.clickable{cursor:pointer;transition:.18s ease}
    .card.clickable:hover{transform:translateY(-2px);border-color:rgba(177,124,255,.35)}
    .card h4{margin:0 0 8px;font-size:17px;line-height:1.25}
    .card p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .card-top{
      display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;
    }
    .badge{
      padding:6px 10px;border-radius:999px;font-size:11px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      white-space:nowrap;
    }
    .badge.good{background:rgba(78,214,168,.14);color:#9bf1d2;border-color:rgba(78,214,168,.2)}
    .badge.warn{background:rgba(255,202,115,.14);color:#ffe0a7;border-color:rgba(255,202,115,.22)}
    .badge.dev{background:rgba(177,124,255,.12);color:#d8bcff;border-color:rgba(177,124,255,.18)}
    .progress{
      height:10px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;margin:14px 0 8px;
      border:1px solid rgba(255,255,255,.06);
    }
    .progress > span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg, var(--accent), var(--success))}
    .meta{
      display:flex;justify-content:space-between;gap:10px;
      color:var(--soft);font-size:12px;
    }
    .bottom-nav{
      padding:12px 0 2px;
      margin-top:18px;
    }
    .bottom-nav .wrap{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      display:grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap:10px;
    }
    .navbtn{
      border:0;
      color:var(--text);
      padding:14px 14px;
      border-radius:18px;
      cursor:pointer;
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.08);
      transition:.2s ease;
      min-height:52px;
      font-weight:700;
    }
    .navbtn:hover{transform:translateY(-1px)}
    .navbtn.red{background:linear-gradient(135deg, #ff5a7b, #d63b59)}
    .navbtn.purple{background:linear-gradient(135deg, #9f74ff, #7141df)}
    .navbtn.gray{background:linear-gradient(135deg, #4f4a5d, #353041)}
    .navbtn.full{grid-column: span 1}
    .login-wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }
    .login{
      width:min(920px, 100%);
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
    }
    .login .left{
      padding:28px;
      background:
        radial-gradient(circle at 30% 20%, rgba(177,124,255,.17), transparent 25%),
        linear-gradient(180deg, rgba(42,22,67,.95), rgba(18,11,31,.95));
      border-radius:30px;
      border:1px solid rgba(177,124,255,.18);
      box-shadow: var(--shadow);
    }
    .login .left h1{margin:6px 0 10px;font-size:34px;line-height:1.05}
    .login .left p{margin:0;color:var(--muted);line-height:1.6}
    .featurelist{
      margin-top:18px;display:grid;gap:10px
    }
    .feature{
      display:flex;gap:10px;align-items:flex-start;
      padding:12px 14px;border-radius:18px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)
    }
    .feature b{display:block;margin-bottom:2px}
    .login .right{
      padding:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border-radius:30px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      display:flex;flex-direction:column;justify-content:center;
    }
    .form{
      display:grid;gap:12px;
    }
    .field label{display:block;font-size:12px;color:var(--muted);margin:0 0 7px 2px}
    .field input, .field select, .field textarea{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(13,7,22,.55);
      color:var(--text);
      padding:14px 14px;
      outline:none;
      transition:.2s ease;
    }
    .field textarea{min-height:120px;resize:vertical}
    .field input:focus, .field select:focus, .field textarea:focus{
      border-color:rgba(177,124,255,.5);
      box-shadow:0 0 0 4px rgba(177,124,255,.12)
    }
    .primary, .ghost, .danger, .success-btn{
      border:0;
      border-radius:16px;
      padding:13px 15px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
      color:var(--text);
    }
    .primary{background:linear-gradient(135deg, var(--accent), var(--accent2));}
    .ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08)}
    .danger{background:linear-gradient(135deg, #ff6a86, #d83b5f)}
    .success-btn{background:linear-gradient(135deg, #52d5a8, #2fad7f)}
    .inline-actions{display:flex;flex-wrap:wrap;gap:10px}
    .muted{color:var(--muted)}
    .screen{display:none}
    .screen.active{display:block}
    .backline{
      display:flex;align-items:center;gap:10px;margin-bottom:14px
    }
    .backline button{padding:10px 14px;border-radius:14px}
    .training-layout{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:16px;
    }
    .media-box{
      padding:16px;
    }
    .media{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      background:#150d22;
      border:1px solid rgba(255,255,255,.08);
      min-height: 420px;
      display:grid;
      place-items:center;
    }
    .media img, .media svg{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      cursor:pointer;
      user-select:none;
    }
    .media-note{
      position:absolute;
      left:12px;top:12px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(13,7,22,.66);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
    }
    .qa{
      padding:18px;
      display:grid;
      gap:14px;
    }
    .prompt{
      padding:16px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .prompt h3{margin:0 0 8px;font-size:20px}
    .prompt p{margin:0;color:var(--muted);line-height:1.5}
    .feedback{
      padding:14px 16px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      display:none;
    }
    .feedback.show{display:block}
    .feedback.ok{border-color:rgba(78,214,168,.25);background:rgba(78,214,168,.08)}
    .feedback.bad{border-color:rgba(239,91,125,.25);background:rgba(239,91,125,.08)}
    .feedback .title{font-weight:800;margin-bottom:8px}
    .feedback .small{font-size:13px;color:var(--soft);line-height:1.45}
    .prep-description{
      display:none;
      padding:16px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(177,124,255,.12), rgba(255,255,255,.04));
      border:1px solid rgba(177,124,255,.20);
      box-shadow:0 12px 26px rgba(0,0,0,.18);
    }
    .prep-description.show{display:block}
    .prep-description h4{
      margin:0 0 10px;
      font-size:16px;
      line-height:1.25;
    }
    .prep-description .desc-text{
      color:var(--soft);
      font-size:13px;
      line-height:1.55;
      white-space:normal;
    }
    .prep-html-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      line-height:1.65;
      font-size:15px;
      color:var(--soft);
    }
    .prep-html-card{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:18px;
    }
    .prep-html-card.wide{grid-column:1 / -1}
    .prep-html-card h2{margin:0 0 12px;color:var(--text);font-size:24px;line-height:1.2}
    .prep-html-card h3{margin:18px 0 10px;color:var(--text);font-size:18px;line-height:1.25}
    .prep-html-card p{margin:0 0 12px}
    .prep-html-card b{color:var(--text)}
    .scheme-grid{
      display:grid; gap:12px; grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
    }
    .scheme-grid .field input{padding:12px}

    .prep-modal-body{
      flex:1;
      overflow:auto;
      padding:16px;
      background:radial-gradient(circle at 50% 20%, rgba(177,124,255,.08), transparent 35%);
    }
    .prep-detail-layout{
      display:grid;
      gap:16px;
      align-items:start;
    }
    .prep-detail-img{
      width:100%;
      max-height:64vh;
      object-fit:contain;
      display:block;
      border-radius:24px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.08);
    }
    .prep-detail-side{
      display:grid;
      gap:12px;
    }
    .prep-description.bank-show{
      display:block;
      margin-top:0;
      width:100%;
    }
    .prep-description.training-wide{
      display:block;
      margin-top:16px;
      width:100%;
    }
    .prep-variant-full{
      width:100%;
      padding:16px;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(177,124,255,.18);
      box-shadow:0 14px 34px rgba(0,0,0,.24);
    }
    .prep-variant-full h3{
      margin:0 0 12px;
      font-size:18px;
    }
    .prep-variant-full img{
      width:100%;
      height:min(78vh, 820px);
      object-fit:contain;
      display:block;
      border-radius:24px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.08);
    }

    .fullscreen-img-modal{
      position:fixed;
      inset:0;
      z-index:80;
      display:none;
      background:rgba(5,3,8,.92);
      backdrop-filter: blur(8px);
      padding:18px;
    }
    .fullscreen-img-modal.open{display:grid;place-items:center}
    .fullscreen-img-wrap{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      position:relative;
    }
    .fullscreen-img-wrap img{
      max-width:96vw;
      max-height:92vh;
      object-fit:contain;
      border-radius:22px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 18px 55px rgba(0,0,0,.55);
    }
    .fullscreen-close{
      position:fixed;
      right:22px;
      top:18px;
      z-index:82;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.12);
      color:var(--text);
      border-radius:16px;
      padding:12px 15px;
      cursor:pointer;
      font-weight:900;
      backdrop-filter: blur(10px);
    }
    .fullscreen-caption{
      position:fixed;
      left:22px;
      bottom:18px;
      z-index:82;
      max-width:min(760px, calc(100vw - 44px));
      padding:10px 12px;
      border-radius:999px;
      background:rgba(13,7,22,.66);
      border:1px solid rgba(255,255,255,.10);
      color:var(--soft);
      font-size:13px;
    }
    .fullscreen-trigger{cursor:zoom-in}

    .variant-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:10px;
    }
    .variant-card{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      transition:.18s ease;
    }
    .variant-card:hover{border-color:rgba(177,124,255,.35);transform:translateY(-1px)}
    .variant-card.active{border-color:rgba(177,124,255,.55);background:rgba(177,124,255,.12)}
    .variant-card img{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:#120c1b;
    }
    .variant-card .v-title{margin-top:8px;font-size:12px;color:var(--soft);font-weight:800}
    .all-preps-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap:10px;
      margin-top:12px;
      max-height:420px;
      overflow:auto;
      padding-right:4px;
    }
    .all-prep-card{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      transition:.18s ease;
    }
    .all-prep-card:hover{border-color:rgba(177,124,255,.35);transform:translateY(-1px)}
    .all-prep-card.active{border-color:rgba(78,214,168,.40);background:rgba(78,214,168,.08)}
    .all-prep-card img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:#120c1b;
    }
    .all-prep-card .prep-name{margin-top:8px;font-size:13px;font-weight:900;color:var(--text);line-height:1.25}
    .all-prep-card .prep-meta{margin-top:4px;font-size:11px;color:var(--muted);line-height:1.25}
    @media (max-width: 820px){
      .prep-detail-img{max-height:52vh}
      .all-preps-grid{max-height:360px}
    }

    .bank-toolbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      margin-bottom:14px;
    }
    .bank-toolbar .tab{padding:10px 14px}
    .bank-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .bank-card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
    }
    .bank-card .thumb{
      width:100%;
      aspect-ratio: 16/10;
      background:#120c1b;
      display:block;
      object-fit:cover;
      cursor:pointer;
    }
    .bank-card .content{padding:14px}
    .bank-card .content h4{margin:0 0 6px;font-size:16px}
    .bank-card .content p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .bank-card .content .row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
    .list{
      display:grid;gap:12px
    }
    .info-grid{display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr))}
    .mini{
      padding:16px;border-radius:22px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .mini h4{margin:0 0 8px}
    .mini p,.mini li{color:var(--muted);line-height:1.55}
    .mini ul{margin:0;padding-left:20px}
    .modal{
      position:fixed;inset:0;z-index:50;
      display:none;
      background:rgba(5,3,8,.76);
      backdrop-filter: blur(10px);
    }
    .modal.open{display:grid;place-items:center}
    .modal-panel{
      width:min(1200px, calc(100% - 18px));
      height:min(92vh, 940px);
      background:linear-gradient(180deg, rgba(32,18,50,.95), rgba(11,7,16,.97));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .modal-head{
      display:flex;justify-content:space-between;align-items:center;
      gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08)
    }
    .modal-head h3{margin:0;font-size:16px}
    .modal-body{
      flex:1;
      position:relative;
      overflow:hidden;

async function sbSelect(table, query = "*") {
  if (!supabaseClient) throw new Error("Supabase client не создан. Проверь подключение CDN и ключи.");
  const { data, error } = await supabaseClient.from(table).select(query);
  if (error) throw error;
  return data || [];
}

async function sbSelectOptional(table, query = "*") {
  if (!supabaseClient) return [];
  const { data, error } = await supabaseClient.from(table).select(query);
  if (error) {
    console.warn(`Опциональная таблица ${table} не загружена:`, error.message || error);
    return [];
  }
  return data || [];
}

async function loadDbFromSupabase() {
  const [colloquiums, preparations, variants, schemes, theory, tasks] = await Promise.all([
    sbSelect("colloquiums"),
    sbSelect("preparations"),
    sbSelect("preparation_variants"),
    sbSelect("schemes"),
    sbSelect("theory_questions"),
    sbSelect("tasks")
  ]);

  const mcqRows = await sbSelectOptional("test_questions");
  const supabaseTests = (mcqRows || [])
    .map((q, idx) => ({
      id: q.id || `mcq_${idx + 1}`,
      type: "mcq",
      topic_block: q.topic_block || q.topicBlock || "",
      question: q.question || "",
      options: Array.isArray(q.options) ? q.options : [],
      correct_index: Number.isFinite(Number(q.correct_index)) ? Number(q.correct_index) : null,
      correct_indexes: Array.isArray(q.correct_indexes) ? q.correct_indexes.map(Number) : (Number.isFinite(Number(q.correct_index)) ? [Number(q.correct_index)] : []),
      correct_answer: q.correct_answer || "",
      explanation: q.explanation || "",
      order_index: q.order_index || idx + 1
    }))
    .filter(q => q.question && Array.isArray(q.options) && q.options.length);

  const hasCytologyFromSupabase = supabaseTests.some(q => q.topic_block === 'Цитология: клетка, органеллы, клеточный цикл и методы исследования');
  mcqTests = (hasCytologyFromSupabase ? supabaseTests : [...supabaseTests, ...BUILTIN_TEST_QUESTIONS])
    .sort((a, b) => String(a.topic_block || '').localeCompare(String(b.topic_block || ''), 'ru') || (a.order_index || 0) - (b.order_index || 0));

  const nextDb = {};
  colloquiums
    .sort((a, b) => (a.num || 0) - (b.num || 0))
    .forEach((c) => {
      nextDb[c.id] = {
        id: c.id,
        num: c.num,
        title: c.title,
        desc: c.description || "",
        microscopy: [],
        schemes: [],
        theory: [],
        tasks: []
      };
    });

  const variantsByPrep = {};
  variants
    .sort((a, b) => (a.order_index || 0) - (b.order_index || 0))
    .forEach((v) => {
      if (!variantsByPrep[v.preparation_id]) variantsByPrep[v.preparation_id] = [];
      variantsByPrep[v.preparation_id].push({ id: v.id, image_url: v.image_url || "" });
    });

  preparations
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((p) => {
      const colId = p.colloq_id || `colloq_${p.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: p.colloq, title: `Коллоквиум ${p.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }
      nextDb[colId].microscopy.push({
        id: p.id,
        type: p.type || "micro",
        colloq: p.colloq,
        name: p.name,
        stain: p.stain || "",
        image_url: p.image_url || "",
        description: p.description || "",
        variants: variantsByPrep[p.id] || []
      });
    });

  schemes
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((s) => {
      const colId = s.colloq_id || `colloq_${s.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: s.colloq, title: `Коллоквиум ${s.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }
      nextDb[colId].schemes.push({
        id: s.id,
        type: s.type || "scheme",
        colloq: s.colloq,
        title: s.title,
        labels: s.labels || {},
        image_url: s.image_url || "",
        topic_block: s.topic_block || s.topicBlock || ""
      });
    });

  theory
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((t) => {
      const colId = t.colloq_id || `colloq_${t.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: t.colloq, title: `Коллоквиум ${t.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }
      nextDb[colId].theory.push({
        id: t.id,
        type: t.type || "theory",
        colloq: t.colloq,
        question: t.question,
        answerVariants: Array.isArray(t.answer_variants) ? t.answer_variants : [],
        topic_block: t.topic_block || t.topicBlock || ""
      });
    });

  tasks
    .sort((a, b) => (a.colloq || 0) - (b.colloq || 0) || String(a.id).localeCompare(String(b.id), "ru"))
    .forEach((task) => {
      const colId = task.colloq_id || `colloq_${task.colloq}`;
      if (!nextDb[colId]) {
        nextDb[colId] = { id: colId, num: task.colloq, title: `Коллоквиум ${task.colloq}`, desc: "", microscopy: [], schemes: [], theory: [], tasks: [] };
      }
      nextDb[colId].tasks.push({
        id: task.id,
        type: task.type || "task",
        colloq: task.colloq,
        question: task.question,
        answer: task.answer || "",
        answerVariants: Array.isArray(task.answer_variants) ? task.answer_variants : [],
        topic_block: task.topic_block || task.topicBlock || "",
        requiresManualCheck: !!task.requires_manual_check
      });
    });

  db = nextDb;
  return db;
}

function normalize(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/ё/g, 'е')
    .replace(/[^\p{L}\p{N}]+/gu, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function sameText(a, b) {
  const x = normalize(a);
  const y = normalize(b);
  if (!x || !y) return false;
  if (x === y) return true;
  if (x.length >= 4 && y.includes(x)) return true;
  if (y.length >= 4 && x.includes(y)) return true;
  return false;
}
function matchVariants(input, variants) {
  if (!Array.isArray(variants)) return sameText(input, variants);
  return variants.some(v => sameText(input, v));
}
function numericLike(s) {
  const n = Number(String(s).replace(',', '.').replace(/[^\d.-]/g, ''));
  return Number.isFinite(n) ? n : null;
}

function allowedGradesForKind(kind) {

    theory: 'Шкала без 1: 2, 3, 4 или 5. Оценивайте по точности и полноте ответа.',
  })[kind] || 'Шкала без 1: 2–5.';
}

function countSchemeMatches(cur, attempt) {
  const labels = cur.labels || {};
  let matched = 0;
  if (sameText(attempt?.schemeTitle, cur.title)) matched++;
  for (const key of Object.keys(labels)) {
    if (sameText(attempt?.labels?.[key], labels[key])) matched++;
  }
  return { matched, total: Object.keys(labels).length + 1 };
}

function evaluateItem(cur, attempt) {
  let ok = false;
  let detail = '';
  if (cur.type === 'micro') {
    ok = sameText(attempt?.name, cur.name) && sameText(attempt?.stain, cur.stain);
    detail = ok ? `Верно: ${cur.name} / ${cur.stain}` : `Правильно: ${cur.name} / ${cur.stain}`;
  } else if (cur.type === 'scheme') {
    const { matched, total } = countSchemeMatches(cur, attempt);
    ok = matched / total >= 0.8;
    detail = ok ? 'Схема принята.' : `Правильно: ${cur.title}. Подписи: ${Object.entries(cur.labels || {}).map(([k,v]) => `${k}=${v}`).join('; ')}`;
  } else if (cur.type === 'theory') {
    ok = matchVariants(attempt?.answer, cur.answerVariants || cur.answer);
    detail = ok ? 'Ответ принят.' : `Эталон: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`;
  } else if (cur.type === 'task') {
    const entered = attempt?.answer || '';
    const num = numericLike(entered);
    const target = numericLike(cur.answer);
    if (num !== null && target !== null) {
      ok = Math.abs(num - target) / Math.max(1, Math.abs(target)) <= 0.05;
    } else {
      ok = matchVariants(entered, cur.answerVariants || cur.answer);
    }
    detail = ok ? 'Решение верно.' : `Правильно: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`;
  }
  return { ok, detail };
}

function gradeSuggestion(kind, cur, attempt, ok) {
  if (kind === 'micro') return ok ? 5 : 2;
  if (kind === 'task') return ok ? 5 : 2;
  if (kind === 'scheme') {
    const { matched, total } = countSchemeMatches(cur, attempt);
    const labelsTotal = Math.max(0, total - 1);
    const labelsMatched = Math.max(0, matched - 1);
    const titleOk = sameText(attempt?.schemeTitle, cur.title);
    if (titleOk && labelsMatched === labelsTotal && labelsTotal > 0) return 5;
    if (titleOk && labelsTotal > 0 && labelsMatched >= Math.ceil(labelsTotal / 2)) return 4;
    if (titleOk) return 3;
    return 2;
  }
  if (kind === 'theory') {
    const variants = Array.isArray(cur.answerVariants) ? cur.answerVariants : [cur.answer];
    if (matchVariants(attempt?.answer, variants)) return 5;
    const ref = normalize(variants[0] || '');
    const inp = normalize(attempt?.answer || '');
    if (!ref || !inp) return 2;
    const refTokens = new Set(ref.split(' ').filter(Boolean));
    const inpTokens = new Set(inp.split(' ').filter(Boolean));
    let hit = 0;
    for (const token of inpTokens) if (refTokens.has(token)) hit++;
    const ratio = refTokens.size ? hit / refTokens.size : 0;
    if (ratio >= 0.75) return 4;
    if (ratio >= 0.45) return 3;
    return 2;
  }
  return ok ? 5 : 2;
}

function updateStreak() {
  const today = todayKey();
  const last = state.progress.lastStudyDate;
  if (!last) state.progress.streak = 1;
  else if (last === today) state.progress.streak = Math.max(1, state.progress.streak || 1);
  else {
    const d1 = new Date(last + 'T00:00:00');
    const d2 = new Date(today + 'T00:00:00');
    const diff = Math.round((d2 - d1) / 86400000);
    if (diff === 1) state.progress.streak = (state.progress.streak || 0) + 1;
    else state.progress.streak = 1;
  }
  state.progress.lastStudyDate = today;
}

async function loadProfileForUser(authUser) {
  if (!authUser || !supabaseClient) return null;
  const { data: profileData, error } = await supabaseClient
    .from('profiles')
    .select('id, full_name, group_id, role')
    .eq('id', authUser.id)
    .maybeSingle();

  if (!profile) {
    const meta = authUser.user_metadata || {};
    const fullName = meta.full_name || meta.fullName || authUser.email || 'Студент';
    const groupName = meta.group_name || meta.group || '';
    const group = await findGroupByNameFromSupabase(groupName);
    const payload = { id: authUser.id, full_name: fullName, group_id: group?.id || null, role: 'student' };
    const { error: createError } = await supabaseClient.from('profiles').upsert(payload);
    if (createError) console.warn('Не удалось создать профиль после подтверждения email:', createError);
    else profile = payload;
  }
  let groupName = '';
  if (profile?.group_id) {
    const localGroup = (state.groups || []).find(g => g.id === profile.group_id);
    if (localGroup) groupName = localGroup.name;
    else {
      const { data: groupData } = await supabaseClient.from('groups').select('name').eq('id', profile.group_id).maybeSingle();
      groupName = groupData?.name || '';
    }
  }
  return {
    id: authUser.id,
    email: authUser.email || '',
    fullName: profile?.full_name || authUser.user_metadata?.full_name || authUser.email || 'Студент',
    group: groupName || authUser.user_metadata?.group_name || '',
    groupId: profile?.group_id || null,
    role: profile?.role || 'student'
  };

async function handleLoginSubmit(e) {
  e.preventDefault();
  const form = e.currentTarget;
  const mode = form.mode.value;
  const email = form.email.value.trim();
  const password = form.password ? form.password.value : '';
  const token = form.token ? form.token.value.trim() : '';
  const fullName = form.fullName ? form.fullName.value.trim() : '';
  const group = form.group ? form.group.value.trim() : '';
  if (mode === 'verify') {
    if (!email || !token) {
      setAuthMessage('Введите email и код подтверждения.');
      return;
    }
    await verifyEmailCode(email, token);
    return;
  }
  if (!email || !password) {
    setAuthMessage('Введите email и пароль.');
    return;
  }
  if (mode === 'register') {
    if (!fullName || !group) {
      setAuthMessage('Для регистрации нужно ввести ФИО и выбрать группу.');
      return;
    }
    await registerStudent(email, password, fullName, group);
  } else {
    await loginStudent(email, password);
  }
}

function currentMcqItem() {
  return state.mcqTest?.queue?.[state.mcqTest.currentIndex] || null;
}
function correctIndexesForMcq(item) {
  const arr = Array.isArray(item?.correct_indexes) && item.correct_indexes.length
    ? item.correct_indexes.map(Number)
    : (Number.isFinite(Number(item?.correct_index)) ? [Number(item.correct_index)] : []);
  return Array.from(new Set(arr)).sort((a, b) => a - b);
}
function sameIndexSet(a, b) {
  const x = Array.from(new Set((a || []).map(Number))).sort((m, n) => m - n);
  const y = Array.from(new Set((b || []).map(Number))).sort((m, n) => m - n);
  return x.length === y.length && x.every((v, i) => v === y[i]);
}

function selectMcqOption(index) {
  if (!state.mcqTest || state.mcqTest.checked) return;
  const current = Array.isArray(state.mcqTest.selected) ? state.mcqTest.selected.slice() : [];
  const i = current.indexOf(index);
  if (i >= 0) current.splice(i, 1);
  else current.push(index);
  state.mcqTest.selected = current.sort((a, b) => a - b);
  render();
}

function checkMcqAnswer() {
  const test = state.mcqTest;
  const cur = currentMcqItem();
  if (!test || !cur) return;
  if (!Array.isArray(test.selected) || !test.selected.length) {
    alert('Сначала выбери один или несколько вариантов ответа.');
    return;
  }
  const correctIndexes = correctIndexesForMcq(cur);
  const ok = sameIndexSet(test.selected, correctIndexes);
  test.answers[test.currentIndex] = {
    itemId: cur.id,
    selected: test.selected.slice(),
    correctIndexes,
    ok,
  };
  test.checked = true;
  render();
}

function nextMcqQuestion() {
  const test = state.mcqTest;
  if (!test) return;
  if (test.currentIndex >= test.queue.length - 1) {
    finishMcqTest();
    return;
  }
  test.currentIndex++;
  test.selected = [];
  test.checked = false;
  render();
}

function finishMcqTest() {
  if (!state.mcqTest) return;
  state.mcqTest.finished = true;
  render();
}

function renderMcqTest() {

  const total = test.queue.length;
  const answered = test.answers.filter(Boolean).length;

  if (test.finished) {
    return `

          <div class="results">
            ${test.queue.map((item, idx) => {
              const a = test.answers[idx] || {};
              const selectedText = Array.isArray(a.selected) && a.selected.length ? a.selected.map(i => item.options?.[i] ?? '').filter(Boolean).join('; ') : '—';
              const correctArr = Array.isArray(a.correctIndexes) && a.correctIndexes.length ? a.correctIndexes : correctIndexesForMcq(item);
              const correctText = correctArr.map(i => item.options?.[i] ?? '').filter(Boolean).join('; ') || item.correct_answer || '—';
              return `
                <div class="result-row ${a.ok ? 'ok' : 'bad'}">
                  <div>
                    <strong>${idx + 1}. ${safeText(item.question || '')}</strong>
                    <div class="tiny">Ваш ответ: ${safeText(selectedText)}</div>
                    <div class="tiny">Правильно: ${safeText(correctText)}</div>
                    ${item.explanation ? `<div class="tiny">Пояснение: ${safeText(item.explanation)}</div>` : ''}
                  </div>
                  <strong>${a.ok ? 'верно' : 'ошибка'}</strong>
                </div>
              `;
            }).join('')}
          </div>
          <div class="inline-actions" style="margin-top:14px">
            <button class="primary" onclick="startTopicTest(decodeURIComponent('${encodeURIComponent(test.topicBlock)}'))">Повторить</button>
            <button class="ghost" onclick="showView('dashboard')">Вернуться</button>
          </div>
        </div>
      </div>
    `;
  }

  const cur = currentMcqItem();
  const selected = Array.isArray(test.selected) ? test.selected : [];
  const correctIndexes = correctIndexesForMcq(cur);
  return `
    <div class="shell">
      <div class="backline">
        <button class="ghost" onclick="showView('dashboard')">← Назад</button>
        <div class="muted">${safeText(test.title)}</div>
      </div>
      <div class="panel pad mcq-panel">
        <div class="mcq-top">
          <div>
            <div class="tiny">Вопрос ${test.currentIndex + 1} из ${total}</div>
            <h2>${safeText(cur.question || '')}</h2>
          </div>
          <span class="badge dev">${safeText(test.topicBlock)}</span>
        </div>
        <p class="tiny" style="margin-top:6px">Можно выбрать несколько вариантов ответа.</p>
        <div class="mcq-options">
          ${(cur.options || []).map((opt, idx) => {
            const isSelected = selected.includes(idx);
            const isCorrect = test.checked && correctIndexes.includes(idx);
            const isWrong = test.checked && isSelected && !correctIndexes.includes(idx);
            return `
              <button type="button"
                class="mcq-option ${isSelected ? 'selected' : ''} ${isCorrect ? 'correct' : ''} ${isWrong ? 'wrong' : ''}"

                <b>${safeText(opt)}</b>

            <div class="title">${sameIndexSet(selected, correctIndexes) ? 'Верно' : 'Ошибка'}</div>
            <div class="small">Правильный ответ: ${safeText(correctIndexes.map(i => cur.options?.[i] || '').filter(Boolean).join('; ') || cur.correct_answer || '')}</div>
            ${cur.explanation ? `<div class="small" style="margin-top:8px">${safeText(cur.explanation)}</div>` : ''}
          </div>
        ` : ''}
        <div class="inline-actions">
          ${test.checked
            ? `<button class="primary" onclick="nextMcqQuestion()">${test.currentIndex >= total - 1 ? 'Завершить' : 'Дальше'}</button>`
            : `<button class="primary" onclick="checkMcqAnswer()">Проверить</button>`}
          <button class="ghost" onclick="finishMcqTest()">Завершить тест</button>

      </div>
    </div>
  `;

function kindLabel(kind) {
  return ({micro:'Препараты', scheme:'Схемы', theory:'Теоретические вопросы', task:'Задачи', mcq:'Тестирование'})[kind] || kind;
}
function nextTrainingQuestion() {

function clampGrade(v) {
  return clamp(Number(v) || 0, 2, 5);
}
function ratingLabel(g) {
  return ({2:'2 — не засчитано', 3:'3 — частично', 4:'4 — почти верно', 5:'5 — отлично'})[g] || String(g || '');
}
function evaluateItem(item, attempt) {
  const cur = item || {};
  const a = attempt || {};
  if (cur.type === 'micro') {
    const nameOk = sameText(a.name, cur.name) || normalize(cur.name).includes(normalize(a.name || ''));
    const stainOk = sameText(a.stain, cur.stain);
    const ok = nameOk && stainOk;
    return {
      ok,
      suggestedGrade: ok ? 5 : 2,
      detail: ok ? `Верно: ${cur.name} / ${cur.stain}` : `Правильно: ${cur.name} / ${cur.stain}`,
      title: cur.name || cur.title || ''
    };
  }
  if (cur.type === 'scheme') {
    const titleOk = sameText(a.schemeTitle, cur.title);
    const labels = cur.labels || {};
    let good = 0;
    const total = Math.max(1, Object.keys(labels).length);
    for (const key of Object.keys(labels)) {
      if (sameText(a.labels?.[key], labels[key])) good++;
    }
    const ratio = good / total;
    let suggestedGrade = 2;
    if (titleOk && ratio === 1) suggestedGrade = 5;
    else if (titleOk && ratio >= 0.5) suggestedGrade = 4;
    else if (titleOk) suggestedGrade = 3;
    const ok = suggestedGrade >= 5;
    return {
      ok,
      suggestedGrade,
      detail: titleOk
        ? `Название верное. Подписей угадано: ${good}/${total}.`
        : `Название схемы не совпало. Правильно: ${cur.title}.`,
      title: cur.title || ''
    };
  }
  if (cur.type === 'theory') {
    const entered = String(a.answer || '').trim();
    return {
      ok: false,
      suggestedGrade: entered ? 3 : 2,
      detail: 'Сложный теоретический ответ. Поставьте себе оценку после проверки.',
      title: cur.question || ''
    };
  }
  if (cur.type === 'task') {
    const entered = a.answer || '';
    const num = numericLike(entered);
    const target = numericLike(cur.answer);
    let ok = false;
    if (num !== null && target !== null) {
      ok = Math.abs(num - target) / Math.max(1, Math.abs(target)) <= 0.05;
    } else {
      ok = matchVariants(entered, cur.answerVariants || cur.answer);
    }
    return {
      ok,
      suggestedGrade: ok ? 5 : 2,
      detail: ok ? 'Решение верно.' : `Правильно: ${(cur.answerVariants && cur.answerVariants[0]) || cur.answer}`,
      title: cur.question || ''
    };
  }
  return { ok:false, suggestedGrade:3, detail:'', title:'' };
}
function applyGradeToProgress(item, grade) {
  if (!state.progress || !item) return;
  if (grade === 5 && !state.progress.learnedIds.includes(item.id)) state.progress.learnedIds.push(item.id);
  state.progress.score = (state.progress.score || 0) + clampGrade(grade);
  updateStreak();
  saveProgress();
}
function submitTrainingAnswer() {
  const tr = state.training;
  if (!tr || !tr.current || tr.awaitingGrade) return;
  const cur = tr.current;
  const evalData = evaluateItem(cur, tr.currentAttempt);
  tr.awaitingGrade = true;
  tr.evaluation = evalData;
  tr.lastResult = evalData.ok;
  tr.resultDetail = evalData.detail;
  tr.selectedGrade = clampGrade(evalData.suggestedGrade || 3);
  render();
}
function finalizeTrainingGrade(grade) {
  const tr = state.training;
  if (!tr || !tr.current || !tr.awaitingGrade) return;
  const cur = tr.current;
  const g = clampGrade(grade);
  tr.answered = (tr.answered || 0) + 1;
  tr.gradeHistory = tr.gradeHistory || [];
  tr.gradeHistory.push({id: cur.id, grade: g});
  tr.correct = (tr.correct || 0) + (g === 5 ? 1 : 0);
  applyGradeToProgress(cur, g);
  tr.lastGrade = g;
  tr.lastResult = g === 5;
  tr.resultDetail = `${tr.evaluation?.detail || ''} Итоговая оценка: ${g}/5.`;
  tr.awaitingGrade = false;
  tr.evaluation = null;
  tr.selectedGrade = null;
  if (g === 5) {
    nextTrainingQuestion();
  } else {
    if (Math.random() < 0.5) {
      tr.queue.push(cur);
    } else {
      const maxGap = Math.min(3, Math.max(1, tr.queue.length));
      const gap = 1 + Math.floor(Math.random() * maxGap);
      const pos = Math.min(tr.queue.length, gap);
      tr.queue.splice(pos, 0, cur);
    }
    nextTrainingQuestion();
  }
}

function buildExamTicket() {
  const pool = {
    micro: shuffle(allMicro()),
    scheme: shuffle(allSchemes()),
    theory: shuffle(allTheory()),
    task: shuffle(allTasks()),
  };
  const take = (arr, n, fallbackFactory) => {
    const out = [];
    for (let i = 0; i < n; i++) {
      if (arr.length) out.push(arr.shift());
      else out.push(fallbackFactory(i));
    }
    return out;
  };
  const dummy = {
    micro: i => ({id:`dummy_micro_${i}`, type:'micro', name:'В разработке', stain:'В разработке', image_url: microSvg('В разработке', 'Заполните массив microscopy', 'dummy'+i), colloqId:'dummy'}),
    scheme: i => ({id:`dummy_scheme_${i}`, type:'scheme', title:'В разработке', labels:{'1':'...', '2':'...'}, image_url: schemeSvg({id:`dummy_scheme_${i}`, title:'В разработке', labels:{'1':'...','2':'...'}}), colloqId:'dummy'}),
    theory: i => ({id:`dummy_theory_${i}`, type:'theory', question:'В разработке', answerVariants:['В разработке'], colloqId:'dummy'}),
    task: i => ({id:`dummy_task_${i}`, type:'task', question:'В разработке', answer:'В разработке', answerVariants:['В разработке'], colloqId:'dummy'}),
  };
  const ticket = [
    ...take(pool.micro, 2, dummy.micro),
    ...take(pool.scheme, 1, dummy.scheme),
    ...take(pool.theory, 2, dummy.theory),
    ...take(pool.task, 2, dummy.task),
  ].map((item, idx) => ({...item, ticketIndex: idx + 1}));
  return ticket;
}

async function saveExamResultToSupabase(record) {
  if (!supabaseClient || !state.user?.id) return;
  const score = Array.isArray(record.grades) ? record.grades.reduce((s, v) => s + (Number(v) || 0), 0) : 0;
  const total = Array.isArray(record.grades) ? record.grades.length * 5 : 0;
  const percent = total ? Math.round((score / total) * 100) : 0;
  const { error } = await supabaseClient.from('exam_results').insert({
    user_id: state.user.id,
    student_name: state.user.fullName || '',
    group_name: state.user.group || '',
    colloq: 'Экзаменационный билет',
    score,
    total,
    percent,
    grade: String(record.finalMark || ''),
    duration_seconds: Math.max(0, Math.round(((record.finishedAt || Date.now()) - (record.startedAt || Date.now())) / 1000)),
    answers_json: record
  });
  if (error) {
    console.warn('Ошибка сохранения результата в Supabase:', error);
    alert('Результат сохранён локально, но не отправился в базу: ' + error.message);
  }
}

async function finalizeExamGrades() {
  const ex = state.exam;
  if (!ex || ex.finalized) return;
  ex.finalized = true;
  const answers = ex.answers || [];
  const items = ex.ticket || [];
  const grades = items.map((item, idx) => clampGrade(answers[idx]?.grade ?? answers[idx]?.suggestedGrade ?? (item.type === 'theory' ? 3 : 2)));
  const avg = grades.length ? grades.reduce((s, v) => s + v, 0) / grades.length : 0;
  const finalMark = grades.length ? Math.round(avg) : 0;
  items.forEach((item, idx) => {
    const grade = grades[idx];
    if (item) applyGradeToProgress(item, grade);
  });
  const examRecord = {
    id: `exam_${Date.now()}`,
    startedAt: ex.startedAt,
    finishedAt: Date.now(),
    durationMinutes: Math.round((ex.duration || 0) / 60000) || 90,
    avg: Number(avg.toFixed(2)),
    finalMark,
    grades,
    studentName: state.user?.fullName || '',
    groupName: state.user?.group || '',
    items: items.map((item, idx) => ({
      type: item.type,
      label: item.type === 'micro' ? (item.name || item.title || '') : item.type === 'scheme' ? (item.title || '') : (item.question || ''),
      grade: grades[idx],
      itemId: item.id || ''
    })),
  };
  pushExamHistory(examRecord);
  await saveExamResultToSupabase(examRecord);
  state.exam = null;
  state.view = 'dashboard';
  render();
}

function renderExam() {

    const avg = grades.length ? (grades.reduce((s, v) => s + v, 0) / grades.length) : 0;

          <option value="">Выберите окраску</option>

function setExamGrade(index, grade) {
  const ex = state.exam;
  if (!ex || ex.finalized || !ex.answers || !ex.answers[index]) return;
  ex.answers[index].grade = clampGrade(grade);
  render();
}
function renderTopicBank(cat, items) {
  const kind = cat === 'task' ? 'task' : cat === 'scheme' ? 'scheme' : 'theory';
  const cards = TOPIC_BLOCKS.map((block, idx) => {
    const blockItems = items.filter(item => topicBlockOf(item) === block);
    const totalItems = blockItems.length;
    const learnedItems = blockItems.filter(i => learnedSet().has(i.id)).length;
    const percent = totalItems ? Math.round(learnedItems / totalItems * 100) : 0;
    return `
      <div class="card clickable" onclick="startTopicTraining('${kind}', decodeURIComponent('${encodeURIComponent(block)}'))">
        <div class="card-top">
          <div>
            <h4>${idx + 1}. ${safeText(block)}</h4>
            <p>${totalItems ? `Элементов в блоке: ${totalItems}` : 'Пока нет элементов в этом блоке.'}</p>
          </div>
          <span class="badge ${totalItems ? 'dev' : 'warn'}">${totalItems ? 'Открыть' : 'Пусто'}</span>
        </div>
        <div class="progress"><span style="width:${percent}%"></span></div>
        <div class="meta">
          <span>${learnedItems} / ${totalItems}</span>
          <span>${percent}%</span>
        </div>
      </div>
    `;
  }).join('');

  const noBlockItems = items.filter(item => !String(item?.topic_block || item?.topicBlock || '').trim() && !TOPIC_BLOCKS.includes(topicBlockOf(item)));
  const noBlockCard = noBlockItems.length ? `
    <div class="card clickable" onclick="startTopicTraining('${kind}', decodeURIComponent('%D0%91%D0%B5%D0%B7%20%D0%B1%D0%BB%D0%BE%D0%BA%D0%B0%20%D1%82%D0%B5%D0%BC%D1%8B'))">
      <div class="card-top">
        <div>
          <h4>Без блока темы</h4>
          <p>Элементы, у которых ещё не заполнено поле topic_block.</p>
        </div>
        <span class="badge warn">${noBlockItems.length}</span>
      </div>
    </div>
  ` : '';

  return `<div class="grid">${cards}${noBlockCard}</div>`;
}

  return `

      <div class="backline">

        <p class="muted">${data.subtitle}</p>

      <div style="height:14px"></div>

        <div class="chart-card">

            <span>Не пройдено: <strong>${remainMicro}</strong></span>
            <span>${percentMicro}%</span>
          </div>
        </div>`;
      })() : ''}
      ${cat === 'micro' ? `<div class="bank-grid">${cardHtml}</div>` : renderTopicBank(cat, data.items)}
    </div>
  `;
}

  <h3 style="margin-top: 20px; font-size: 14px; text-transform: uppercase; color: var(--muted);">Команда разработчиков (701-15, 701-16):</h3>
  <div style="margin-top: 10px; display: grid; gap: 8px; color: var(--soft); font-size: 14px;">
    <div>• Архангельский Дмитрий.Владимирович (701-16) — Lead Developer</div>
    <div>• Карнаух Михаил Александрович (701-16) — UI/UX Research</div>
    <div>• Махмудова Варвара Романовна (701-16) — QA & Testing</div>
    <div>• Еналдиева Мария Артуровна (701-15) — Content Advisor</div>
    <div>• Мирошниченко Виктория Романовна (701-15) — Project Coordinator</div>
  </div>
  <p style="margin-top: 20px; font-size: 12px; color: var(--muted); text-align: center;">
    Версия: 1.3 PRO | Год: 2026
  </p>
</div>
      </div>
    </div>
  `;
}

function renderExamHistory() {
  const history = getExamHistory();
  const attempts = history.length;
  const avgOfAverages = attempts ? history.reduce((s, h) => s + (Number(h.avg) || 0), 0) / attempts : 0;
  const bestMark = attempts ? Math.max(...history.map(h => Number(h.finalMark) || 0)) : 0;
  const cards = history.map((h, idx) => {
    const dt = new Date(h.finishedAt || h.startedAt || Date.now());
    const stamp = isNaN(dt.getTime()) ? '—' : dt.toLocaleString('ru-RU');
    const grades = Array.isArray(h.grades) ? h.grades.join(' · ') : '—';
    const items = Array.isArray(h.items) ? h.items.map(it => `${it.label || '—'} (${it.grade || '—'})`).join('; ') : '';
    return `
      <div class="history-card">
        <div class="history-head">
          <div>
            <h4>Попытка #${attempts - idx}</h4>
            <div class="history-meta">${safeText(stamp)}</div>
          </div>
          <span class="badge ${Number(h.finalMark) >= 4 ? 'good' : 'warn'}">Итог ${safeText(String(h.finalMark || 0))}</span>
        </div>
        <div class="history-meta">Средний балл: <strong>${safeText(String(Number(h.avg || 0).toFixed ? Number(h.avg || 0).toFixed(2) : h.avg || 0))}</strong></div>
        <div class="history-meta">Оценки по билетy: ${safeText(grades)}</div>
        <div class="tiny" style="margin-top:8px">${safeText(items)}</div>
      </div>
    `;
  }).join('');
  return `
    <div class="shell">
      <div class="backline">
        <button class="ghost" onclick="showView('dashboard')">← Назад</button>
        <div class="muted">История прохождений экзаменов</div>
      </div>
      <div class="panel pad">
        <h2 style="margin-top:0">История экзаменов</h2>
        <p class="muted">Все экзаменационные попытки сохраняются локально для текущего профиля.</p>
        <div class="grid" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-top:14px">
          <div class="stat"><div class="label">Попыток</div><div class="value">${attempts}</div></div>
          <div class="stat"><div class="label">Средний балл</div><div class="value">${attempts ? avgOfAverages.toFixed(2) : '0.00'}</div></div>
          <div class="stat"><div class="label">Лучший итог</div><div class="value">${bestMark}</div></div>
        </div>
      </div>
      <div style="height:14px"></div>
      <div class="history-grid">
        ${cards || `<div class="panel pad"><p class="muted">Пока нет сохранённых попыток экзамена.</p></div>`}
      </div>
    </div>
  `;
}
function renderSettings() {
  return `
    <div class="shell">
      <div class="backline">
        <button class="ghost" onclick="showView('dashboard')">← Назад</button>
        <div class="muted">Настройки и выход</div>
      </div>
      <div class="panel pad">
        <h2 style="margin-top:0">Управление данными</h2>
        <p class="muted">Сброс удаляет только локальный прогресс текущего пользователя. Аккаунт хранится в Supabase; выход завершает сессию на этом устройстве.</p>
        <div class="inline-actions">
          <button class="danger" onclick="if(confirm('Сбросить прогресс текущего пользователя?')) resetProgress()">Сбросить прогресс</button>
          <button class="ghost" onclick="if(confirm('Выйти из аккаунта?')) logout()">Выйти</button>
        </div>
        <div style="height:16px"></div>
        <div class="mini">
          <h4>Текущий профиль</h4>
          <p>ФИО: <strong>${safeText(state.user?.fullName || '')}</strong></p>
          <p>Группа: <strong>${safeText(state.user?.group || '')}</strong></p>
          <p>Email: <strong>${safeText(state.user?.email || '—')}</strong></p>
          <p>Ключ прогресса: <span class="tiny">${safeText(storageKeyForUser(state.user?.fullName || ''))}</span></p>
        </div>
      </div>
    </div>
  `;
}
function render() {
  const app = document.getElementById('app');
  if (!app) return;
  const view = state.view;
  document.getElementById('bottomNav').style.display = view === 'dashboard' ? 'block' : 'none';
  let html = '';
  if (view === 'login') html = renderLogin();
  else if (view === 'dashboard') html = renderDashboard();
  else if (view === 'training') html = renderTraining();
  else if (view === 'exam') html = renderExam();
  else if (view === 'mcqTest') html = renderMcqTest();
  else if (view === 'bank') html = renderBank();
  else if (view === 'info') html = renderInfo();
  else if (view === 'examHistory') html = renderExamHistory();
  else if (view === 'settings') html = renderSettings();
  app.innerHTML = html;
  renderExamTimer();
  // fix scheme input handlers in training/exam after render
  if (state.training && state.training.kind === 'scheme' && state.training.current) {
    document.querySelectorAll('.scheme-grid input[data-scheme-key]').forEach((el) => {
      const key = el.dataset.schemeKey;
      el.oninput = (ev) => {
        state.training.currentAttempt.labels = Object.assign({}, state.training.currentAttempt.labels || {}, {[key]: ev.target.value});
      };
    });
  }
  if (state.exam && !state.exam.finished && !state.exam.resultOpen && state.exam.ticket[state.exam.currentIndex]?.type === 'scheme') {
    document.querySelectorAll('.scheme-grid input[data-scheme-key]').forEach((el) => {
      const key = el.dataset.schemeKey;
      el.oninput = (ev) => {
        state.exam.currentAttempt.labels = Object.assign({}, state.exam.currentAttempt.labels || {}, {[key]: ev.target.value});
      };
    });
  }
}
async function initApp() {
  showDbLoading();
  try {
    await loadDbFromSupabase();
    await initFromStorage();
    render();
  } catch (error) {
    showDbError(error);
  }
}

setInterval(() => {
  if (state.user?.id) checkCurrentUserAccess();
}, 30000);

initApp();
</script>
</body>
</html>
