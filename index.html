<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HistoQuiz Pro Vundervaflia</title>
  <style>
    :root{
      --bg:#120a1e;
      --bg2:#1a102a;
      --card:#221436cc;
      --card2:#2b1745;
      --line:#6d4da8;
      --line2:#8f67d8;
      --text:#f4ecff;
      --muted:#c7b4e7;
      --soft:#d7c9ef;
      --accent:#b17cff;
      --accent2:#8d5ef3;
      --danger:#ef5b7d;
      --success:#4ed6a8;
      --warning:#ffca73;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --radius: 24px;
      --radius-sm: 16px;
      --max: 1260px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(177,124,255,.18), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(142,96,243,.15), transparent 24%),
        linear-gradient(180deg, #0d0716 0%, #1a1028 100%);
      color:var(--text);
      overflow-x:hidden;
    }
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    .app{
      min-height:auto;
      display:flex;
      flex-direction:column;
    }
    .shell{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      padding:20px 0 96px;
      flex:1;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 18px;
      background:linear-gradient(180deg, rgba(45,23,71,.8), rgba(25,14,39,.8));
      border:1px solid rgba(173,134,255,.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom:16px;
      position:sticky;
      top:12px;
      z-index:20;
    }
    .brand{
      display:flex;align-items:center;gap:12px;min-width:0;
    }
    .brand-badge{
      width:46px;height:46px;border-radius:16px;
      background:linear-gradient(145deg, var(--accent), #6a36d5);
      display:grid;place-items:center;font-size:22px;box-shadow:0 10px 25px rgba(130,73,255,.35)
    }
    .brand h1{margin:0;font-size:18px;line-height:1.1}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .userchip{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      white-space:nowrap;
      max-width:45%;
      overflow:hidden;text-overflow:ellipsis;
    }
    .userchip strong{color:var(--text)}
    .hero{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:16px;
      margin-bottom:16px;
    }
    .panel{
      background:linear-gradient(180deg, rgba(44,26,69,.9), rgba(24,15,38,.86));
      border:1px solid rgba(177,124,255,.16);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel.pad{padding:18px}
    .stats{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
    }
    .stat{
      padding:16px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);
    }
    .stat .label{font-size:12px;color:var(--muted);margin-bottom:10px}
    .stat .value{font-size:26px;font-weight:800;letter-spacing:-.03em}
    .stat .hint{margin-top:8px;font-size:12px;color:var(--soft)}
    .status-card{
      padding:18px;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:14px;
      background:
        radial-gradient(circle at 20% 20%, rgba(177,124,255,.15), transparent 28%),
        linear-gradient(180deg, rgba(43,23,69,.92), rgba(19,12,31,.94));
    }
    .status-card h2{margin:0 0 8px;font-size:22px}
    .status-card p{margin:0;color:var(--muted);line-height:1.55}
    .pill-row{display:flex;flex-wrap:wrap;gap:8px}
    .pill{
      padding:8px 12px;border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      font-size:12px;
    }
    .section-tabs{
      display:flex;flex-wrap:wrap;gap:10px;
      margin:14px 0 16px;
    }
    .tab{
      border:0;
      color:var(--text);
      background:rgba(255,255,255,.06);
      padding:12px 16px;
      border-radius:999px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.08);
      transition:.2s ease;
    }
    .tab.active{
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 12px 25px rgba(125,76,255,.3);
      border-color:transparent;
    }
    .section-head{
      display:flex;justify-content:space-between;align-items:end;gap:12px;
      margin:10px 2px 14px;
    }
    .section-head h3{margin:0;font-size:20px}
    .section-head .sub{color:var(--muted);font-size:13px}
    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      overflow:hidden;
      position:relative;
    }
    .card.clickable{cursor:pointer;transition:.18s ease}
    .card.clickable:hover{transform:translateY(-2px);border-color:rgba(177,124,255,.35)}
    .card h4{margin:0 0 8px;font-size:17px;line-height:1.25}
    .card p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .card-top{
      display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;
    }
    .badge{
      padding:6px 10px;border-radius:999px;font-size:11px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color:var(--soft);
      white-space:nowrap;
    }
    .badge.good{background:rgba(78,214,168,.14);color:#9bf1d2;border-color:rgba(78,214,168,.2)}
    .badge.warn{background:rgba(255,202,115,.14);color:#ffe0a7;border-color:rgba(255,202,115,.22)}
    .badge.dev{background:rgba(177,124,255,.12);color:#d8bcff;border-color:rgba(177,124,255,.18)}
    .progress{
      height:10px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;margin:14px 0 8px;
      border:1px solid rgba(255,255,255,.06);
    }
    .progress > span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg, var(--accent), var(--success))}
    .meta{
      display:flex;justify-content:space-between;gap:10px;
      color:var(--soft);font-size:12px;
    }
    .bottom-nav{
      padding:12px 0 2px;
      margin-top:18px;
    }
    .bottom-nav .wrap{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      display:grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap:10px;
    }
    .navbtn{
      border:0;
      color:var(--text);
      padding:14px 14px;
      border-radius:18px;
      cursor:pointer;
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.08);
      transition:.2s ease;
      min-height:52px;
      font-weight:700;
    }
    .navbtn:hover{transform:translateY(-1px)}
    .navbtn.red{background:linear-gradient(135deg, #ff5a7b, #d63b59)}
    .navbtn.purple{background:linear-gradient(135deg, #9f74ff, #7141df)}
    .navbtn.gray{background:linear-gradient(135deg, #4f4a5d, #353041)}
    .navbtn.full{grid-column: span 1}
    .login-wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }
    .login{
      width:min(920px, 100%);
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
    }
    .login .left{
      padding:28px;
      background:
        radial-gradient(circle at 30% 20%, rgba(177,124,255,.17), transparent 25%),
        linear-gradient(180deg, rgba(42,22,67,.95), rgba(18,11,31,.95));
      border-radius:30px;
      border:1px solid rgba(177,124,255,.18);
      box-shadow: var(--shadow);
    }
    .login .left h1{margin:6px 0 10px;font-size:34px;line-height:1.05}
    .login .left p{margin:0;color:var(--muted);line-height:1.6}
    .featurelist{
      margin-top:18px;display:grid;gap:10px
    }
    .feature{
      display:flex;gap:10px;align-items:flex-start;
      padding:12px 14px;border-radius:18px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)
    }
    .feature b{display:block;margin-bottom:2px}
    .login .right{
      padding:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border-radius:30px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      display:flex;flex-direction:column;justify-content:center;
    }
    .form{
      display:grid;gap:12px;
    }
    .field label{display:block;font-size:12px;color:var(--muted);margin:0 0 7px 2px}
    .field input, .field select, .field textarea{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(13,7,22,.55);
      color:var(--text);
      padding:14px 14px;
      outline:none;
      transition:.2s ease;
    }
    .field textarea{min-height:120px;resize:vertical}
    .field input:focus, .field select:focus, .field textarea:focus{
      border-color:rgba(177,124,255,.5);
      box-shadow:0 0 0 4px rgba(177,124,255,.12)
    }
    .primary, .ghost, .danger, .success-btn{
      border:0;
      border-radius:16px;
      padding:13px 15px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
      color:var(--text);
    }
    .primary{background:linear-gradient(135deg, var(--accent), var(--accent2));}
    .ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08)}
    .danger{background:linear-gradient(135deg, #ff6a86, #d83b5f)}
    .success-btn{background:linear-gradient(135deg, #52d5a8, #2fad7f)}
    .inline-actions{display:flex;flex-wrap:wrap;gap:10px}
    .muted{color:var(--muted)}
    .screen{display:none}
    .screen.active{display:block}
    .backline{
      display:flex;align-items:center;gap:10px;margin-bottom:14px
    }
    .backline button{padding:10px 14px;border-radius:14px}
    .training-layout{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:16px;
    }
    .media-box{
      padding:16px;
    }
    .media{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      background:#150d22;
      border:1px solid rgba(255,255,255,.08);
      min-height: 420px;
      display:grid;
      place-items:center;
    }
    .media img, .media svg{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      cursor:pointer;
      user-select:none;
    }
    .media-note{
      position:absolute;
      left:12px;top:12px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(13,7,22,.66);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
    }
    .qa{
      padding:18px;
      display:grid;
      gap:14px;
    }
    .prompt{
      padding:16px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .prompt h3{margin:0 0 8px;font-size:20px}
    .prompt p{margin:0;color:var(--muted);line-height:1.5}
    .feedback{
      padding:14px 16px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      display:none;
    }
    .feedback.show{display:block}
    .feedback.ok{border-color:rgba(78,214,168,.25);background:rgba(78,214,168,.08)}
    .feedback.bad{border-color:rgba(239,91,125,.25);background:rgba(239,91,125,.08)}
    .feedback .title{font-weight:800;margin-bottom:8px}
    .feedback .small{font-size:13px;color:var(--soft);line-height:1.45}
    .prep-description{
      display:none;
      padding:16px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(177,124,255,.12), rgba(255,255,255,.04));
      border:1px solid rgba(177,124,255,.20);
      box-shadow:0 12px 26px rgba(0,0,0,.18);
    }
    .prep-description.show{display:block}
    .prep-description h4{
      margin:0 0 10px;
      font-size:16px;
      line-height:1.25;
    }
    .prep-description .desc-text{
      color:var(--soft);
      font-size:13px;
      line-height:1.55;
      white-space:normal;
    }
    .prep-html-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      line-height:1.65;
      font-size:15px;
      color:var(--soft);
    }
    .prep-html-card{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:18px;
    }
    .prep-html-card.wide{grid-column:1 / -1}
    .prep-html-card h2{margin:0 0 12px;color:var(--text);font-size:24px;line-height:1.2}
    .prep-html-card h3{margin:18px 0 10px;color:var(--text);font-size:18px;line-height:1.25}
    .prep-html-card p{margin:0 0 12px}
    .prep-html-card b{color:var(--text)}
    .scheme-grid{
      display:grid; gap:12px; grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
    }
    .scheme-grid .field input{padding:12px}

    .prep-modal-body{
      flex:1;
      overflow:auto;
      padding:16px;
      background:radial-gradient(circle at 50% 20%, rgba(177,124,255,.08), transparent 35%);
    }
    .prep-detail-layout{
      display:grid;
      gap:16px;
      align-items:start;
    }
    .prep-detail-img{
      width:100%;
      max-height:64vh;
      object-fit:contain;
      display:block;
      border-radius:24px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.08);
    }
    .prep-detail-side{
      display:grid;
      gap:12px;
    }
    .prep-description.bank-show{
      display:block;
      margin-top:0;
      width:100%;
    }
    .prep-description.training-wide{
      display:block;
      margin-top:16px;
      width:100%;
    }
    .prep-variant-full{
      width:100%;
      padding:16px;
      border-radius:26px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(177,124,255,.18);
      box-shadow:0 14px 34px rgba(0,0,0,.24);
    }
    .prep-variant-full h3{
      margin:0 0 12px;
      font-size:18px;
    }
    .prep-variant-full img{
      width:100%;
      height:min(78vh, 820px);
      object-fit:contain;
      display:block;
      border-radius:24px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.08);
    }

    .fullscreen-img-modal{
      position:fixed;
      inset:0;
      z-index:80;
      display:none;
      background:rgba(5,3,8,.92);
      backdrop-filter: blur(8px);
      padding:18px;
    }
    .fullscreen-img-modal.open{display:grid;place-items:center}
    .fullscreen-img-wrap{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      position:relative;
    }
    .fullscreen-img-wrap img{
      max-width:96vw;
      max-height:92vh;
      object-fit:contain;
      border-radius:22px;
      background:#120c1b;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 18px 55px rgba(0,0,0,.55);
    }
    .fullscreen-close{
      position:fixed;
      right:22px;
      top:18px;
      z-index:82;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.12);
      color:var(--text);
      border-radius:16px;
      padding:12px 15px;
      cursor:pointer;
      font-weight:900;
      backdrop-filter: blur(10px);
    }
    .fullscreen-caption{
      position:fixed;
      left:22px;
      bottom:18px;
      z-index:82;
      max-width:min(760px, calc(100vw - 44px));
      padding:10px 12px;
      border-radius:999px;
      background:rgba(13,7,22,.66);
      border:1px solid rgba(255,255,255,.10);
      color:var(--soft);
      font-size:13px;
    }
    .fullscreen-trigger{cursor:zoom-in}

    .variant-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:10px;
    }
    .variant-card{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      transition:.18s ease;
    }
    .variant-card:hover{border-color:rgba(177,124,255,.35);transform:translateY(-1px)}
    .variant-card.active{border-color:rgba(177,124,255,.55);background:rgba(177,124,255,.12)}
    .variant-card img{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:#120c1b;
    }
    .variant-card .v-title{margin-top:8px;font-size:12px;color:var(--soft);font-weight:800}
    .all-preps-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap:10px;
      margin-top:12px;
      max-height:420px;
      overflow:auto;
      padding-right:4px;
    }
    .all-prep-card{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      padding:10px;
      cursor:pointer;
      transition:.18s ease;
    }
    .all-prep-card:hover{border-color:rgba(177,124,255,.35);transform:translateY(-1px)}
    .all-prep-card.active{border-color:rgba(78,214,168,.40);background:rgba(78,214,168,.08)}
    .all-prep-card img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      border-radius:14px;
      display:block;
      background:#120c1b;
    }
    .all-prep-card .prep-name{margin-top:8px;font-size:13px;font-weight:900;color:var(--text);line-height:1.25}
    .all-prep-card .prep-meta{margin-top:4px;font-size:11px;color:var(--muted);line-height:1.25}
    @media (max-width: 820px){
      .prep-detail-img{max-height:52vh}
      .all-preps-grid{max-height:360px}
    }

    .bank-toolbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      margin-bottom:14px;
    }
    .bank-toolbar .tab{padding:10px 14px}
    .bank-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .bank-card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
    }
    .bank-card .thumb{
      width:100%;
      aspect-ratio: 16/10;
      background:#120c1b;
      display:block;
      object-fit:cover;
      cursor:pointer;
    }
    .bank-card .content{padding:14px}
    .bank-card .content h4{margin:0 0 6px;font-size:16px}
    .bank-card .content p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .bank-card .content .row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
    .list{
      display:grid;gap:12px
    }
    .info-grid{display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr))}
    .mini{
      padding:16px;border-radius:22px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .mini h4{margin:0 0 8px}
    .mini p,.mini li{color:var(--muted);line-height:1.55}
    .mini ul{margin:0;padding-left:20px}
    .modal{
      position:fixed;inset:0;z-index:50;
      display:none;
      background:rgba(5,3,8,.76);
      backdrop-filter: blur(10px);
    }
    .modal.open{display:grid;place-items:center}
    .modal-panel{
      width:min(1200px, calc(100% - 18px));
      height:min(92vh, 940px);
      background:linear-gradient(180deg, rgba(32,18,50,.95), rgba(11,7,16,.97));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .modal-head{
      display:flex;justify-content:space-between;align-items:center;
      gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08)
    }
    .modal-head h3{margin:0;font-size:16px}
    .modal-body{
      flex:1;
      position:relative;
      overflow:hidden;

<div class="prep-html-grid">
  <div class="prep-html-card">
    <h2>Семенник</h2>
    <p><b>Окраска препарата:</b> гематоксилин-эозин.</p>

    <h3>Отличительные особенности</h3>
    <p>Препарат семенника отличается множественными округлыми и овальными срезами <b>извитых семенных канальцев</b>. Канальцы располагаются плотно, занимают большую часть паренхимы органа и имеют выраженную многослойную клеточную стенку. Между канальцами находятся тонкие прослойки рыхлой соединительной ткани — <b>интерстиций</b>, в котором проходят кровеносные и лимфатические сосуды, а также располагаются интерстициальные эндокринные клетки — <b>клетки Лейдига</b>.</p>
    <p>Главный диагностический признак препарата — наличие извитых семенных канальцев со <b>сперматогенным эпителием</b>. В стенке канальца клетки располагаются по степени зрелости: менее зрелые формы лежат ближе к базальной мембране, более зрелые — ближе к просвету. В просвете канальцев могут определяться поздние сперматиды и сперматозоиды.</p>
    <p>Семенник отличается от простаты отсутствием железистых ацинусов, фиброзно-мышечной стромы и простатических конкреций. От придатка яичка он отличается наличием полноценного сперматогенного эпителия: в придатке видны протоки со сперматозоидами в просвете, но нет многослойной стенки канальцев с последовательными стадиями сперматогенеза.</p>

    <h3>Общее строение органа</h3>
    <p>Семенник, или яичко, является мужской половой железой. Он выполняет две основные функции: <b>генеративную</b> и <b>эндокринную</b>. Генеративная функция связана с образованием мужских половых клеток — сперматозоидов. Эндокринная функция связана с синтезом мужских половых гормонов, главным образом тестостерона.</p>
    <p>Снаружи семенник покрыт <b>белочной оболочкой</b>, образованной плотной волокнистой соединительной тканью. От белочной оболочки внутрь органа отходят соединительнотканные перегородки, которые делят паренхиму на дольки. В области средостения яичка извитые семенные канальцы переходят в прямые канальцы, а затем — в канальцы сети яичка.</p>
    <p>Основу паренхимы составляют <b>извитые семенные канальцы</b>. Каждый каналец представляет собой длинную многократно сложенную петлю. Поэтому на одном гистологическом срезе один и тот же каналец может несколько раз попадать в плоскость среза и выглядеть как несколько отдельных округлых структур.</p>

    <h3>Стенка извитого семенного канальца</h3>
    <p>Стенка извитого семенного канальца состоит из двух основных компонентов: <b>собственной оболочки</b> и <b>эпителио-сперматогенного слоя</b>. Собственная оболочка находится снаружи, а эпителио-сперматогенный слой обращён к просвету канальца и составляет основную толщину его стенки.</p>
    <p>Собственная оболочка канальца включает фиброцитоподобные клетки, неклеточные слои с коллагеновыми волокнами и аморфным матриксом, а также <b>миоидные клетки</b>. Миоидные клетки способны сокращаться и способствуют медленному продвижению жидкости и сперматозоидов по канальцу в сторону сети яичка. Кроме того, собственная оболочка участвует в формировании гематотестикулярного барьера.</p>
    <p>Эпителио-сперматогенный слой образован двумя основными группами клеток: <b>клетками Сертоли</b> и <b>сперматогенными клетками</b>. Клетки Сертоли являются поддерживающими эпителиоцитами. Они простираются от базальной мембраны до просвета канальца, создают опору для развивающихся половых клеток, обеспечивают их питание, участвуют в образовании гематотестикулярного барьера и регулируют сперматогенез.</p>
  </div>

  <div class="prep-html-card">
    <h3>Клетки сперматогенного ряда</h3>
    <p>Сперматогенные клетки располагаются в стенке канальца закономерно. Их положение отражает направление созревания: от базальной мембраны к просвету. У базальной мембраны находятся наиболее молодые клетки, ближе к просвету — более зрелые формы.</p>
    <p><b>Сперматогонии</b> — наименее зрелые клетки сперматогенного ряда. Они лежат у базальной мембраны. Часть сперматогоний выполняет роль стволовых клеток, другая часть вступает в сперматогенез и активно делится митозом. Сперматогонии имеют округлую форму и относительно небольшие размеры.</p>
    <p><b>Сперматоциты</b> — более крупные клетки, находящиеся в состоянии мейоза. Они располагаются выше сперматогоний, несколько дальше от базальной мембраны. В их ядрах хорошо выражен рисунок хроматина. На препарате они обычно заметнее за счёт большего размера.</p>
    <p><b>Сперматиды</b> — гаплоидные клетки, образующиеся после мейотического деления. Они уже не делятся, а проходят морфологическую перестройку в сперматозоиды. Ранние сперматиды имеют округлую форму и светлое ядро. Средние сперматиды становятся более овальными. Поздние сперматиды меньше по размеру, имеют плотное ядро и формирующийся жгутик.</p>
    <p><b>Сперматозоиды</b> располагаются у просвета или в просвете извитого семенного канальца. Они являются наиболее зрелыми клетками сперматогенного ряда, но после выхода из эпителио-сперматогенного слоя ещё проходят функциональное дозревание в придатке яичка.</p>

    <h3>Клетки Сертоли</h3>
    <p>Клетки Сертоли — крупные поддерживающие клетки извитого семенного канальца. Их базальная часть лежит на базальной мембране, а апикальная часть достигает просвета канальца. На боковых поверхностях клеток Сертоли находятся углубления, в которых располагаются созревающие сперматогенные клетки.</p>
    <p>Клетки Сертоли создают опорный каркас для сперматогенных клеток, обеспечивают питание клеток, расположенных за гематотестикулярным барьером, фагоцитируют погибающие половые клетки и остаточные цитоплазматические тельца, секретируют жидкость в просвет канальца, участвуют в регуляции сперматогенеза и образуют андрогенсвязывающий белок.</p>
    <p>Между соседними клетками Сертоли формируются плотные контакты. Они делят эпителио-сперматогенный слой на базальный и адлюминальный отделы. В базальном отделе находятся сперматогонии и ранние сперматоциты, в адлюминальном — более зрелые клетки сперматогенного ряда. Такая организация необходима для изоляции развивающихся половых клеток от иммунной системы.</p>

    <h3>Интерстиций и клетки Лейдига</h3>
    <p>Между извитыми семенными канальцами располагается интерстиций. Он представлен рыхлой соединительной тканью, сосудами, нервными элементами и клетками Лейдига. Клетки Лейдига являются интерстициальными эндокринными клетками семенника и синтезируют тестостерон и его производные.</p>
    <p>Тестостерон необходим для поддержания сперматогенеза, развития и функционирования мужской половой системы, а также для формирования вторичных половых признаков. Сперматогенез происходит в стенке извитых семенных канальцев, а эндокринная функция связана преимущественно с интерстициальными клетками Лейдига.</p>
  </div>

  <div class="prep-html-card">
    <h3>Сперматогенез</h3>
    <p>Сперматогенез — это процесс образования мужских половых клеток. Он происходит в эпителио-сперматогенном слое извитых семенных канальцев. Созревание клеток идёт от базальной мембраны к просвету: сперматогонии → сперматоциты → сперматиды → сперматозоиды.</p>
    <p>В сперматогенезе выделяют несколько последовательных этапов. Первый этап — митотическое размножение сперматогоний. Второй этап — мейотическое деление сперматоцитов. Третий этап — спермиогенез, то есть морфологическое превращение сперматид в сперматозоиды. Четвёртый этап — внеэпителиальное дозревание сперматозоидов в придатке яичка.</p>
    <p>Мейоз имеет особое значение, потому что в результате него из диплоидных клеток образуются гаплоидные клетки. После мейоза возникают сперматиды, содержащие одинарный набор хромосом. Далее они уже не делятся, а перестраиваются в высокоспециализированные клетки — сперматозоиды.</p>

    <h3>Спермиогенез</h3>
    <p>Спермиогенез — это превращение округлой сперматиды в сперматозоид. В ходе этого процесса происходит резкое изменение формы клетки: уплотняется ядро, формируется акросома, образуется жгутик, перестраиваются митохондрии, уменьшается объём цитоплазмы и формируется окончательная структура будущего сперматозоида.</p>
    <p>Ядро сперматиды резко конденсируется. Объём ядра уменьшается, хроматин становится плотным. Это необходимо для компактной упаковки генетического материала в головке сперматозоида.</p>
    <p>Акросома формируется из аппарата Гольджи. Сначала она имеет вид мембранной гранулы, затем прилежит к ядру и постепенно покрывает его передний полюс в виде шапочки. Акросома содержит ферменты, необходимые для прохождения сперматозоида через оболочки яйцеклетки.</p>
    <p>Жгутик образуется при участии центриоли. От базального тельца начинается формирование аксонемы — осевой структуры хвоста. Аксонема построена по типичной схеме: девять пар периферических микротрубочек и одна пара центральных микротрубочек. Такая организация обеспечивает подвижность сперматозоида.</p>
    <p>Митохондрии располагаются спирально вокруг начального отдела жгутика и образуют митохондриальную оболочку промежуточной части хвоста. Это связано с высокой потребностью сперматозоида в энергии для движения.</p>
    <p>Большая часть цитоплазмы удаляется. Её остатки формируют резидуальные тельца, которые фагоцитируются клетками Сертоли. В зрелом сперматозоиде остаётся только минимальное количество цитоплазмы.</p>
  </div>

  <div class="prep-html-card">
    <h3>Строение сперматозоида</h3>
    <p>Сперматозоид — высокоспециализированная мужская половая клетка, приспособленная к движению, доставке генетического материала к яйцеклетке и участию в оплодотворении. В его строении выделяют <b>головку</b>, <b>шейку</b>, <b>промежуточную часть</b>, <b>главную часть хвоста</b> и <b>конечную часть хвоста</b>.</p>
    <p><b>Головка сперматозоида</b> содержит резко уплотнённое гаплоидное ядро. В ядре находится наследственный материал. Хроматин максимально конденсирован, поэтому ядро занимает небольшой объём и имеет плотную структуру. Такая упаковка защищает генетический материал и делает клетку более обтекаемой.</p>
    <p>Переднюю часть головки покрывает <b>акросома</b>. Она является производным аппарата Гольджи и располагается в виде шапочки над передним полюсом ядра. Акросома содержит ферменты, участвующие в прохождении через оболочки яйцеклетки: акрозин, гиалуронидазу, коллагеназу и другие ферментные компоненты.</p>
    <p>Плазматическая мембрана головки имеет специализированный состав. Она участвует в распознавании яйцеклетки, связывании с её оболочками и последующем развитии акросомальной реакции. Акросомальная реакция необходима для проникновения сперматозоида через оболочки яйцеклетки.</p>
    <p><b>Шейка сперматозоида</b> соединяет головку с хвостом. В этой области находятся центриолярные структуры, связанные с формированием жгутика. Шейка является переходной зоной между головкой, содержащей генетический материал, и хвостом, обеспечивающим движение.</p>
    <p><b>Промежуточная часть хвоста</b> содержит начальный отдел аксонемы и митохондриальную оболочку. Митохондрии располагаются спирально вокруг осевой нити жгутика. Они обеспечивают образование энергии, необходимой для движения сперматозоида.</p>
    <p><b>Главная часть хвоста</b> является самой длинной частью сперматозоида. Её основу составляет аксонема. Благодаря движению микротрубочек аксонемы хвост совершает волнообразные движения, обеспечивающие продвижение сперматозоида.</p>
    <p><b>Конечная часть хвоста</b> — наиболее тонкий терминальный участок жгутика. В ней сохраняются элементы аксонемы, но оболочки и дополнительные структуры выражены слабее. Этот участок завершает хвост сперматозоида.</p>
    <p>Функционально головка обеспечивает хранение и доставку генетического материала, акросома участвует в проникновении через оболочки яйцеклетки, промежуточная часть обеспечивает энергетическую поддержку, а хвост обеспечивает движение.</p>

    <h3>Дозревание сперматозоидов</h3>
    <p>После выхода в просвет семенного канальца сперматозоиды ещё не являются полностью функционально зрелыми. Их дальнейшее дозревание происходит в придатке яичка. В головке придатка завершается формирование отдельных структур, а в хвосте придатка сперматозоиды приобретают способность к активному движению.</p>
    <p>В процессе дозревания на поверхности сперматозоидов появляются вещества, необходимые для взаимодействия с яйцеклеткой. Окончательная функциональная активация сперматозоидов происходит уже после попадания в женские половые пути.</p>

    <p>Гематотестикулярный барьер обеспечивает изоляцию развивающихся половых клеток от иммунной системы. Его формируют эндотелий сосудов, элементы интерстициальной ткани, лимфатические структуры, собственная оболочка канальца, базальная мембрана эпителио-сперматогенного слоя и плотные контакты между клетками Сертоли.</p>
    <p>Барьер разделяет сперматогенный эпителий на базальный и адлюминальный отделы. В базальном отделе находятся сперматогонии и ранние сперматоциты. В адлюминальном отделе располагаются более зрелые клетки: сперматоциты, сперматиды и поздние стадии сперматогенного ряда.</p>
    <p>Значение барьера связано с тем, что сперматоциты и сперматиды появляются после формирования иммунной системы. Без изоляции они могли бы восприниматься как чужеродные клетки. Поэтому повреждение гематотестикулярного барьера может приводить к иммунному поражению сперматогенного эпителия и нарушению сперматогенеза.</p>

    <h3>Клинические и патогистологические связи</h3>
    <p>Нарушение нормального строения семенника может сопровождаться угнетением сперматогенеза. При этом уменьшается количество клеток сперматогенного ряда, истончается эпителио-сперматогенный слой, снижается число поздних сперматид и сперматозоидов. В тяжёлых случаях в канальцах могут сохраняться преимущественно клетки Сертоли, а зрелые половые клетки отсутствуют.</p>
    <p>При атрофии извитых семенных канальцев канальцы уменьшаются в диаметре, их стенка становится бедной клетками, просветы могут расширяться, а интерстиций выглядит относительно более выраженным. На фоне редукции сперматогенного эпителия клетки Лейдига могут казаться более заметными.</p>
    <p>При воспалительном поражении яичка возможны отёк интерстиция, сосудистая реакция, клеточная инфильтрация и повреждение сперматогенного эпителия. Длительное воспаление может приводить к фиброзу, атрофии канальцев и снижению генеративной функции.</p>
    <p>Повреждение гематотестикулярного барьера имеет особое значение. При его нарушении возможно развитие аутоиммунных реакций против клеток сперматогенного ряда. Это может усиливать повреждение канальцев и приводить к стойкому нарушению образования сперматозоидов.</p>
    <p>Опухолевые процессы семенника могут быть связаны с герминогенными клетками, клетками Сертоли, клетками Лейдига или элементами стромы. В нормальной гистологии важно понимать клеточную основу этих процессов: семенник содержит сперматогенный эпителий, поддерживающие клетки Сертоли, интерстициальные клетки Лейдига и соединительнотканную строму.</p>

    <h3>Краткая выжимка</h3>

      широким и относительно ровным просветом. Их эпителий обычно выглядит более
      организованным и менее секреторно активным, чем эпителий концевых железистых
      отделов.
    </p>

    <h3>Группы желёз простаты</h3>

    <p>
      Железы простаты располагаются не одинаково. По положению их делят на несколько
      групп: железы слизистой оболочки мочеиспускательного канала, подслизистые
      железы и главные железы простаты. Такое деление важно для понимания как
      нормального строения, так и некоторых патологических процессов.
    </p>

    <p>
      Железы, расположенные ближе к уретре, имеют особое клиническое значение,
      потому что при их разрастании может сдавливаться мочеиспускательный канал.
      Главные железы занимают большую часть железистой ткани простаты и формируют
      основную массу секреторного аппарата органа.
    </p>


    <h3>Зоны простаты</h3>

    <p>
      В современной гистологической и клинической анатомии простату удобно рассматривать
      не только как совокупность желёз, но и как орган с выраженной <b>зональной
      организацией</b>. Зоны отличаются положением относительно уретры, количеством
      железистых элементов, выраженностью стромы и клиническим значением.
    </p>

    <p>
      <b>Периферическая зона</b> занимает значительную часть железистой ткани простаты
      и располагается преимущественно в задне-наружных отделах органа. В ней много
      крупных разветвлённых железистых отделов. Эта зона важна клинически, потому что
      значительная часть злокачественных опухолей простаты возникает именно в
      периферической зоне. На обычном учебном гистологическом препарате отдельные зоны
      обычно не подписаны, но понимание их расположения помогает связывать микростроение
      с клиникой.
    </p>

    <p>
      <b>Центральная зона</b> располагается ближе к семявыбрасывающим протокам и
      окружает их. Её железы и строма имеют несколько иное строение по сравнению с
      периферической зоной. Эта область меньше по объёму, но важна как часть
      внутренней архитектоники органа.
    </p>

    <p>
      <b>Переходная зона</b> находится вокруг проксимальной части мочеиспускательного
      канала. Она имеет особенно большое клиническое значение, потому что именно с этой
      зоной часто связана <b>доброкачественная гиперплазия простаты</b>. При разрастании
      железистых и стромальных элементов переходной зоны может сдавливаться уретра,
      что приводит к нарушению мочеиспускания.
    </p>

    <p>
      <b>Периуретральные железы</b> располагаются непосредственно около уретры. Несмотря
      на небольшие размеры, они важны для понимания того, почему патологическое
      разрастание ткани около мочеиспускательного канала быстро отражается на оттоке
      мочи.
    </p>

    <p>
      <b>Передняя фиброзно-мышечная строма</b> содержит мало железистых элементов и
      представлена преимущественно соединительной тканью и гладкими миоцитами. Поэтому
      она подчёркивает, что простата является не только железистым, но и
      железисто-мышечным органом.
    </p>

    <p>
      Для распознавания учебного препарата обычно достаточно увидеть железистые отделы,
      фиброзно-мышечную строму и возможные простатические конкреции. Но для более
      глубокого ответа важно помнить зональное строение: <b>периферическая зона</b>
      связана прежде всего с риском карциномы, <b>переходная зона</b> — с доброкачественной
      гиперплазией, а <b>передняя фиброзно-мышечная строма</b> почти не содержит желёз.
    </p>

    <h3>Простатические конкреции</h3>

    <p>
      В просветах желез простаты могут находиться простатические конкреции,
      или амилоидные тельца. Они выглядят как округлые, плотные, часто слоистые
      образования. Эти структуры образуются из сгущённого секрета и клеточного
      детрита, постепенно уплотняются и могут подвергаться кальцификации.
    </p>

    <p>
      Наличие простатических конкреций помогает отличить простату от других
      железистых органов. Однако их отсутствие не исключает препарат простаты,
      потому что выраженность этих образований зависит от возраста и функционального
      состояния органа.
    </p>
  </div>

  <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
    <h3>Секрет простаты</h3>

    <p>
      Простата выполняет выраженную экзокринную функцию. Её секрет входит в состав
      жидкой части спермы и влияет на свойства семенной жидкости, подвижность
      сперматозоидов, состояние их мембран и взаимодействие со средой женских
      половых путей.
    </p>

    <p>
      Одним из важных компонентов секрета являются <b>протеолитические ферменты</b>,
      в том числе фибринолизин и близкие по действию вещества. Они участвуют
      в разжижении спермы. Это важно, потому что после эякуляции семенная жидкость
      не должна сохранять чрезмерную вязкость: её разжижение облегчает движение
      сперматозоидов.
    </p>

    <p>
      Секрет простаты содержит <b>фосфолипиды</b> и белки-носители, включая аннексины.
      Эти компоненты связаны с изменением состава мембран сперматозоидов. Замещение
      части холестерина фосфолипидами повышает лабильность мембран, что важно для
      последующих процессов, связанных с оплодотворением.
    </p>

    <p>
      В секрете имеются <b>простасомы</b> — мелкие мембранные пузырьки. Они связываются
      со сперматозоидами и помогают защищать их от неблагоприятного воздействия
      факторов иммунной защиты в женских половых путях. Таким образом, секрет
      простаты не только разбавляет сперму, но и функционально подготавливает
      сперматозоиды к дальнейшему продвижению.
    </p>

    <p>
      Простата также выделяет <b>простагландины</b>. Эти вещества способны стимулировать
      сократительную активность женских половых путей, что способствует продвижению
      сперматозоидов после попадания спермы в женский организм.
    </p>

    <h3>Эндокринные и паракринные функции</h3>

    <p>
      Помимо экзокринной функции, простата обладает эндокринной и паракринной
      активностью. В её ткани имеются эндокринные клетки, которые синтезируют ряд
      биологически активных веществ. Эти вещества могут действовать локально,
      влияя на клетки самой простаты и окружающую ткань.
    </p>

    <p>
      Среди веществ, связанных с эндокринной активностью простаты, описываются
      соединения, сходные по действию с некоторыми гормонами. Часть таких веществ
      не поступает непосредственно в кровь, а действует паракринно — через
      межклеточное пространство.
    </p>

    <p>
      Эта особенность подчёркивает, что простата является не только добавочной
      железой мужской половой системы, но и органом с локальной регуляторной
      активностью. Её эпителий, строма, гладкомышечные клетки и эндокринные клетки
      образуют единую функциональную систему.
    </p>
  </div>

  <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
    <h3>Связь строения и функции</h3>

    <p>
      Строение простаты напрямую связано с её функцией. Железистые отделы образуют
      секрет, который входит в состав спермы. Выводные протоки доставляют этот
      секрет в предстательную часть уретры. Гладкие миоциты стромы обеспечивают
      активное выведение секрета во время эякуляции.
    </p>

    <p>
      Фиброзно-мышечная строма не только поддерживает железистые элементы, но и
      формирует сократительный аппарат органа. Поэтому на препарате важно
      обращать внимание не только на сами железы, но и на плотные прослойки между
      ними. Именно строма создаёт характерный вид простаты.
    </p>

    <p>
      Секреторный эпителий простаты функционально связан со сперматозоидами,
      хотя сами сперматозоиды в простате не образуются. Образование сперматозоидов
      происходит в семеннике, их дозревание — в придатке яичка, а простата добавляет
      к сперме секрет, который изменяет её физико-химические свойства и помогает
      сперматозоидам сохранять активность.
    </p>

    <h3>Гормональная зависимость</h3>

    <p>
      Простата является гормонально зависимым органом. Её развитие, структура
      и функциональная активность связаны с андрогенами, прежде всего с тестостероном
      и его активными производными. Под действием андрогенов поддерживается
      секреторная активность эпителия и нормальное состояние стромы.
    </p>

    <p>
      При нарушении гормональной регуляции могут изменяться как железистые элементы,
      так и строма. Это имеет значение для понимания возрастных изменений простаты,
      доброкачественных гиперпластических процессов и некоторых опухолевых
      заболеваний.
    </p>

    <h3>Сравнение с другими препаратами</h3>

    <p>
      От семенника простата отличается отсутствием сперматогенного эпителия,
      сперматогоний, сперматоцитов, сперматид и извитых семенных канальцев. В простате
      нет последовательного созревания половых клеток от базальной мембраны к просвету.
    </p>

    <p>
      От яичника простата отличается отсутствием фолликулов, ооцитов, жёлтого тела
      и коркового вещества с фолликулярным аппаратом. Простата имеет не фолликулярное,
      а железисто-протоковое строение.
    </p>

    <p>
      От матки простата отличается отсутствием эндометрия, миометрия, маточных желёз
      и циклических изменений слизистой оболочки. В простате главными элементами
      являются железы и фиброзно-мышечная строма.
    </p>

    <p>
      От молочной железы простата отличается отсутствием долек с альвеолами,
      млечных протоков и жировой ткани в таком выраженном виде. В молочной железе
      строма часто содержит значительное количество жировой ткани, а в простате
      особенно характерна фиброзно-мышечная строма.
    </p>
  </div>

  <div style="grid-column:1 / -1; background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
    <h3>Клинические и патогистологические связи</h3>

    <p>
      Нормальная гистологическая картина простаты зависит от сохранности железистого
      эпителия, выводных протоков, фиброзно-мышечной стромы и гормональной регуляции.
      Нарушения могут затрагивать как эпителиальный компонент, так и стромальный
      компонент органа.
    </p>

    <p>
      При <b>доброкачественной гиперплазии простаты</b> увеличивается количество
      железистых и стромальных элементов, особенно в области, расположенной ближе
      к мочеиспускательному каналу. Разрастание ткани может приводить к сдавлению
      уретры и нарушению оттока мочи. Гистологически могут наблюдаться увеличенные
      железы разной формы, складчатость эпителия, расширенные просветы, усиление
      стромального компонента и сохранение доброкачественного характера роста.
    </p>

    <p>
      При <b>простатите</b> в ткани простаты развивается воспалительная реакция.
      В зависимости от характера воспаления могут появляться отёк стромы, сосудистая
      реакция, клеточная инфильтрация, повреждение эпителия железистых отделов,
      скопление секрета в просветах и нарушение нормального оттока секрета.
      Хроническое воспаление может сопровождаться фиброзом и перестройкой стромы.
    </p>

    <p>
      <b>Простатические конкреции</b> могут становиться более выраженными с возрастом.
      Они формируются в просветах желез из сгущённого секрета и клеточного материала.
      При длительном существовании такие образования могут уплотняться и
      кальцифицироваться. На препарате они выглядят как плотные округлые или
      слоистые структуры внутри железистых просветов.
    </p>

    <p>
      При <b>атрофических изменениях</b> железистый эпителий становится ниже,
      секреторная активность уменьшается, просветы желез могут выглядеть расширенными
      или, наоборот, спадаться. Строма при этом может казаться относительно более
      выраженной. Такие изменения могут быть связаны с возрастом, гормональными
      влияниями, хроническим воспалением или нарушением трофики ткани.
    </p>

    <p>
      При <b>аденокарциноме простаты</b> опухолевый рост связан с железистым эпителием.
      Для злокачественного процесса характерны нарушение нормальной железистой
      архитектуры, появление мелких атипичных желез, клеточная атипия, инвазивный
      рост и потеря нормальных взаимоотношений между эпителием и стромой. Для точной
      диагностики опухолей простаты требуется материал по патологической анатомии
      и специальные диагностические критерии.
    </p>

    <p>
      В клинической практике простата имеет большое значение из-за своего положения
      вокруг начальной части уретры. Поэтому даже доброкачественное увеличение
      ткани органа может вызывать выраженные симптомы за счёт механического сдавления
      мочеиспускательного канала.
    </p>

    <h3>Краткая выжимка</h3>

    <p>
      Простата — непарный железисто-мышечный орган мужской половой системы,
      окружающий начальную часть мочеиспускательного канала. Препарат узнаётся
      по многочисленным железистым отделам разной формы, широким выводным протокам,
      фиброзно-мышечной строме и возможным простатическим конкрециям в просветах.
      Железистый эпителий содержит главные секреторные клетки, базальные клетки
      и редкие эндокринные клетки. Секрет простаты входит в состав спермы, разжижает
      её, влияет на мембраны сперматозоидов, защищает их и способствует их продвижению
      в женских половых путях. Главные ориентиры препарата: <b>железы, протоки,
      фиброзно-мышечная строма, гладкие миоциты, секреторный эпителий,
      простатические конкреции</b>.
    </p>

    </p>
    <p>
      В эмбриональном периоде первичные половые клетки дают начало оогониям.
      Оогонии размножаются митозом, затем часть из них вступает в мейоз и становится
      <b>ооцитами первого порядка</b>. Ооциты первого порядка останавливаются в
      профазе первого деления мейоза. Эта длительная остановка может сохраняться
      до полового созревания и далее — до вступления конкретного фолликула в рост.
    </p>
    <p>
      После полового созревания часть фолликулов циклически вступает в развитие.
      Перед овуляцией ооцит первого порядка завершает первое деление мейоза.
      В результате образуются <b>вторичный ооцит</b> и <b>первое полярное тельце</b>.
      Деление неравномерное: почти вся цитоплазма сохраняется во вторичном ооците,
      а полярное тельце получает минимальный объём цитоплазмы.
    </p>
    <p>
      Вторичный ооцит вступает во второе деление мейоза, но снова останавливается.
      У человека овулирует именно вторичный ооцит, а не окончательно зрелая
      яйцеклетка. Второе деление мейоза завершается только после проникновения
      сперматозоида. Тогда образуются зрелая женская гамета и второе полярное
      тельце.
    </p>
  </div>

  <div class="prep-html-card wide">
    <h3>Строение яйцеклетки и её оболочек</h3>
    <p>
      Яйцеклетка человека относится к <b>вторично олиголецитальному</b> и
      <b>изолецитальному</b> типу: желтка мало, и он распределён относительно
      равномерно. Несмотря на небольшое количество желтка, объём яйцеклетки
      значительно больше объёма сперматозоида, потому что она содержит запас
      цитоплазматических факторов, РНК, белков и органелл для раннего развития.
    </p>
    <p>
      Основная масса клетки — <b>ооплазма</b>. В ней содержатся митохондрии,
      элементы белоксинтезирующей системы, материнские мРНК, рибосомы, тРНК,
      ферменты, регуляторные белки и небольшое количество желточных гранул.
      Эти структуры обеспечивают первые этапы развития зародыша до включения
      собственного генома эмбриона.
    </p>
    <p>
      Под плазмолеммой располагаются <b>кортикальные гранулы</b>. Они окружены
      мембраной и содержат вещества, участвующие в кортикальной реакции. После
      проникновения сперматозоида содержимое кортикальных гранул выделяется наружу
      и изменяет оболочки ооцита так, чтобы предотвратить полиспермию.
    </p>
    <p>
      Плазматическая мембрана яйцеклетки называется <b>оолеммой</b>. На её поверхности
      имеются микроворсинки. Они увеличивают площадь контакта и участвуют во
      взаимодействии с клетками лучистого венца, прозрачной зоной и сперматозоидом
      в момент оплодотворения.
    </p>
    <p>
      Снаружи от оолеммы находится <b>перивителлиновое пространство</b>. В нём
      после завершения первого мейотического деления располагается полярное тельце.
      После оплодотворения это пространство увеличивается в результате кортикальной
      реакции.
    </p>
    <p>
      Следующая оболочка — <b>прозрачная зона</b>, или <b>zona pellucida</b>. Она
      состоит из гликопротеинов ZP1, ZP2, ZP3 и гликозаминогликанов. Прозрачная
      зона участвует в распознавании сперматозоида, связывании с ним, запуске
      акросомальной реакции, защите ооцита и блоке полиспермии.
    </p>
    <p>
      Снаружи от прозрачной зоны располагается <b>лучистый венец</b>, или
      <b>corona radiata</b>. Это слой фолликулярных клеток, сохраняющийся вокруг
      ооцита после овуляции. Лучистый венец является первым клеточным барьером
      на пути сперматозоида.
    </p>
  </div>

  <div class="prep-html-card wide">
    <h3>Строение сперматозоида в связи с оплодотворением</h3>
    <p>
      Сперматозоид состоит из головки, шейки, промежуточной части, главной части
      хвоста и конечной части хвоста. Головка содержит сильно уплотнённое гаплоидное
      ядро. Передняя часть головки покрыта <b>акросомой</b>, которая является
      производным аппарата Гольджи.
    </p>
    <p>
      Акросома содержит ферменты, необходимые для прохождения сперматозоида через
      оболочки яйцеклетки. К главным ферментам относятся <b>акрозин</b>,
      <b>гиалуронидаза</b>, <b>коллагеназа-подобные протеазы</b>, <b>пенетраза</b>,
      <b>кислая фосфатаза</b>, а также другие гидролазы и протеолитические ферменты.
      Гиалуронидаза облегчает прохождение через клетки лучистого венца, акрозин
      и протеазы участвуют в прохождении через прозрачную зону, пенетраза способствует
      отделению фолликулярных клеток, а кислая фосфатаза участвует в последующих
      мембранных взаимодействиях.
    </p>
    <p>
      Хвост сперматозоида обеспечивает движение. Его основа — аксонема с типичной
      организацией микротрубочек 9+2. В промежуточной части вокруг аксонемы
      располагаются митохондрии, обеспечивающие энергией движение сперматозоида.
    </p>
  </div>

  <div class="prep-html-card wide">
    <h3>Капацитация сперматозоидов</h3>
    <p>
      После эякуляции сперматозоид ещё не обладает максимальной оплодотворяющей
      способностью. В женских половых путях он проходит <b>капацитацию</b> —
      функциональную перестройку плазматической мембраны.
    </p>
    <p>
      Во время капацитации удаляются стабилизирующие компоненты семенной плазмы,
      изменяется липидно-белковый состав мембраны головки, повышается лабильность
      мембран, усиливаются подвижность и метаболизм сперматозоида. После этого
      сперматозоид становится способен к полноценному взаимодействию с прозрачной
      зоной и к акросомальной реакции.
    </p>
  </div>

  <div class="prep-html-card wide">
    <h3>Оплодотворение: общая характеристика</h3>
    <p>
      У человека оплодотворение имеет <b>моноспермальный</b> тип: в ооцит должен
      проникнуть только один сперматозоид. Сперматозоиды сохраняют оплодотворяющую
      способность в женских половых путях ограниченное время, а ооцит II наиболее
      пригоден к оплодотворению в первые сутки после овуляции.
    </p>
    <p>
      Оплодотворение обычно происходит в ампулярной части маточной трубы. Его
      результат — образование зиготы, восстановление диплоидного набора хромосом,
      объединение наследственного материала двух родителей, определение генетического
      пола и запуск дробления.
    </p>
  </div>

  <div class="prep-html-card wide">
    <h3>Стадии оплодотворения</h3>
    <p>
      <b>1. Сближение гамет.</b> Сперматозоиды продвигаются по женским половым путям
      за счёт собственной подвижности, сокращений матки и маточных труб, а также
      влияния среды женских половых путей. Параллельно идёт капацитация.
    </p>
    <p>
      <b>2. Дистантное взаимодействие.</b> На расстоянии происходит функциональная
      подготовка сперматозоида к контакту с комплексом ооцита. Сперматозоид
      приобретает повышенную подвижность и способность реагировать на оболочки
      яйцеклетки.
    </p>
    <p>
      <b>3. Прохождение через лучистый венец.</b> Лучистый венец состоит из
      фолликулярных клеток. Сперматозоиды проходят между ними благодаря движению
      хвоста и ферментам, разрыхляющим межклеточные связи.
    </p>
    <p>
      <b>4. Первичный контакт с прозрачной зоной.</b> Сначала взаимодействие может
      быть слабым и неспецифическим, затем становится более прочным и
      видоспецифичным.
    </p>
    <p>
      <b>5. Видоспецифическое связывание.</b> Рецепторные белки плазмолеммы головки
      сперматозоида взаимодействуют с гликопротеинами прозрачной зоны, особенно
      с ZP3. Это запускает акросомальную реакцию.
    </p>
    <p>
      <b>6. Акросомальная реакция.</b> Плазмолемма головки сперматозоида сливается
      с наружной мембраной акросомы, затем мембранный комплекс распадается на
      пузырьки, и ферменты акросомы высвобождаются наружу.
    </p>
    <p>
      <b>7. Локальное растворение прозрачной зоны.</b> Акрозин, гиалуронидаза и другие
      ферменты действуют на ограниченном участке прозрачной зоны. Сперматозоид
      как бы формирует узкий канал и проходит через него к оолемме.
    </p>
    <p>
      <b>8. Контакт и слияние мембран.</b> Сперматозоид достигает плазматической
      мембраны ооцита. Мембраны гамет сливаются, после чего в ооцит попадают ядро
      и центриолярные структуры сперматозоида.
    </p>
    <p>
      <b>9. Кортикальная реакция.</b> После слияния мембран в ооците быстро повышается
      концентрация Ca²⁺. Это вызывает экзоцитоз кортикальных гранул. Их содержимое
      изменяет прозрачную зону и плазмолемму ооцита.
    </p>
    <p>
      <b>10. Блок полиспермии.</b> Прозрачная зона теряет рецепторную способность,
      изменяются гликопротеины ZP3, перестраивается ZP2, увеличивается
      перивителлиновое пространство. Прозрачная зона превращается в оболочку
      оплодотворения, непроницаемую для других сперматозоидов.
    </p>
    <p>
      <b>11. Завершение мейоза ооцита.</b> Вторичный ооцит завершает второе деление
      мейоза. Образуются зрелая женская гамета и второе полярное тельце. Затем
      формируется женский пронуклеус.
    </p>
    <p>
      <b>12. Формирование пронуклеусов и зиготы.</b> Ядро сперматозоида деконденсируется
      и образует мужской пронуклеус. Женский и мужской пронуклеусы сближаются,
      происходит объединение наследственного материала, и формируется зигота,
      готовая к дроблению.
    </p>
  </div>

  <div class="prep-html-card wide">
    <h3>Эндокринная функция яичника</h3>
    <p>
      Яичник образует эстрогены, прогестины и некоторое количество андрогенов.
      Эстрогены преимущественно связаны с растущими фолликулами, а прогестерон —
      с жёлтым телом.
    </p>
    <p>
      Синтез эстрогенов основан на взаимодействии двух клеточных компонентов.
      Клетки внутренней теки под влиянием лютеинизирующего гормона образуют
      андрогены из холестерина. Клетки зернистого слоя под влиянием
      фолликулостимулирующего гормона превращают эти андрогены в эстрогены.
    </p>
    <p>
      После овуляции лютеиновые клетки жёлтого тела вырабатывают прогестерон.
      Прогестерон переводит эндометрий в секреторное состояние и подготавливает
      его к имплантации.
    </p>
  </div>

  <div class="prep-html-card wide">
    <h3>Сравнение с другими препаратами</h3>
    <p>
      От семенника яичник отличается отсутствием извитых семенных канальцев,
      сперматогенного эпителия и клеток сперматогенного ряда. Вместо созревания
      клеток от базальной мембраны к просвету в яичнике видны фолликулы с ооцитами.
    </p>
    <p>
      От простаты яичник отличается отсутствием железистых ацинусов с мощной
      фиброзно-мышечной стромой, выводных протоков и простатических конкреций.
      От матки — отсутствием эндометрия, миометрия и маточных желёз. От молочной
      железы — отсутствием долек с альвеолами и млечных протоков.
    </p>
  </div>

  <div class="prep-html-card wide">
    <h3>Клинические и патогистологические связи</h3>
    <p>
      Нарушение фолликулогенеза может приводить к задержке роста фолликулов,
      преждевременной атрезии, отсутствию овуляции или неполноценности жёлтого
      тела. Это может сопровождаться нарушениями цикла и бесплодием.
    </p>
    <p>
      При кистозных изменениях фолликул увеличивается за счёт накопления жидкости
      и может напоминать сильно расширенный третичный фолликул с истончённой
      стенкой. При воспалении возможны отёк, сосудистая реакция, клеточная
      инфильтрация и повреждение фолликулярного аппарата.
    </p>
    <p>
      Опухоли яичника могут развиваться из разных компонентов органа: поверхностного
      эпителия, стромы полового тяжа, герминогенных клеток или элементов,
      связанных с фолликулярным аппаратом. Для точной диагностики опухолей нужны
      специальные критерии патологической анатомии, но в нормальной гистологии
      важно понимать клеточную основу яичника.
    </p>
  </div>

      промежуточную функцию, но не является главным обменным участком плаценты.
      Основной обмен происходит в области ворсин хориона.
    </p>

    <p>
      Слизистая соединительная ткань плодной части плаценты по своему характеру
      напоминает ткань пупочного канатика, где также много гидрофильного основного
      вещества. Такое строение делает ткань устойчивой к сдавлению и механическим
      воздействиям.
    </p>

    <h3>Хориальная пластинка</h3>

    <p>
      Хориальная пластинка является частью ветвистого хориона. Она располагается
      со стороны плода и служит основанием, от которого отходят стволовые ворсины.
      Через хориальную пластинку проходят ветви пупочных сосудов.
    </p>

    <p>
      В составе хориальной пластинки имеются соединительная ткань и эпителий
      хориона. Соединительная ткань содержит фибробласты, макрофаги, редкие
      коллагеновые волокна и ветви сосудов плода. Эпителий хориона происходит
      из трофобласта.
    </p>

    <p>
      Хориальная пластинка является важным ориентиром плодной части плаценты.
      От неё начинаются крупные ворсины, которые затем ветвятся и формируют
      котиледоны — функционально-структурные участки плацентарной ткани.
    </p>
  </div>

  <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
    <h3>Ворсины хориона</h3>

    <p>
      <b>Ворсины хориона</b> — главные структуры плодной части плаценты. Они отходят
      от хориальной пластинки, многократно ветвятся и погружаются в межворсинчатое
      пространство, где омываются материнской кровью.
    </p>

    <p>
      Ворсина имеет соединительнотканную основу и наружный эпителиальный покров.
      Внутри ворсины располагается рыхлая соединительная ткань, содержащая
      фибробласты, макрофаги, коллагеновые волокна и сосуды плода. Особенно важны
      капилляры, которые могут располагаться близко к поверхности ворсины.
    </p>

    <p>
      Снаружи ворсина покрыта эпителием хориона, происходящим из трофобласта.
      Этот покров отделяет ткани плода от материнской крови и входит в состав
      гематоплацентарного барьера.
    </p>

    <p>
      Ворсины бывают стволовыми и разветвлёнными. Стволовые ворсины отходят
      непосредственно от хориальной пластинки и выполняют опорную функцию.
      Их ветви второго и третьего порядка увеличивают площадь контакта с материнской
      кровью и обеспечивают обмен.
    </p>

    <h3>Стволовые ворсины</h3>

    <p>
      Стволовые, или опорные, ворсины являются крупными ветвями хориона. Они отходят
      от хориальной пластинки и дают начало более мелким ветвям. В их соединительной
      ткани проходят более крупные сосуды плода.
    </p>

    <p>
      Основная функция стволовых ворсин — опорная и проводящая. Они удерживают
      систему разветвлений и проводят сосуды, от которых отходят более мелкие ветви
      к обменным участкам плаценты.
    </p>

    <p>
      Некоторые стволовые ворсины могут выполнять якорную функцию. Они достигают
      материнской части плаценты и фиксируют плодную часть к децидуальной оболочке.
    </p>

    <h3>Терминальные ворсины</h3>

    <p>
      Более мелкие конечные ветви ворсин являются основными обменными участками.
      В них капилляры плода располагаются особенно близко к поверхности, что
      уменьшает расстояние между кровью плода и материнской кровью.
    </p>

    <p>
      Терминальные ворсины имеют относительно тонкую стенку и хорошо васкуляризованы.
      Именно в области таких ворсин особенно активно происходит обмен газов,
      питательных веществ и продуктов обмена.
    </p>
  </div>

  <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
    <h3>Трофобластический эпителий</h3>

    <p>
      Эпителий хориона происходит из трофобласта и покрывает хориальную пластинку
      и ворсины. В его составе различают два слоя: <b>цитотрофобласт</b> и
      <b>синцитиотрофобласт</b>.
    </p>

    <p>
      <b>Цитотрофобласт</b> является внутренним клеточным слоем. Его клетки лежат
      на базальной мембране и сохраняют способность к митотическому делению.
      Цитотрофобласт особенно хорошо выражен на ранних стадиях развития плаценты.
    </p>

    <p>
      <b>Синцитиотрофобласт</b> является наружным многоядерным слоем. Он образуется
      в результате слияния клеток цитотрофобласта. Именно синцитиотрофобласт
      непосредственно контактирует с материнской кровью в межворсинчатом пространстве.
    </p>

    <p>
      По мере созревания плаценты цитотрофобласт во многих участках становится
      менее выраженным, а гематоплацентарный барьер истончается. Это облегчает
      обмен между материнской и плодной кровью, но при этом барьерная функция
      сохраняется.
    </p>

    <h3>Синцитиальные узелки</h3>

    <p>
      В зрелой плаценте на поверхности ворсин могут встречаться скопления ядер
      синцитиотрофобласта — <b>синцитиальные узелки</b>. Они выглядят как плотные
      группы ядер на поверхности ворсин.
    </p>

    <p>
      Умеренное количество синцитиальных узелков является нормальным признаком
      созревания плаценты. Их увеличение может отражать усиленную перестройку
      ворсин или изменения, связанные с нарушением кровотока и гипоксией.
    </p>

    <h3>Периферический цитотрофобласт</h3>

    <p>
      В области прикрепления якорных ворсин к материнской части плаценты клетки
      цитотрофобласта могут образовывать клеточные колонки. Эти клетки погружаются
      в децидуальную ткань и участвуют в фиксации плодной части плаценты.
    </p>

    <p>
      В таких участках синцитиотрофобласт может отсутствовать, а клетки
      цитотрофобласта выполняют якорную функцию. Это важно для прочного соединения
      плодного и материнского компонентов плаценты.
    </p>
  </div>

  <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
    <h3>Межворсинчатое пространство</h3>

    <p>
      Межворсинчатое пространство находится между ворсинами хориона. Оно заполнено
      материнской кровью. В эту кровь погружены ворсины, содержащие сосуды плода.
    </p>

    <p>
      Несмотря на близость двух кровотоков, кровь матери и кровь плода в норме
      не смешиваются. Их разделяет гематоплацентарный барьер, образованный тканями
      ворсины хориона и стенкой капилляра плода.
    </p>

    <p>
      Межворсинчатое пространство является местом, где осуществляется непрямой
      контакт материнской крови с тканями плода. Через стенку ворсин происходит
      транспорт кислорода, питательных веществ, антител, продуктов обмена и других
      соединений.
    </p>

    <h3>Гематоплацентарный барьер</h3>

    <p>
      Гематоплацентарный барьер — это структура, разделяющая кровь матери и кровь
      плода. У человека он образован тканями плода, поскольку плацента относится
      к гемохориальному типу.
    </p>

    <p>
      В ранние сроки барьер включает синцитиотрофобласт, цитотрофобласт, базальные
      мембраны, соединительную ткань ворсины и эндотелий капилляра плода. Позднее
      барьер становится тоньше: цитотрофобласт во многих местах редуцируется,
      капилляры приближаются к поверхности ворсины, а расстояние между материнской
      и плодной кровью уменьшается.
    </p>

    <p>
      Барьер выполняет избирательную функцию. Он обеспечивает обмен веществами,
      но препятствует прямому смешиванию крови матери и плода. Через него проходят
      кислород и питательные вещества к плоду, а углекислый газ и продукты обмена
      выводятся в кровь матери.
    </p>

    <h3>Фибриноид Лангханса</h3>

    <p>
      На поверхности ворсин со второй половины беременности может появляться
      <b>фибриноид Лангханса</b>. Это неклеточная фибриноподобная масса.
    </p>

    <p>
      Фибриноид рассматривается как продукт, связанный с распадом эпителия ворсин
      и свёртыванием плазмы материнской крови. В умеренном количестве он может
      встречаться в нормальной плаценте, особенно в более поздние сроки беременности.
    </p>

    <p>
      Избыточное отложение фибриноида может уменьшать рабочую поверхность ворсин
      и ухудшать обмен между матерью и плодом.
    </p>
  </div>

  <div style="background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:18px;">
    <h3>Функции плодной части плаценты</h3>

    <p>
      Плодная часть плаценты участвует в обменной, барьерной и синтетической
      функциях плаценты. Её ворсины обеспечивают огромную площадь контакта
      с материнской кровью и содержат сосуды плода.
    </p>

    <p>
      <b>Обменная функция</b> заключается в переносе веществ между кровью матери
      и кровью плода. К плоду поступают кислород, вода, электролиты, глюкоза,
      аминокислоты, липиды, витамины и другие необходимые соединения. От плода
      к матери переходят углекислый газ и продукты обмена.
    </p>

    <p>
      <b>Барьерная функция</b> связана с гематоплацентарным барьером. Он обеспечивает
      избирательность транспорта, ограничивает прямой контакт иммунных компонентов
      матери и плода и препятствует смешиванию двух кровотоков.
    </p>

    <p>
      <b>Синтетическая функция</b> связана с образованием биологически активных
      веществ, в том числе гормонов и белков. Трофобласт участвует в гормональной
      поддержке беременности и влияет на состояние материнского организма.
    </p>

    <h3>Эндокринная роль трофобласта</h3>

    <p>
      Трофобластическая ткань плодной части плаценты обладает выраженной
      синтетической активностью. Она участвует в образовании хорионического
      гонадотропина, плацентарного лактогена, прогестерона, эстрогенов и других
      веществ, необходимых для поддержания беременности.
    </p>

    <p>
      Хорионический гонадотропин особенно важен в ранние сроки, потому что
      поддерживает функцию жёлтого тела беременности. В дальнейшем сама плацента
      становится важным эндокринным органом.
    </p>

    <p>
      Прогестерон способствует сохранению беременности, снижает сократительную
      активность миометрия и поддерживает секреторное состояние эндометрия.
      Эстрогены участвуют в росте матки, развитии молочных желёз и подготовке
      организма к родам.
    </p>

    <h3>Связь с пуповиной</h3>

    <p>
      Сосуды плодной части плаценты связаны с сосудами пупочного канатика.
      По пупочным артериям кровь плода поступает к плаценте, а по пупочной вене

    <p>
      Ветви пупочных сосудов проходят в хориальной пластинке и далее входят
      в ворсины хориона. Поэтому сосудистая сеть ворсин является продолжением
      кровообращения плода.
    </p>
  </div>

    <h3>Клинические и патогистологические связи</h3>

    <p>

      недостаточности. Если ворсины плохо васкуляризованы, имеют утолщённый барьер,

    </p>

      При хронической гипоксии плода в плаценте могут усиливаться признаки

      Такие изменения отражают напряжение компенсаторных механизмов.
    </p>

    <p>
      При воспалительных поражениях ворсин развивается виллит. В строме ворсин

    <p>
      При отёке ворсин их строма становится более рыхлой и расширенной, расстояние

      эффективность обмена газов и питательных веществ.
    </p>

    <p>
      Избыточное отложение фибриноида на поверхности ворсин или вокруг них может
      уменьшать площадь активного обмена. Если такие изменения выражены значительно,
      они могут участвовать в развитии плацентарной недостаточности.
    </p>

    <p>
      При нарушении созревания ворсин они могут сохранять более незрелый вид:

    <h3>Краткая выжимка</h3>

      Главная идея препарата: ворсины хориона содержат сосуды плода и омываются

      ними находится гематоплацентарный барьер.
    </p>
