  </div>

  <div class="prep-html-card wide">
    <h3>Яичник: основные особенности</h3>
    <p>Яичник — парная женская половая железа. В отличие от семенника, он расположен в тазовом отделе брюшной полости, а не вынесен наружу. В отличие от семенника, женские половые клетки развиваются не в канальцах, а в составе <b>фолликулов</b>, причём в каждом фолликуле находится одна половая клетка.</p>
    <p>Яичник выполняет две главные функции: <b>генеративную</b> и <b>эндокринную</b>. Генеративная функция заключается в развитии ооцитов. Эндокринная функция связана с продукцией эстрогенов, прогестерона и других гормонально активных веществ клетками фолликулов, текой и жёлтым телом.</p>
    <p>На препарате яичник узнаётся по наличию коркового и мозгового вещества, фолликулов разных стадий развития, жёлтого тела, белого тела и атретических структур. В яичнике нет извитых семенных канальцев, сперматогенного эпителия и клеток Лейдига, характерных для семенника.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Корковое и мозговое вещество яичника</h3>
    <p>В яичнике выделяют <b>корковое вещество</b> и <b>мозговое вещество</b>. Корковое вещество располагается ближе к поверхности и содержит основные функциональные структуры: фолликулы разных стадий, жёлтые тела, белые тела и атретические тела. Именно корковое вещество является главным ориентиром на препарате.</p>
    <p>Мозговое вещество расположено глубже. Оно образовано рыхлой соединительной тканью, содержит крупные сосуды, нервы и соединительнотканные элементы. В отличие от коркового вещества, мозговое вещество не содержит типичных развивающихся фолликулов.</p>
    <p>Снаружи яичник покрыт поверхностным эпителием и плотной соединительнотканной белочной оболочкой. Под ними располагается корковое вещество, где и находятся фолликулы. На препарате важно не перепутать поверхностный эпителий яичника с мезотелием серозной оболочки других органов.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Оогенез: общая логика</h3>
    <p>Оогенез — процесс развития женских половых клеток. Он принципиально отличается от сперматогенеза. У женщин мейоз начинается ещё до рождения: ооциты I порядка вступают в первое деление мейоза и останавливаются на стадии диплотены профазы I. В таком состоянии они могут сохраняться годами и десятилетиями.</p>
    <p>После полового созревания в каждом цикле часть фолликулов вступает в рост. Обычно только один фолликул становится доминантным и достигает стадии зрелого фолликула. Перед овуляцией ооцит I завершает первое деление мейоза и превращается в ооцит II порядка, при этом образуется первое полярное тельце.</p>
    <p>Ооцит II вступает во второе деление мейоза, но останавливается в метафазе II. Полностью мейоз завершается только при оплодотворении. Если оплодотворения нет, ооцит II погибает.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Строение ооцита и комплекса яйцеклетки</h3>
    <p>Женская половая клетка в фолликуле представлена ооцитом. До овуляции это сначала ооцит I порядка, затем после завершения первого деления мейоза — ооцит II порядка. Ооцит — крупная клетка с ядром, цитоплазмой, запасами веществ и органеллами, необходимыми для раннего развития зародыша.</p>
    <p>Ооцит окружён <b>блестящей оболочкой</b>, или zona pellucida. Это важная гликопротеиновая оболочка, которая участвует в видоспецифическом связывании сперматозоида, запуске акросомальной реакции и блоке полиспермии после оплодотворения.</p>
    <p>Снаружи от блестящей оболочки располагаются фолликулярные клетки. У зрелого фолликула вокруг ооцита сохраняется <b>лучистый венец</b> — слой фолликулярных клеток, которые сопровождают ооцит при овуляции. Ооцит вместе с блестящей оболочкой и лучистым венцом образует комплекс, который попадает в маточную трубу.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Фолликул: общий принцип строения</h3>
    <p>Фолликул — структурно-функциональная единица коркового вещества яичника. Каждый фолликул включает ооцит и окружающие его фолликулярные клетки. По мере развития фолликула меняются размер ооцита, форма и количество фолликулярных клеток, появляется блестящая оболочка, формируется полость фолликула, развивается тека.</p>
    <p>Фолликул одновременно является структурой генеративной и эндокринной. Генеративная роль связана с созреванием ооцита. Эндокринная роль связана с продукцией гормонов клетками фолликулярного эпителия и теки.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Примордиальный фолликул</h3>
    <p><b>Примордиальный фолликул</b> — самый ранний и самый многочисленный тип фолликулов. Он обычно располагается в поверхностных отделах коркового вещества. В центре находится ооцит I порядка, который находится в длительной остановке на стадии диплотены профазы первого деления мейоза.</p>
    <p>Вокруг ооцита расположен один слой плоских фолликулярных клеток, лежащих на базальной мембране. Примордиальные фолликулы являются резервом яичника. Их количество постепенно уменьшается в течение жизни за счёт вступления в рост и атрезии.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Первичный фолликул</h3>
    <p><b>Первичный фолликул</b> — это фолликул, вступивший в созревание. Ооцит увеличивается в размерах, а фолликулярные клетки из плоских становятся кубическими или призматическими. Сначала они образуют один слой, затем начинают размножаться и формируют многослойный фолликулярный эпителий.</p>
    <p>Между ооцитом и фолликулярными клетками появляется <b>блестящая оболочка</b>. Она образуется при участии ооцита и фолликулярных клеток. Через неё сохраняются контакты между ооцитом и клетками фолликулярного эпителия, что важно для питания и регуляции развития ооцита.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Вторичный фолликул</h3>
    <p><b>Вторичный фолликул</b> характеризуется дальнейшим ростом ооцита и фолликулярного эпителия. Фолликулярные клетки становятся многочисленными, формируют зернистый слой. Между клетками начинают появляться мелкие пространства, заполненные фолликулярной жидкостью.</p>
    <p>Снаружи от фолликулярного эпителия формируется соединительнотканная оболочка — <b>тека фолликула</b>. В ней позже различают внутреннюю и наружную теку. Внутренняя тека содержит эндокринно активные клетки, участвующие в синтезе стероидных гормонов, а наружная тека имеет преимущественно соединительнотканный характер.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Третичный, или пузырчатый, фолликул</h3>
    <p><b>Третичный фолликул</b>, или пузырчатый фолликул, отличается наличием крупной полости, заполненной фолликулярной жидкостью. Эта полость образуется путём слияния мелких щелей между клетками фолликулярного эпителия.</p>
    <p>Фолликулярный эпителий образует <b>зернистый слой</b>, выстилающий стенку фолликула. Ооцит смещается к одному полюсу и располагается на скоплении фолликулярных клеток — <b>яйценосном бугорке</b>. Непосредственно вокруг ооцита сохраняется <b>лучистый венец</b>.</p>
    <p>Внутренняя тека участвует в гормональной функции фолликула. По классической схеме ЛГ стимулирует текальные клетки к образованию андрогенов, а ФСГ стимулирует фолликулярные клетки к превращению андрогенов в эстрогены.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Зрелый фолликул</h3>
    <p><b>Зрелый фолликул</b>, или граафов пузырёк, — это крупный предовуляторный фолликул. Он имеет большую полость, выраженный зернистый слой, яйценосный бугорок, ооцит с блестящей оболочкой и лучистым венцом, а также хорошо развитую теку.</p>
    <p>Перед овуляцией ооцит I завершает первое деление мейоза, образуется ооцит II и первое полярное тельце. Ооцит II вступает во второе деление мейоза и останавливается в метафазе II. Именно такой ооцит II вместе с лучистым венцом выходит при овуляции.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Овуляция</h3>
    <p><b>Овуляция</b> — выход ооцита II порядка из зрелого фолликула. При этом разрывается стенка фолликула и поверхностные структуры яичника. Ооцит выходит не один, а в составе комплекса: ооцит II, блестящая оболочка и клетки лучистого венца.</p>
    <p>После овуляции этот комплекс должен быть захвачен маточной трубой. Если сперматозоиды присутствуют в женских половых путях в подходящее время, оплодотворение обычно происходит в ампулярной части маточной трубы.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Жёлтое тело</h3>
    <p>После овуляции остатки стенки фолликула превращаются в <b>жёлтое тело</b>. Клетки зернистого слоя и теки подвергаются лютеинизации: увеличиваются, накапливают липидные включения и становятся эндокринно активными. Основной гормон жёлтого тела — прогестерон.</p>
    <p>Прогестерон переводит эндометрий в секреторное состояние: железы становятся извитыми, секреторно активными, строма отекает, сосуды развиваются. Это необходимо для подготовки матки к имплантации.</p>
    <p>Если беременность не наступает, жёлтое тело постепенно редуцируется и превращается в белое тело. Если беременность наступает, жёлтое тело сохраняется дольше и поддерживает гормональные условия ранней беременности.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Белое тело и атрезия фолликулов</h3>
    <p><b>Белое тело</b> — соединительнотканный рубец, который остаётся после обратного развития жёлтого тела. На препарате оно выглядит как плотная светлая соединительнотканная структура в корковом веществе яичника.</p>
    <p><b>Атрезия фолликулов</b> — гибель фолликулов, не достигших овуляции. Это нормальный процесс: в рост вступает много фолликулов, но до овуляции обычно доходит один. При атрезии погибает ооцит, затем фолликулярные клетки, а остатки фолликула замещаются соединительной тканью. В яичнике могут встречаться атретические тела.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Гормональная регуляция яичника</h3>
    <p>Работа яичника регулируется гормонами гипофиза. ФСГ стимулирует рост фолликулов и функцию фолликулярных клеток. ЛГ действует на текальные клетки и участвует в овуляции и лютеинизации. Пролактин, или лютеотропный гормон, связан с поддержанием функции лютеиновых клеток.</p>
    <p>Текальные клетки под влиянием ЛГ образуют андрогены из холестерина. Фолликулярные клетки под влиянием ФСГ превращают андрогены в эстрогены. Лютеиновые клетки жёлтого тела образуют прогестерон. Эстрогены стимулируют регенерацию и пролиферацию эндометрия, а прогестерон вызывает секреторную перестройку эндометрия.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Маточная труба</h3>
    <p>Маточная труба, или яйцевод, проводит ооцит и ранний зародыш. Она имеет воронку с бахромками, ампулярную часть, перешеек и маточную часть. Бахромки помогают захватить ооцит после овуляции, а ампулярная часть обычно является местом оплодотворения.</p>
    <p>Стенка маточной трубы имеет слизистую, мышечную и серозную оболочки. Слизистая образует многочисленные складки, особенно выраженные в ампулярной части. Эпителий содержит реснитчатые клетки и секреторные клетки. Реснитчатые клетки способствуют движению ооцита и зародыша к матке, секреторные клетки создают питательную и защитную среду.</p>
    <p>Мышечная оболочка участвует в перистальтических сокращениях, которые помогают транспорту гамет и зародыша. Поэтому движение в трубе обеспечивается не одним механизмом, а сочетанием ресничек эпителия, секрета и сокращений гладких миоцитов.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Матка</h3>
    <p>Матка — полый мышечный орган, предназначенный для имплантации, развития плода и родов. Стенка матки состоит из трёх оболочек: <b>эндометрия</b>, <b>миометрия</b> и <b>периметрия</b>.</p>
    <p>Эндометрий — слизистая оболочка матки. Он содержит однослойный призматический эпителий, собственную пластинку и простые трубчатые маточные железы. В эндометрии выделяют функциональный слой, который циклически изменяется и отторгается при менструации, и базальный слой, который сохраняется и обеспечивает регенерацию.</p>
    <p>Миометрий — мощная мышечная оболочка, построенная из переплетающихся пучков гладких миоцитов. Он обеспечивает растяжение матки при беременности и сокращение во время родов. Периметрий — наружная серозная оболочка.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Овариально-менструальный цикл</h3>
    <p>Овариально-менструальный цикл связывает изменения яичника и матки. В яичнике выделяют фолликулярную фазу, овуляцию и лютеиновую фазу. В матке этим событиям соответствуют менструальная, пролиферативная и секреторная фазы эндометрия.</p>
    <p>В фолликулярную фазу растущий фолликул вырабатывает эстрогены. Эстрогены стимулируют регенерацию и пролиферацию функционального слоя эндометрия. После овуляции образуется жёлтое тело, которое выделяет прогестерон. Прогестерон вызывает секреторную трансформацию эндометрия.</p>
    <p>Если беременность не наступает, жёлтое тело редуцируется, уровень прогестерона падает, спиралевидные артерии функционального слоя спазмируются, развивается ишемия и функциональный слой отторгается — наступает менструация.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Влагалище и наружные органы</h3>
    <p>Влагалище является органом совокупления и частью родового канала. Его слизистая оболочка выстлана многослойным плоским эпителием. Собственная пластинка и мышечная оболочка обеспечивают растяжимость стенки. Желёз в слизистой оболочке влагалища обычно нет; увлажнение связано с секретами шейки матки, транссудацией и железами преддверия.</p>
    <p>Наружные половые органы включают большие и малые половые губы, клитор и преддверие влагалища. Клитор является эректильным органом, гомологичным кавернозным телам полового члена. Большие железы преддверия выделяют слизистый секрет и являются функциональным аналогом бульбоуретральных желез.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Молочная железа</h3>
    <p>Молочная железа — добавочная железа женской половой системы, функционально связанная с беременностью и лактацией. Она состоит из долек, протоков, соединительной и жировой ткани. В активной железе развиты секреторные отделы, вырабатывающие молоко, и система выводных протоков.</p>
    <p>В неактивной молочной железе преобладают протоки, соединительная и жировая ткань, а секреторные отделы развиты слабее. При беременности и лактации под влиянием гормонов происходит развитие альвеолярно-секреторного аппарата.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Оплодотворение: общая характеристика</h3>
    <p>У человека оплодотворение имеет <b>моноспермальный</b> тип: в ооцит II должен проникнуть только один сперматозоид. Сперматозоиды сохраняют оплодотворяющую способность в женских половых путях ограниченное время, а ооцит II наиболее пригоден к оплодотворению в первые сутки после овуляции.</p>
    <p>Обычно оплодотворение происходит в ампулярной части маточной трубы. Его результат — образование зиготы, восстановление диплоидного набора хромосом, объединение наследственного материала двух родителей, определение генетического пола и запуск дробления.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>4 этапа оплодотворения</h3>
    <p><b>I. Сближение и дистантное взаимодействие гамет.</b> Сперматозоиды продвигаются по женским половым путям за счёт собственной подвижности, сокращений матки и маточных труб, а также влияния среды женских половых путей. Параллельно происходит капацитация — функциональная перестройка сперматозоида, после которой он становится способен к акросомальной реакции.</p>
    <p><b>II. Контактное взаимодействие гамет.</b> Сперматозоид проходит через лучистый венец, контактирует с блестящей оболочкой, связывается с её рецепторными гликопротеинами и запускает акросомальную реакцию. Ферменты акросомы помогают сперматозоиду пройти через оболочки ооцита.</p>
    <p><b>III. Проникновение сперматозоида и активация яйцеклетки.</b> Сперматозоид достигает плазмолеммы ооцита, происходит слияние мембран и проникновение мужского генетического материала в цитоплазму. Ооцит активируется: завершается второе деление мейоза, выделяется второе полярное тельце, запускается кортикальная реакция.</p>
    <p><b>IV. Образование зиготы.</b> Формируются мужской и женский пронуклеусы, затем происходит их сближение и объединение наследственного материала. Восстанавливается диплоидный набор хромосом, определяется генетический пол и начинается подготовка к первому делению дробления.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Блок полиспермии</h3>
    <p>После проникновения одного сперматозоида ооцит должен предотвратить проникновение других сперматозоидов. Для этого запускается кортикальная реакция: кортикальные гранулы выделяют вещества, изменяющие блестящую оболочку и плазмолемму ооцита.</p>
    <p>Блестящая оболочка теряет рецепторную способность, создаётся перивителлиновое пространство, а сама zona pellucida уплотняется и превращается в оболочку оплодотворения. Это обеспечивает блок полиспермии и сохраняет нормальный диплоидный набор будущей зиготы.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Препарат: яичник</h3>
    <p>Яичник на препарате узнаётся по корковому веществу с фолликулами разных стадий. Можно увидеть примордиальные, первичные, вторичные и третичные фолликулы, а также атретические тела, жёлтое тело или белое тело. Главный признак — наличие ооцита в составе фолликула.</p>
    <p>В отличие от семенника, в яичнике нет извитых семенных канальцев. В отличие от матки, в яичнике нет эндометрия, маточных желёз и мощного миометрия. В отличие от простаты, нет желез в фиброзно-мышечной строме и простатических конкреций.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Препарат: матка</h3>
    <p>Матка узнаётся по эндометрию с простыми трубчатыми маточными железами и мощному миометрию. В эндометрии выделяют функциональный и базальный слои. Функциональный слой отторгается при менструации, базальный слой сохраняется и обеспечивает регенерацию.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Препарат: молочная железа</h3>
    <p>Молочная железа узнаётся по дольчатому строению, системе протоков, соединительной ткани и, в активном состоянии, секреторным альвеолам. В неактивной железе больше выражены протоки, соединительная и жировая ткань; в лактирующей — секреторные отделы.</p>
  </div>

  <div class="prep-html-card wide">
    <h3>Краткая итоговая схема</h3>
    <p>Женская половая система работает как циклическая система. В яичнике фолликул проходит стадии от примордиального до зрелого, ооцит I превращается в ооцит II, затем происходит овуляция. Остатки фолликула образуют жёлтое тело, которое выделяет прогестерон. Маточная труба захватывает ооцит и обычно является местом оплодотворения. Матка готовит эндометрий к имплантации. Если оплодотворения и имплантации нет, гормональная поддержка падает и функциональный слой эндометрия отторгается.</p>
  </div>

</div>`},
  {semester: 2, title: 'Эмбриология человека', category: 'Эмбриология', content: ''},
];
let activeSummaryTitle = '';

function renderSummaryTopicCard(topic, index = 0) {
  const hasContent = String(topic.content || '').trim().length > 0;
  return `
    <div class="note-card">
      <div class="note-num">${String(index + 1).padStart(2, '0')}</div>
      <div class="note-main">
        <h4>${safeText(topic.title)}</h4>
        <div class="note-meta">
          <span class="note-chip">${safeText(topic.category)}</span>
          <span class="note-chip ${hasContent ? '' : 'empty'}">${hasContent ? 'конспект добавлен' : 'пока пусто'}</span>
        </div>
      </div>
      <div class="inline-actions">
        <button class="ghost" onclick="openSummaryTopic('${safeText(topic.title)}')">Открыть</button>
      </div>
    </div>
  `;
}

function openSummaryTopic(title) {
  activeSummaryTitle = title;
  openBank('notes');
}

function renderSummaryContent() {
  if (!activeSummaryTitle) return '';
  const topic = summaryTopics.find(t => t.title === activeSummaryTitle);
  if (!topic) return '';
  const content = String(topic.content || '').trim();
  return `
    <div class="note-content">
      <h3>${safeText(topic.title)}</h3>
      ${content || `<p>Конспект по этой теме пока не добавлен. Позже сюда можно вставить краткую теорию, ключевые моменты, частые вопросы и шаблон устного ответа.</p>`}
    </div>
  `;
}

function renderNotesBank() {
  const first = summaryTopics.filter(t => t.semester === 1);
  const second = summaryTopics.filter(t => t.semester === 2);
  return `
    <div class="notes-hero">
      <h3>Конспекты по темам</h3>
      <p>Здесь будет быстрый учебный маршрут по 1 и 2 семестру: ключевые моменты, краткая теория, частые вопросы и шаблон ответа. Часть тем уже заполнена, остальные постепенно добавляются.</p>
    </div>
    <div class="notes-layout">
      <div class="notes-semester">
        <h3>📘 1 семестр</h3>
        <div class="notes-list">${first.map((topic, index) => renderSummaryTopicCard(topic, index)).join('')}</div>
      </div>
      <div class="notes-semester">
        <h3>📗 2 семестр</h3>
        <div class="notes-list">${second.map((topic, index) => renderSummaryTopicCard(topic, index)).join('')}</div>
      </div>
    </div>
    ${renderSummaryContent()}
  `;
}

function renderBank() {
  const cat = state.bankCategory;
  const map = {
    micro: {title:'Банк препаратов', items: allMicroBase(), subtitle:'Микрофотографии, названия, окраски, описание и варианты.'},
    theory: {title:'Теоретические вопросы', items: allTheory(), subtitle:'Текстовые вопросы с эталонными ответами.'},
    task: {title:'Банк задач', items: allTasks(), subtitle:'Контрольные задачи и решения.'},
    scheme: {title:'Банк схем', items: allSchemes(), subtitle:'Схемы с маркировкой элементов.'},
    notes: {title:'Конспекты', items: summaryTopics, subtitle:'Структура тем по 1 и 2 семестру. Конспекты можно будет постепенно заполнять.'},
  };
  const data = map[cat] || map.micro;
  const cardHtml = cat === 'notes' ? '' : data.items.map(item => {
    const learned = learnedSet().has(item.id);
    if (cat === 'micro' || cat === 'scheme') {
      return `
        <div class="bank-card">
          <img class="thumb" src="${resolveImageUrl(item)}" alt="${safeText(item.name || item.title)}" ${cat === 'micro' ? `onclick="openBankItem('${item.id}')"` : ''} />
          <div class="content">
            <div class="row">
              <h4>${safeText(item.name || item.title)}</h4>
              <span class="badge ${learned ? 'good' : 'warn'}">${learned ? '✓ Выучено' : 'В банке'}</span>
            </div>
            <p><strong>Окраска:</strong> ${safeText(item.stain || '—')}</p>
            ${cat === 'scheme' ? `<p><strong>Подписи:</strong> ${safeText(Object.entries(item.labels || {}).map(([k,v]) => `${k}=${v}`).join('; '))}</p>` : ''}
            <div class="inline-actions" style="margin-top:10px">
              <button class="ghost" onclick="toggleLearned('${item.id}')">${learned ? 'Снять пройдено' : 'Отметить пройденным'}</button>
            </div>
          </div>
        </div>
      `;
    }
    return `
      <div class="card">
        <div class="card-top">
          <div>
            <h4>${safeText(item.question)}</h4>
            <p>${safeText(item.answerVariants ? item.answerVariants[0] : item.answer)}</p>
          </div>
          <span class="badge ${learned ? 'good' : 'dev'}">${learned ? '✓ Выучено' : 'Банк'}</span>
        </div>
      </div>
    `;
  }).join('');
  return `
    <div class="shell">
      <div class="backline">
        <button class="ghost" onclick="showView('dashboard')">← Назад</button>
        <div class="muted">${data.title}</div>
      </div>
      <div class="panel pad">
        <div class="bank-toolbar">
          <button class="tab ${cat==='micro'?'active':''}" onclick="openBank('micro')">Препараты</button>
          <button class="tab ${cat==='theory'?'active':''}" onclick="openBank('theory')">Теоретические вопросы</button>
          <button class="tab ${cat==='task'?'active':''}" onclick="openBank('task')">Задачи</button>
          <button class="tab ${cat==='scheme'?'active':''}" onclick="openBank('scheme')">Схемы</button>
          <button class="tab ${cat==='notes'?'active':''}" onclick="openBank('notes')">Конспекты</button>
        </div>
        <p class="muted">${data.subtitle}</p>
      </div>
      <div style="height:14px"></div>
      ${cat === 'micro' ? (() => {
        const totalMicro = data.items.length;
        const learnedMicro = data.items.filter(i => learnedSet().has(i.id)).length;
        const remainMicro = Math.max(0, totalMicro - learnedMicro);
        const percentMicro = totalMicro ? Math.round((learnedMicro / totalMicro) * 100) : 0;
        return `
        <div class="chart-card">
          <h4 style="margin:0 0 10px">Диаграмма прогресса по препаратам</h4>
          <div class="stack-chart">
            <div class="passed" style="width:${percentMicro}%"></div>
            <div class="rest" style="width:${100 - percentMicro}%"></div>
          </div>
          <div class="chart-legend">
            <span>Пройдено: <strong>${learnedMicro}</strong></span>
            <span>Не пройдено: <strong>${remainMicro}</strong></span>
            <span>${percentMicro}%</span>
          </div>
        </div>`;
      })() : ''}
      ${cat === 'notes' ? renderNotesBank() : `<div class="bank-grid">${cardHtml}</div>`}
    </div>
  `;
}

function renderExamHistory() {
  const history = getExamHistory();
  const attempts = history.length;
  const avgOfAverages = attempts ? history.reduce((s, h) => s + (Number(h.avg) || 0), 0) / attempts : 0;
  const bestMark = attempts ? Math.max(...history.map(h => Number(h.finalMark) || 0)) : 0;
  const cards = history.map((h, idx) => {
    const dt = new Date(h.finishedAt || h.startedAt || Date.now());
    const stamp = isNaN(dt.getTime()) ? '—' : dt.toLocaleString('ru-RU');
    const grades = Array.isArray(h.grades) ? h.grades.join(' · ') : '—';
    const items = Array.isArray(h.items) ? h.items.map(it => `${it.label || '—'} (${it.grade || '—'})`).join('; ') : '';
    return `
      <div class="history-card">
        <div class="history-head">
          <div>
            <h4>Попытка #${attempts - idx}</h4>
            <div class="history-meta">${safeText(stamp)}</div>
          </div>
          <span class="badge ${Number(h.finalMark) >= 4 ? 'good' : 'warn'}">Итог ${safeText(String(h.finalMark || 0))}</span>
        </div>
        <div class="history-meta">Средний балл: <strong>${safeText(String(Number(h.avg || 0).toFixed ? Number(h.avg || 0).toFixed(2) : h.avg || 0))}</strong></div>
        <div class="history-meta">Оценки по билетy: ${safeText(grades)}</div>
        <div class="tiny" style="margin-top:8px">${safeText(items)}</div>
      </div>
    `;
  }).join('');
  return `
    <div class="shell">
      <div class="backline">
        <button class="ghost" onclick="showView('dashboard')">← Назад</button>
        <div class="muted">История прохождений экзаменов</div>
      </div>
      <div class="panel pad">
        <h2 style="margin-top:0">История экзаменов</h2>
        <p class="muted">Все экзаменационные попытки сохраняются локально для текущего профиля.</p>
        <div class="grid" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-top:14px">
          <div class="stat"><div class="label">Попыток</div><div class="value">${attempts}</div></div>
          <div class="stat"><div class="label">Средний балл</div><div class="value">${attempts ? avgOfAverages.toFixed(2) : '0.00'}</div></div>
          <div class="stat"><div class="label">Лучший итог</div><div class="value">${bestMark}</div></div>
        </div>
      </div>
      <div style="height:14px"></div>
      <div class="history-grid">
        ${cards || `<div class="panel pad"><p class="muted">Пока нет сохранённых попыток экзамена.</p></div>`}
      </div>
    </div>
  `;
}
function renderSettings() {
  return `

          <p>Email: <strong>${safeText(state.user?.email || '—')}</strong></p>

        </div>
      </div>
    </div>
  `;
}
function render() {
  const app = document.getElementById('app');
  if (!app) return;
  const view = state.view;
  document.getElementById('bottomNav').style.display = view === 'dashboard' ? 'block' : 'none';
  let html = '';
  if (view === 'login') html = renderLogin();
  else if (view === 'dashboard') html = renderDashboard();
  else if (view === 'training') html = renderTraining();
  else if (view === 'exam') html = renderExam();
  else if (view === 'bank') html = renderBank();
  else if (view === 'info') html = renderInfo();
  else if (view === 'examHistory') html = renderExamHistory();
  else if (view === 'settings') html = renderSettings();
  app.innerHTML = html;
  renderExamTimer();
  // fix scheme input handlers in training/exam after render
  if (state.training && state.training.kind === 'scheme' && state.training.current) {
    document.querySelectorAll('.scheme-grid input[data-scheme-key]').forEach((el) => {
      const key = el.dataset.schemeKey;
      el.oninput = (ev) => {
        state.training.currentAttempt.labels = Object.assign({}, state.training.currentAttempt.labels || {}, {[key]: ev.target.value});
      };
    });
  }
  if (state.exam && !state.exam.finished && !state.exam.resultOpen && state.exam.ticket[state.exam.currentIndex]?.type === 'scheme') {
    document.querySelectorAll('.scheme-grid input[data-scheme-key]').forEach((el) => {
      const key = el.dataset.schemeKey;
      el.oninput = (ev) => {
        state.exam.currentAttempt.labels = Object.assign({}, state.exam.currentAttempt.labels || {}, {[key]: ev.target.value});
      };
    });
  }
}
async function initApp() {
  showDbLoading();
  try {
    await loadDbFromSupabase();
    await initFromStorage();
    render();
  } catch (error) {
    showDbError(error);
  }
}

setInterval(() => {
  if (state.user?.id) checkCurrentUserAccess();
}, 30000);

initApp();
</script>
